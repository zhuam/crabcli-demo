<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CrabCLI Arcade — Game Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+Pro:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/hub/hub.css" />
</head>
<body data-comp-id="body">
  <div id="app" data-comp-id="app">

    <!-- Guest Welcome Banner -->
    <div id="guest-banner" class="guest-banner" data-comp-id="guest-banner" style="display:none;">
      <span class="guest-banner-text">Welcome to CrabCLI Arcade! Browse games or <a id="guest-banner-signin" href="#">Sign In</a> to track scores and save favorites.</span>
      <button id="guest-banner-close" class="guest-banner-close" aria-label="Dismiss">&times;</button>
    </div>

    <!-- Header -->
    <header class="header" id="header" data-comp-id="header">
      <div class="header-left">
        <a href="/" class="logo" data-comp-id="logo">
          <span class="logo-mark">&#x1F980;</span>
          <span class="logo-text">CrabCLI Arcade</span>
        </a>
      </div>
      <div class="header-center" data-comp-id="search">
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input id="search-input" type="text" placeholder="Search games..." autocomplete="off" />
        </div>
        <button id="mobile-search-btn" class="search-icon-btn" aria-label="Search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </button>
      </div>
      <div class="header-right" data-comp-id="auth-area">
        <div id="auth-area">
          <button id="auth-btn" class="btn btn-ghost" data-comp-id="signin-btn">Sign In</button>
        </div>
      </div>
    </header>

    <!-- Mobile Search Bar (expanded) -->
    <div id="mobile-search-bar" class="mobile-search-bar" style="display:none;">
      <input id="mobile-search-input" class="search-input-full" type="text" placeholder="Search games..." autocomplete="off" />
      <button id="mobile-search-close" class="mobile-search-close" aria-label="Close search">&times;</button>
    </div>

    <!-- Main Content -->
    <main class="main" data-comp-id="main">

      <!-- Recently Played -->
      <section class="recently-played" id="recently-section" data-comp-id="recently-section" style="display:none;">
        <h2 class="section-title">Recently Played</h2>
        <div class="recent-list" id="recent-list"></div>
      </section>

      <!-- Categories -->
      <nav class="categories" id="categories" data-comp-id="categories"></nav>

      <!-- Featured Section -->
      <section class="featured" id="featured-section" data-comp-id="featured-section" style="display:none;">
        <h2 class="section-title">Featured Games</h2>
        <div class="featured-list" id="featured-list"></div>
      </section>

      <!-- Games Grid -->
      <section class="games-section" data-comp-id="games-section">
        <div class="games-header" data-comp-id="games-header">
          <h2 class="section-title" id="games-title">All Games</h2>
          <div class="sort-controls">
            <button id="multiplayer-toggle" class="multiplayer-toggle" title="Show multiplayer games only" data-comp-id="multiplayer-toggle">
              <span class="multiplayer-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
              </span>
              Multiplayer
            </button>
            <select id="sort-select" class="sort-select">
              <option value="popular">Popular</option>
              <option value="newest">Newest</option>
              <option value="rating">Rating</option>
              <option value="az">A-Z</option>
            </select>
            <span id="game-count" class="game-count"></span>
          </div>
        </div>

        <!-- Loading Skeleton -->
        <div id="skeleton-container" class="games-grid" style="display:none;"></div>

        <div class="games-grid" id="games-grid" data-comp-id="games-grid"></div>

        <!-- Load More Button -->
        <div class="load-more-wrap" id="load-more-wrap" style="display:none;">
          <button id="load-more-btn" class="load-more-btn" data-comp-id="load-more-btn">Load More</button>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="footer" data-comp-id="footer">
      <p>CrabCLI Arcade — <span id="total-games">0</span> games and counting</p>
    </footer>
  </div>

  <!-- Auth Modal -->
  <div id="auth-modal" class="modal-overlay" style="display:none;" data-comp-id="auth-modal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Sign In</h2>
        <button id="modal-close" class="modal-close" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body">
        <div id="auth-error" class="error-msg" style="display:none;"></div>
        <form id="auth-form">
          <div class="form-group">
            <label for="username-input">Username</label>
            <input id="username-input" type="text" placeholder="Enter your username" required maxlength="32" autocomplete="username" />
          </div>
          <div class="form-group">
            <label for="password-input">Password</label>
            <input id="password-input" type="password" placeholder="4+ characters" required minlength="4" autocomplete="current-password" />
          </div>
          <div class="auth-tabs">
            <button type="button" class="auth-tab active" data-action="login">Sign In</button>
            <button type="button" class="auth-tab" data-action="register">Create Account</button>
          </div>
          <button type="submit" id="auth-submit" class="btn btn-primary">Sign In</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Profile Panel (dropdown) -->
  <div id="profile-panel" class="profile-panel" style="display:none;" data-comp-id="profile-panel">
    <div class="profile-header" id="profile-header">
      <div class="user-avatar-lg" id="profile-avatar">?</div>
      <div>
        <div class="profile-name" id="profile-name"></div>
        <div class="profile-since" id="profile-since"></div>
      </div>
    </div>
    <div class="profile-stats" id="profile-stats">
      <div class="profile-stat"><div class="profile-stat-value" id="stat-games">0</div><div class="profile-stat-label">Games</div></div>
      <div class="profile-stat"><div class="profile-stat-value" id="stat-scores">0</div><div class="profile-stat-label">Scores</div></div>
      <div class="profile-stat"><div class="profile-stat-value" id="stat-favorites">0</div><div class="profile-stat-label">Favorites</div></div>
    </div>
    <div class="profile-favorites" id="profile-favorites">
      <div class="profile-section-label">Favorites</div>
      <div id="profile-fav-list"></div>
    </div>
    <div class="profile-signout">
      <button id="profile-signout">Sign Out</button>
    </div>
  </div>

  <script src="/hub/hub.js"></script>
</body>
</html>
