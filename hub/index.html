<!DOCTYPE html>
<html lang="en" data-framework="glass-arcade-v1">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CrabCLI Arcade — Game Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/hub/hub.css" />
  <link rel="stylesheet" href="/hub/hub-v3.css" />
</head>
<body>
  <div id="app">
    <!-- Guest Welcome Banner -->
    <div id="guest-banner" class="guest-banner" style="display:none;">
      <span>Welcome to CrabCLI Arcade! Browse games first, then <a id="banner-signin" href="#">Sign In</a> to save favorites, scores, and release notifications.</span>
      <button id="banner-close" class="banner-close" aria-label="Dismiss">&times;</button>
    </div>

    <!-- Header -->
    <header class="header" id="header">
      <div class="header-brand">
        <svg class="brand-icon" width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="14" cy="14" r="12" stroke="url(#cg)" stroke-width="1.8" fill="rgba(108,92,231,0.15)"/><path d="M9 16c0-4 10-4 10 0M11 12l-2-3M17 12l2-3M14 8v4M14 16v4" stroke="url(#cg)" stroke-width="1.6" stroke-linecap="round"/><defs><linearGradient id="cg" x1="4" y1="4" x2="24" y2="24"><stop stop-color="#6C5CE7"/><stop offset="1" stop-color="#FD79A8"/></linearGradient></defs></svg>
        <span>CrabCLI Arcade</span>
      </div>
      <div class="search-container">
        <div class="search-input-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" placeholder="Search games..." autocomplete="off" aria-label="Search games">
          <button class="search-clear" id="search-clear">✕</button>
        </div>
        <div class="search-overlay" id="search-overlay">
          <div id="search-overlay-content"></div>
        </div>
      </div>
      <div class="header-actions" id="auth-area">
        <button class="header-btn" id="fav-header-btn" title="Favorites">❤️</button>
        <button class="header-btn" id="auth-btn" title="Profile">👤</button>
      </div>
    </header>

    <!-- Mobile Search Bar -->
    <div id="mobile-search-bar" class="mobile-search-bar" style="display:none;">
      <input id="mobile-search-input" class="search-input-full" type="text" placeholder="Search games..." autocomplete="off" />
      <button id="mobile-search-close" class="mobile-search-close" aria-label="Close search">&times;</button>
    </div>

    <!-- Hero Carousel -->
    <section class="hero-section" id="hero-section">
      <div class="hero-carousel" id="hero-carousel">
        <div id="hero-slides"></div>
        <div class="hero-controls">
          <div class="hero-dots" id="hero-dots"></div>
          <button class="hero-nav-btn" id="hero-prev" aria-label="Previous">‹</button>
          <button class="hero-nav-btn" id="hero-next" aria-label="Next">›</button>
        </div>
      </div>
    </section>

    <!-- Category Shelf -->
    <section class="category-shelf">
      <div class="category-scroll" id="category-scroll"></div>
    </section>

    <!-- Controls Bar -->
    <div class="controls-bar">
      <span class="results-count" id="results-count">0 games</span>
      <div class="sort-chips" id="sort-chips">
        <button class="sort-chip active" data-sort="popular">🔥 Popular</button>
        <button class="sort-chip" data-sort="newest">🕐 Newest</button>
        <button class="sort-chip" data-sort="rating">⭐ Rating</button>
        <button class="sort-chip" data-sort="az">🔤 A-Z</button>
      </div>
    </div>

    <!-- Games Grid -->
    <section class="games-section">
      <div class="games-grid" id="games-grid"></div>
      <div class="load-more-wrap" id="load-more-wrap" style="display:none;">
        <button class="load-more-btn" id="load-more-btn">Show 8 more</button>
      </div>
    </section>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Mobile Bottom Nav -->
  <nav class="mobile-bottom-nav" id="mobile-nav">
    <button class="nav-tab active" data-tab="home"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></button>
    <button class="nav-tab" data-tab="search"><span class="nav-icon">🔍</span><span class="nav-label">Search</span></button>
    <button class="nav-tab" data-tab="favorites"><span class="nav-icon">❤️</span><span class="nav-label">Favorites</span></button>
    <button class="nav-tab" data-tab="profile"><span class="nav-icon">👤</span><span class="nav-label">Profile</span></button>
  </nav>

  <!-- Auth Modal -->
  <div id="auth-modal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Sign In</h2>
        <button id="modal-close" class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div id="auth-error" class="error-msg" style="display:none;"></div>
        <form id="auth-form">
          <div class="form-group">
            <label for="username-input">Username</label>
            <input id="username-input" type="text" placeholder="Enter your username" required maxlength="32" autocomplete="username" />
          </div>
          <div class="form-group">
            <label for="password-input">Password</label>
            <input id="password-input" type="password" placeholder="4+ characters" required minlength="4" autocomplete="current-password" />
          </div>
          <div class="auth-tabs">
            <button type="button" class="auth-tab active" data-action="login">Sign In</button>
            <button type="button" class="auth-tab" data-action="register">Create Account</button>
          </div>
          <button type="submit" id="auth-submit" class="btn btn-primary">Sign In</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Profile Panel (dropdown) -->
  <div id="profile-panel" class="profile-panel" style="display:none;">
    <div class="profile-header" id="profile-header">
      <div class="user-avatar-lg" id="profile-avatar">?</div>
      <div>
        <div class="profile-name" id="profile-name"></div>
        <div class="profile-since" id="profile-since"></div>
      </div>
    </div>
    <div class="profile-stats" id="profile-stats">
      <div class="profile-stat"><div class="profile-stat-value" id="stat-games">0</div><div class="profile-stat-label">Games</div></div>
      <div class="profile-stat"><div class="profile-stat-value" id="stat-scores">0</div><div class="profile-stat-label">Scores</div></div>
      <div class="profile-stat"><div class="profile-stat-value" id="stat-favorites">0</div><div class="profile-stat-label">Favorites</div></div>
    </div>
    <div class="profile-favorites" id="profile-favorites">
      <div class="profile-section-label">Favorites</div>
      <div id="profile-fav-list"></div>
    </div>
    <div class="profile-signout">
      <button id="profile-signout">Sign Out</button>
    </div>
  </div>

  <script src="/hub/hub.js" type="text/javascript"></script>
</body>
</html>
