<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrabCLI Arcade — 游戏大厅 v3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   🎮 CrabCLI Arcade — Immersive Game Launcher v3
   ============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:#080C1A;color:#E8ECFF;min-height:100vh;overflow-x:hidden;
  line-height:1.6;-webkit-font-smoothing:antialiased;
}
:root{
  --cyan:#00D4FF;--cyan-glow:rgba(0,212,255,0.35);
  --purple:#8B5CF6;--purple-glow:rgba(139,92,246,0.3);
  --gold:#FFD700;--gold-glow:rgba(255,215,0,0.25);
  --neon-green:#00FF88;--neon-green-dim:rgba(0,255,136,0.2);
  --orange:#FF8C00;--orange-dim:rgba(255,140,0,0.2);
  --danger:#FF3366;
  --bg-deep:#080C1A;--bg-card:rgba(255,255,255,0.04);--bg-card-hover:rgba(255,255,255,0.08);
  --border-subtle:rgba(255,255,255,0.06);--border-glow:rgba(0,212,255,0.2);
  --text-primary:#E8ECFF;--text-secondary:rgba(232,236,255,0.7);--text-dim:rgba(232,236,255,0.4);
  --radius-sm:8px;--radius-md:12px;--radius-lg:18px;--radius-xl:24px;
  --font-display:'Orbitron','Inter',sans-serif;--font-body:'Inter',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --shadow-card:0 8px 32px rgba(0,0,0,0.4);--shadow-glow:0 0 30px rgba(0,212,255,0.1);
  --transition-fast:.15s cubic-bezier(.4,0,.2,1);--transition-med:.35s cubic-bezier(.4,0,.2,1);
  --transition-bounce:.5s cubic-bezier(.34,1.56,.64,1);
}
/* Background */
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;
  background:radial-gradient(ellipse 70% 50% at 15% 20%,rgba(0,212,255,0.06),transparent),
    radial-gradient(ellipse 60% 50% at 85% 80%,rgba(139,92,246,0.07),transparent),
    radial-gradient(ellipse 40% 40% at 50% 50%,rgba(0,20,60,0.08),transparent);
}
#bg-canvas::after{content:'';position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse 80% 60% at 50% 50%,black 20%,transparent 70%);
  -webkit-mask-image:radial-gradient(ellipse 80% 60% at 50% 50%,black 20%,transparent 70%);
}
.star{position:absolute;border-radius:50%;background:#fff;width:2px;height:2px;
  animation:twinkle var(--dur,4s) ease-in-out infinite alternate;}
@keyframes twinkle{0%{opacity:0.15;transform:scale(0.8)}100%{opacity:0.9;transform:scale(1.2)}}
.star.shooting{width:3px;height:3px;background:linear-gradient(90deg,#fff,transparent);animation:shoot 1.5s linear forwards;pointer-events:none}
@keyframes shoot{0%{transform:translateX(0) translateY(0);opacity:1}70%{opacity:1}100%{transform:translateX(-300px) translateY(300px);opacity:0}}
.orb{position:absolute;border-radius:50%;filter:blur(100px);pointer-events:none;opacity:0.25;
  animation:orbFloat 25s ease-in-out infinite alternate;}
.orb-1{width:550px;height:550px;background:radial-gradient(circle,rgba(0,212,255,0.12),transparent);top:-10%;left:-5%;animation-duration:25s}
.orb-2{width:450px;height:450px;background:radial-gradient(circle,rgba(139,92,246,0.1),transparent);bottom:-5%;right:-5%;animation-duration:20s;animation-delay:-5s}
.orb-3{width:350px;height:350px;background:radial-gradient(circle,rgba(255,215,0,0.05),transparent);top:35%;left:50%;animation-duration:30s;animation-delay:-10s}
@keyframes orbFloat{0%{transform:translate(0,0) scale(1)}100%{transform:translate(40px,-30px) scale(1.1)}}

/* Toast */
.toast-container{position:fixed;top:80px;right:20px;z-index:10000;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:10px;background:rgba(8,12,26,0.95);border:1px solid rgba(255,255,255,0.1);color:#E8ECFF;font-size:14px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,0.5);animation:slideIn 0.3s ease-out;backdrop-filter:blur(16px);max-width:380px}
.toast.success{border-color:rgba(0,255,136,0.3)}.toast.error{border-color:rgba(255,51,102,0.3)}.toast.info{border-color:rgba(0,212,255,0.3)}
@keyframes slideIn{from{transform:translateX(80px);opacity:0}to{transform:translateX(0);opacity:1}}

/* Modal */
.modal-overlay{position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,0.7);display:none;place-items:center;backdrop-filter:blur(8px)}
.modal-overlay.open{display:grid}
.modal{background:linear-gradient(135deg,#111827,#0D1B2A);border:1px solid rgba(0,212,255,0.15);border-radius:20px;padding:32px;width:380px;max-width:92vw;position:relative;box-shadow:0 24px 80px rgba(0,0,0,0.6)}
.modal-close{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer}
.modal-title{font-family:var(--font-display);font-size:22px;font-weight:700;margin-bottom:4px}
.modal-subtitle{font-size:14px;color:var(--text-secondary);margin-bottom:24px}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:4px}
.form-input{width:100%;padding:10px 14px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#E8ECFF;font-size:14px;outline:none;transition:var(--transition-fast)}
.form-input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,212,255,0.15)}
.form-submit{width:100%;margin-top:6px}
.form-switch{text-align:center;margin-top:14px;font-size:13px;color:var(--text-secondary)}
.form-switch a{color:var(--cyan);cursor:pointer;text-decoration:none}
.form-switch a:hover{text-decoration:underline}
#authError{color:var(--danger);font-size:12px;margin-top:6px;text-align:center;display:none}

/* App */
#app{position:relative;z-index:1;max-width:1280px;margin:0 auto;padding:0 24px 80px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 20px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;transition:var(--transition-fast);border:none;font-family:var(--font-body);text-decoration:none}
.btn-cyan{background:var(--cyan);color:#080C1A;font-weight:700}
.btn-cyan:hover{box-shadow:0 0 24px var(--cyan-glow);transform:translateY(-1px)}
.btn-ghost{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:var(--text-primary)}
.btn-ghost:hover{background:rgba(255,255,255,0.12);border-color:var(--cyan)}

/* Top Nav */
.top-nav{display:flex;align-items:center;gap:16px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.06);margin-bottom:20px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:8px;font-family:var(--font-display);font-size:16px;font-weight:700;color:var(--text-primary);text-decoration:none;flex-shrink:0}
.brand-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--cyan),var(--purple));border-radius:8px;display:grid;place-items:center;font-family:var(--font-display);font-weight:800;font-size:17px;color:#080C1A}
.brand-dot{color:var(--cyan)}
.nav-links{display:flex;gap:4px}
.nav-link{background:none;border:none;color:var(--text-dim);padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:5px;transition:var(--transition-fast);white-space:nowrap;font-family:var(--font-body)}
.nav-link:hover{color:var(--text-primary);background:rgba(255,255,255,0.05)}
.nav-link.active{color:var(--cyan);background:rgba(0,212,255,0.1)}
.search-container{position:relative;flex:1;max-width:300px;margin-left:auto}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;opacity:0.5;pointer-events:none}
.search-input{width:100%;padding:9px 14px 9px 36px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:999px;color:#E8ECFF;font-size:13px;outline:none;transition:var(--transition-fast);font-family:var(--font-body)}
.search-input::placeholder{color:var(--text-dim)}
.search-input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,212,255,0.1)}
.auth-actions{display:flex;align-items:center;gap:10px;flex-shrink:0}
#authBtn{white-space:nowrap}
.user-badge{display:none;align-items:center;gap:7px;cursor:pointer}
.user-badge.logged-in{display:flex}
.user-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),var(--purple));display:grid;place-items:center;font-size:12px;font-weight:700;color:#080C1A}
.user-name{font-size:13px;font-weight:500;color:var(--text-primary)}

/* Stats Bar */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:14px 16px;display:flex;align-items:center;gap:12px;transition:var(--transition-fast)}
.stat-card:hover{background:var(--bg-card-hover);border-color:rgba(255,255,255,0.1)}
.stat-icon{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;font-size:18px;flex-shrink:0}
.stat-icon.cyan{background:rgba(0,212,255,0.12)}
.stat-icon.green{background:rgba(0,255,136,0.12)}
.stat-icon.gold{background:rgba(255,215,0,0.12)}
.stat-icon.purple{background:rgba(139,92,246,0.12)}
.stat-number{font-family:var(--font-display);font-size:22px;font-weight:800;line-height:1.1}
.stat-number.cyan{color:var(--cyan)}.stat-number.green{color:var(--neon-green)}.stat-number.gold{color:var(--gold)}.stat-number.purple{color:var(--purple)}
.stat-label{font-size:12px;color:var(--text-dim);margin-top:1px}

/* Hero Section */
.hero-section{position:relative;margin-bottom:24px;border-radius:var(--radius-xl);overflow:hidden;min-height:300px}
.hero-slide{position:absolute;inset:0;border-radius:var(--radius-xl);overflow:hidden;opacity:0;transition:opacity 0.6s ease;display:flex;align-items:flex-end;padding:36px;cursor:pointer}
.hero-slide.active{opacity:1;position:relative}
.hero-slide-bg{position:absolute;inset:0;z-index:0}
.hero-slide-content{position:relative;z-index:1;max-width:520px;background:linear-gradient(90deg,rgba(0,0,0,0.7),transparent);padding:24px 28px;border-radius:var(--radius-lg);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08)}
.hero-category{display:inline-block;padding:3px 10px;border-radius:999px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;background:rgba(0,212,255,0.15);color:var(--cyan)}

/* Hero JS-generated classes */
.hero-bg-glow{position:absolute;inset:0;z-index:0;overflow:hidden}
.hero-bg-glow .glow{position:absolute;border-radius:50%;filter:blur(100px)}
.hero-content{position:relative;z-index:1;max-width:500px;background:linear-gradient(90deg,rgba(0,0,0,0.65),transparent);padding:24px 28px;border-radius:var(--radius-lg);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08)}
.hero-badge{display:inline-block;padding:3px 10px;border-radius:4px;font-size:10px;font-weight:700;font-family:var(--font-mono);letter-spacing:0.05em;margin-bottom:8px}
.hero-badge.featured{background:rgba(0,212,255,0.15);color:var(--cyan)}
.hero-badge.new{background:rgba(0,255,136,0.15);color:var(--neon-green)}
.hero-badge.top{background:rgba(255,215,0,0.15);color:var(--gold)}
.hero-actions{display:flex;gap:10px;margin-top:12px}
.btn-play{background:var(--cyan);color:#080C1A;font-weight:700}
.btn-play:hover{box-shadow:0 0 24px var(--cyan-glow);transform:translateY(-1px)}
.hero-art{position:absolute;right:-5%;bottom:-5%;width:200px;height:200px;border-radius:50%;display:grid;place-items:center;font-size:72px;z-index:1;opacity:0.4}

/* Card JS-generated classes */
.play-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.5);display:grid;place-items:center;opacity:0;transition:var(--transition-fast);z-index:2}
.game-card:hover .play-overlay{opacity:1}
.play-btn-icon{width:48px;height:48px;border-radius:50%;background:var(--cyan);border:none;font-size:20px;cursor:pointer;display:grid;place-items:center;color:#080C1A;transition:var(--transition-bounce)}
.game-card:hover .play-btn-icon{transform:scale(1.1)}
.game-card-body .subtitle{font-size:11px;color:var(--text-dim);margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.game-card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px}
.game-card-tags .tag{font-size:10px;padding:1px 6px;border-radius:4px;background:rgba(255,255,255,0.05);color:var(--text-dim)}
.hot-badge-top{position:absolute;top:8px;left:8px;font-size:16px;z-index:1}
.hero-title{font-family:var(--font-display);font-size:26px;font-weight:700;margin-bottom:4px;line-height:1.2}
.hero-desc{font-size:14px;color:var(--text-secondary);margin-bottom:12px}
.hero-meta{display:flex;align-items:center;gap:12px;margin-bottom:14px;font-size:12px;color:var(--text-dim)}
.hero-stars{color:var(--gold);font-size:14px}
.hero-dots{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:2}
.hero-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.25);cursor:pointer;transition:var(--transition-fast);border:none}
.hero-dot.active{background:var(--cyan);width:24px;border-radius:4px}
.hero-arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:2;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.1);color:#fff;font-size:20px;cursor:pointer;display:grid;place-items:center;opacity:0;transition:var(--transition-fast);backdrop-filter:blur(8px)}
.hero-section:hover .hero-arrow{opacity:1}
.hero-arrow:hover{background:rgba(0,212,255,0.2);border-color:var(--cyan)}
.hero-arrow.prev{left:12px}.hero-arrow.next{right:12px}

/* Promo */
.promo-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.promo-card{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:16px 20px;display:flex;align-items:center;gap:14px;transition:var(--transition-fast);cursor:pointer}
.promo-card:hover{transform:translateY(-3px)}
.promo-card.hot:hover{border-color:rgba(255,51,102,0.3)}
.promo-card.new:hover{border-color:rgba(0,255,136,0.25)}
.promo-icon{width:40px;height:40px;border-radius:10px;display:grid;place-items:center;font-size:20px;flex-shrink:0}
.promo-card.hot .promo-icon{background:rgba(255,51,102,0.15)}
.promo-card.new .promo-icon{background:rgba(0,255,136,0.15)}
.promo-text{flex:1}.promo-text h3{font-size:15px;font-weight:700;margin-bottom:2px}.promo-text p{font-size:12px;color:var(--text-dim)}
.promo-count{font-family:var(--font-display);font-size:24px;font-weight:800}
.promo-card.hot .promo-count{color:var(--danger)}.promo-card.new .promo-count{color:var(--neon-green)}

/* Sections */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-family:var(--font-display);font-size:17px;font-weight:600}
.section-title .accent{color:var(--cyan)}
.section-more{background:none;border:none;color:var(--text-dim);font-size:13px;cursor:pointer;transition:var(--transition-fast);font-family:var(--font-body)}
.section-more:hover{color:var(--cyan)}

/* Trending */
.trending-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:10px;margin-bottom:24px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.trending-scroll::-webkit-scrollbar{display:none}
/* JS-generated trending cards */
.trend-card{flex:0 0 180px;border-radius:var(--radius-md);overflow:hidden;background:var(--bg-card);border:1px solid var(--border-subtle);transition:var(--transition-fast);cursor:pointer;scroll-snap-align:start}
.trend-card:hover{transform:translateY(-4px);border-color:var(--border-glow);box-shadow:var(--shadow-glow)}
.trend-cover{height:100px;display:flex;align-items:center;justify-content:center;font-size:36px;position:relative}
.trend-cover .badge{position:absolute;top:6px;left:6px;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;color:var(--gold);font-family:var(--font-mono);z-index:2}
.trend-cover .rank{position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,0.5);display:grid;place-items:center;font-size:10px;font-weight:700;color:var(--text-dim);font-family:var(--font-display)}
.trend-info{padding:10px 12px}
.trend-info h4{font-size:13px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trend-info .stars{font-size:11px;color:var(--gold)}
.trend-info .meta{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text-dim);margin-top:2px}

/* Category Pills */
.category-pills{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:16px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.category-pills::-webkit-scrollbar{display:none}
.category-pill{flex-shrink:0;padding:8px 18px;border-radius:999px;background:var(--bg-card);border:1px solid var(--border-subtle);color:var(--text-secondary);font-size:13px;font-weight:500;cursor:pointer;transition:var(--transition-fast);display:flex;align-items:center;gap:6px;font-family:var(--font-body)}
.category-pill:hover{background:var(--bg-card-hover);color:var(--text-primary)}
.category-pill.active{background:rgba(0,212,255,0.12);border-color:var(--cyan);color:var(--cyan)}

/* Filter Bar */
.filter-bar{display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:18px;padding:12px 16px;background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius-md)}
.filter-group{display:flex;align-items:center;gap:6px}
.filter-label{font-size:11px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.05em;margin-right:2px}
.tag-chip{padding:4px 12px;border-radius:999px;background:transparent;border:1px solid var(--border-subtle);color:var(--text-dim);font-size:12px;cursor:pointer;transition:var(--transition-fast);font-family:var(--font-body);white-space:nowrap}
.tag-chip:hover{background:rgba(255,255,255,0.05);color:var(--text-secondary)}
.tag-chip.active{background:rgba(139,92,246,0.15);border-color:var(--purple);color:var(--purple)}
.filter-divider{width:1px;height:20px;background:var(--border-subtle);flex-shrink:0}
.sort-select{padding:5px 10px;background:rgba(255,255,255,0.05);border:1px solid var(--border-subtle);border-radius:8px;color:var(--text-primary);font-size:12px;outline:none;cursor:pointer;font-family:var(--font-body)}
.sort-select option{background:#111827;color:#E8ECFF}
.filter-results-count{margin-left:auto;font-size:12px;color:var(--text-dim);white-space:nowrap}

/* Game Grid */
.game-grid-section{margin-bottom:36px}
.game-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.game-card{border-radius:var(--radius-md);overflow:hidden;background:var(--bg-card);border:1px solid var(--border-subtle);transition:var(--transition-med);cursor:pointer;position:relative}
.game-card:hover{transform:translateY(-6px);border-color:var(--border-glow);box-shadow:var(--shadow-glow)}
.game-card-cover{height:130px;display:flex;align-items:center;justify-content:center;font-size:44px;position:relative;overflow:hidden}
.game-card-cover .overlay{position:absolute;inset:0;background:rgba(0,0,0,0.5);display:grid;place-items:center;opacity:0;transition:var(--transition-fast)}
.game-card:hover .overlay{opacity:1}
.game-card-cover .play-btn{width:48px;height:48px;border-radius:50%;background:var(--cyan);border:none;font-size:20px;cursor:pointer;display:grid;place-items:center;color:#080C1A;transition:var(--transition-bounce)}
.game-card:hover .play-btn{transform:scale(1.1)}
.status-badge{position:absolute;top:8px;right:8px;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.03em;font-family:var(--font-mono)}
.status-badge.playable{background:var(--neon-green-dim);color:var(--neon-green);border:1px solid rgba(0,255,136,0.3)}
.status-badge.coming{background:var(--orange-dim);color:var(--orange);border:1px solid rgba(255,140,0,0.3)}
.game-card-body{padding:12px 14px 10px}
.game-card-body h3{font-size:14px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.game-card-body .tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px}
.game-card-body .tag{font-size:10px;padding:1px 6px;border-radius:4px;background:rgba(255,255,255,0.05);color:var(--text-dim)}
.game-card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:6px;border-top:1px solid var(--border-subtle)}
.game-card-footer .rating{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--gold);font-weight:600}
.game-card-footer .players{font-size:11px;color:var(--text-dim);display:flex;align-items:center;gap:3px}
.fav-btn{background:none;border:none;font-size:16px;cursor:pointer;color:var(--text-dim);transition:var(--transition-fast);padding:2px;line-height:1}
.fav-btn:hover{transform:scale(1.2)}
.fav-btn.active{color:var(--danger)}

/* Skeleton */
.skeleton-card{border-radius:var(--radius-md);overflow:hidden;background:var(--bg-card);border:1px solid var(--border-subtle);min-height:230px}
.skeleton-cover{height:130px;background:linear-gradient(90deg,rgba(255,255,255,0.03),rgba(255,255,255,0.06),rgba(255,255,255,0.03));background-size:200% 100%;animation:shimmer 1.5s infinite}
.skeleton-body{padding:12px 14px}
.skeleton-line{height:12px;background:linear-gradient(90deg,rgba(255,255,255,0.03),rgba(255,255,255,0.06),rgba(255,255,255,0.03));background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:4px;margin-bottom:8px}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

/* Pagination */
.pagination{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:28px}
.page-btn{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:8px;padding:8px 16px;color:var(--text-secondary);font-size:13px;cursor:pointer;transition:var(--transition-fast);font-family:var(--font-body);white-space:nowrap}
.page-btn:hover:not(:disabled){background:rgba(0,212,255,0.1);border-color:var(--cyan);color:var(--cyan)}
.page-btn:disabled{opacity:0.3;cursor:not-allowed}
.page-btn.active{background:var(--cyan);color:#080C1A;font-weight:700;border-color:var(--cyan)}

/* Coming Soon CTA */
.cs-cta-section{background:linear-gradient(135deg,rgba(0,212,255,0.05),rgba(139,92,246,0.05));border:1px solid var(--border-glow);border-radius:var(--radius-xl);padding:28px 32px;margin-bottom:28px;display:flex;align-items:center;justify-content:space-between;gap:20px}
.cs-cta-text h3{font-family:var(--font-display);font-size:18px;font-weight:600;margin-bottom:4px}
.cs-cta-text p{font-size:13px;color:var(--text-dim)}

/* Footer */
.footer{display:flex;align-items:center;justify-content:space-between;padding:20px 0;border-top:1px solid var(--border-subtle);flex-wrap:wrap;gap:10px}
.footer-text{font-size:12px;color:var(--text-dim)}
.footer-links{display:flex;gap:14px}
.footer-links a{color:var(--text-dim);text-decoration:none;font-size:12px;transition:var(--transition-fast)}
.footer-links a:hover{color:var(--cyan)}

/* Mobile Bottom Nav */
.mobile-bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(8,12,26,0.95);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,0.06);padding:6px 0 env(safe-area-inset-bottom,6px)}
.mobile-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--text-dim);font-size:10px;cursor:pointer;padding:6px 0;font-family:var(--font-body);transition:var(--transition-fast)}
.mobile-nav-item .icon{font-size:20px}
.mobile-nav-item.active{color:var(--cyan)}

/* Responsive */
@media(max-width:1024px){
  .game-grid{grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
  .promo-row{grid-template-columns:1fr}
  .filter-bar{flex-direction:column;align-items:stretch;gap:8px}
  .filter-group{flex-wrap:wrap}
  .stats-bar{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:768px){
  #app{padding:0 16px 80px}
  .top-nav{gap:10px}
  .nav-links{order:3;width:100%;justify-content:center}
  .search-container{max-width:none;margin-left:0}
  .brand{font-size:14px}
  .game-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .hero-slide{padding:20px}
  .hero-title{font-size:20px}
  .hero-slide-content{padding:16px 20px}
  .promo-row{gap:10px}.promo-card{padding:14px 16px}
  .section-title{font-size:15px}
  .stats-bar{grid-template-columns:repeat(2,1fr);gap:8px}
  .stat-number{font-size:18px}.stat-card{padding:10px 12px}.stat-icon{width:32px;height:32px;font-size:15px}
}
@media(max-width:640px){
  .game-grid{grid-template-columns:1fr 1fr;gap:8px}
  .game-card-cover{height:100px;font-size:32px}
  .mobile-bottom-nav{display:flex}
  .top-nav .nav-links{display:none}
  .hero-section{min-height:200px;border-radius:var(--radius-lg)}
  .hero-title{font-size:17px}.hero-desc{font-size:12px}
  .hero-slide-content{max-width:100%}
  .trending-card{flex:0 0 140px}.trending-cover{height:80px;font-size:28px}
  .footer{flex-direction:column;text-align:center}
  .cs-cta-section{flex-direction:column;text-align:center;padding:20px}
}
</style>
</head>
<body>

<div id="bg-canvas"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
<div class="toast-container" id="toastContainer"></div>

<!-- Auth Modal -->
<div class="modal-overlay" id="authModal">
  <div class="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <div id="loginForm">
      <div class="modal-title">🎮 欢迎回来</div>
      <div class="modal-subtitle">登录以同步收藏和游戏记录</div>
      <div class="form-group"><label class="form-label">用户名</label><input class="form-input" type="text" placeholder="输入用户名" id="loginUser"></div>
      <div class="form-group"><label class="form-label">密码</label><input class="form-input" type="password" placeholder="输入密码" id="loginPass"></div>
      <div id="authError"></div>
      <button class="btn btn-cyan form-submit" id="loginBtn">登录</button>
      <div class="form-switch">还没有账号？ <a id="switchRegister">注册</a></div>
    </div>
    <div id="registerForm" style="display:none">
      <div class="modal-title">🎮 创建账号</div>
      <div class="modal-subtitle">加入 CrabCLI，发现更多乐趣</div>
      <div class="form-group"><label class="form-label">用户名</label><input class="form-input" type="text" placeholder="设置用户名" id="regUser"></div>
      <div class="form-group"><label class="form-label">密码</label><input class="form-input" type="password" placeholder="设置密码" id="regPass"></div>
      <div class="form-group"><label class="form-label">确认密码</label><input class="form-input" type="password" placeholder="再次输入密码" id="regPass2"></div>
      <button class="btn btn-cyan form-submit" id="registerBtn">注册</button>
      <div class="form-switch">已有账号？ <a id="switchLogin">登录</a></div>
    </div>
  </div>
</div>

<div id="app">
  <nav class="top-nav">
    <a href="/" class="brand"><span class="brand-icon">C</span><span>CrabCLI<span class="brand-dot">.</span>Arcade</span></a>
    <div class="nav-links">
      <button class="nav-link active" data-tab="home"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 7.5L8 2l6 5.5"/><path d="M3.5 7v6h3v-3.5h3V13h3V7"/></svg> 首页</button>
      <button class="nav-link" data-tab="browse"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/><rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/></svg> 全部游戏</button>
      <button class="nav-link" data-tab="favorites"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 3.5C6.5 1.5 3.5 2 3.5 5s4.5 6 4.5 6 4.5-3 4.5-6-3-3.5-4.5-1.5z"/></svg> 收藏</button>
    </div>
    <div class="search-container"><span class="search-icon">🔍</span><input class="search-input" id="searchInput" placeholder="搜索游戏名称、类型..."></div>
    <div class="auth-actions">
      <div class="user-badge" id="userBadge"><div class="user-avatar" id="userAvatar">U</div><span class="user-name" id="userName">用户</span></div>
      <button class="btn btn-cyan" id="authBtn">登录</button>
    </div>
  </nav>

  <div class="stats-bar">
    <div class="stat-card"><div class="stat-icon cyan">🎮</div><div class="stat-info"><span class="stat-number cyan" id="statGames">0</span><span class="stat-label">游戏总数</span></div></div>
    <div class="stat-card"><div class="stat-icon green">✅</div><div class="stat-info"><span class="stat-number green" id="statPlayable">0</span><span class="stat-label">可游玩</span></div></div>
    <div class="stat-card"><div class="stat-icon gold">👥</div><div class="stat-info"><span class="stat-number gold" id="statOnline">0</span><span class="stat-label">在线玩家</span></div></div>
    <div class="stat-card"><div class="stat-icon purple">📂</div><div class="stat-info"><span class="stat-number purple" id="statCategories">0</span><span class="stat-label">游戏分类</span></div></div>
  </div>

  <section class="hero-section" id="heroSection">
    <button class="hero-arrow prev">‹</button>
    <button class="hero-arrow next">›</button>
    <div class="hero-dots" id="heroDots"></div>
  </section>

  <div class="promo-row">
    <div class="promo-card hot" data-promo="hot"><div class="promo-icon">🔥</div><div class="promo-text"><h3>热门榜单</h3><p>实时更新 · 玩家最多的游戏排行</p></div><span class="promo-count" id="promoHotCount">0</span></div>
    <div class="promo-card new" data-promo="new"><div class="promo-icon">🆕</div><div class="promo-text"><h3>新游上线</h3><p>最新加入 · 第一时间体验</p></div><span class="promo-count" id="promoNewCount">0</span></div>
  </div>

  <section>
    <div class="section-header"><h2 class="section-title"><span class="accent">🔥</span> 热门游戏 <span style="font-weight:400;font-size:13px;opacity:0.5;">· TOP 8</span></h2></div>
    <div class="trending-scroll" id="trendingScroll"></div>
  </section>

  <section class="category-section">
    <div class="section-header"><h2 class="section-title">📂 游戏分类</h2></div>
    <div class="category-pills" id="categoryPills"></div>
  </section>

  <div class="filter-bar">
    <div class="filter-group">
      <span class="filter-label">标签</span>
      <button class="tag-chip active" data-tag="all">全部</button>
      <button class="tag-chip" data-tag="singleplayer">单人</button>
      <button class="tag-chip" data-tag="multiplayer">多人</button>
      <button class="tag-chip" data-tag="competitive">竞技</button>
      <button class="tag-chip" data-tag="puzzle">益智</button>
      <button class="tag-chip" data-tag="action">动作</button>
    </div>
    <div class="filter-divider"></div>
    <div class="filter-group">
      <span class="filter-label">排序</span>
      <select class="sort-select" id="sortSelect">
        <option value="popular">🔥 热门</option>
        <option value="rating">⭐ 评分</option>
        <option value="newest">🕐 最新</option>
        <option value="alpha">🔤 A-Z</option>
      </select>
    </div>
    <span class="filter-results-count" id="resultsCount">加载中...</span>
  </div>

  <section class="game-grid-section">
    <div class="game-grid" id="gameGrid"></div>
    <div class="pagination" id="pagination">
      <button class="page-btn" id="prevPage" disabled>‹ 上一页</button>
      <span id="pageNumbers"></span>
      <button class="page-btn" id="nextPage">下一页 ›</button>
    </div>
  </section>

  <section class="cs-cta-section">
    <div class="cs-cta-text"><h3>🔔 还有 <span id="csCount">0</span> 款游戏即将上线</h3><p>更多精彩内容正在开发中，敬请期待！</p></div>
    <button class="btn btn-ghost" id="csBrowseBtn">浏览全部游戏 →</button>
  </section>

  <footer class="footer">
    <div class="footer-text">© 2026 CrabCLI Arcade · 游戏大厅 v3</div>
    <div class="footer-links"><a href="#">关于我们</a><a href="#">游戏接入</a><a href="#">帮助</a><a href="#">隐私政策</a></div>
  </footer>
</div>

<nav class="mobile-bottom-nav">
  <button class="mobile-nav-item active" data-mtab="home"><span class="icon">🏠</span><span>首页</span></button>
  <button class="mobile-nav-item" data-mtab="search"><span class="icon">🔍</span><span>搜索</span></button>
  <button class="mobile-nav-item" data-mtab="games"><span class="icon">🎮</span><span>游戏</span></button>
  <button class="mobile-nav-item" data-mtab="favorites"><span class="icon">❤️</span><span>收藏</span></button>
  <button class="mobile-nav-item" data-mtab="profile"><span class="icon">👤</span><span>我的</span></button>
</nav>

<script src="/hub/hub.js"></script>
</body>
</html>
