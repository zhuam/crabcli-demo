<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#FDF8F0">
<title>Guinea Pig Jigsaw — 豚鼠拼图</title>
<link rel="stylesheet" href="/games/shared/game-frame.css">
<style>
/* ═══════════════════════════════════════════════════════
   Guinea Pig Jigsaw — Full Game Implementation
   Design system: soft-warm (terracotta accent, warm cream bg)
   Issue: #80
   ═══════════════════════════════════════════════════════ */

:root {
  --color-bg:       oklch(0.97 0.015 75);
  --color-surface:  oklch(0.94 0.025 75);
  --color-border:   oklch(0.88 0.03 75);
  --color-text:     oklch(0.25 0.04 30);
  --color-muted:    oklch(0.55 0.04 50);
  --color-accent:   oklch(0.70 0.15 45);
  --color-accent-hover: oklch(0.62 0.15 45);
  --color-gold:     oklch(0.78 0.10 75);
  --color-green:    oklch(0.78 0.10 130);
  --font-sans:  'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-serif: 'Fraunces', Georgia, 'Times New Roman', serif;
  --font-mono:  'JetBrains Mono', 'Geist Mono', ui-monospace, monospace;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 20px;
  --radius-xl: 28px;
  --shadow-soft: 0 2px 6px oklch(0.85 0.03 60 / 0.3);
  --shadow-md:   0 4px 16px oklch(0.82 0.03 60 / 0.25);
  --shadow-lg:   0 8px 32px oklch(0.80 0.03 60 / 0.2);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-font-smoothing: antialiased; }
body {
  font-family: var(--font-sans);
  background: var(--color-bg);
  color: var(--color-text);
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
  overflow: hidden;
}

/* ─── Phone frame ─── */
.phone-frame {
  width: 100%;
  max-width: 420px;
  min-height: 720px;
  background: var(--color-surface);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-lg), 0 0 0 1px var(--color-border);
  overflow: hidden;
  position: relative;
}

/* ─── Screen base ─── */
.screen { display: none; padding: 32px 24px; }
.screen.active { display: flex; flex-direction: column; align-items: center; gap: 20px; }

/* ═══ TITLE SCREEN ═══ */
#screen-title {
  min-height: 720px;
  justify-content: center;
  text-align: center;
  padding-top: 48px;
  padding-bottom: 48px;
  gap: 18px;
}

/* ── Guinea pig mascot (pure CSS) ── */
.mascot-area {
  width: 140px;
  height: 140px;
  margin-bottom: 6px;
  position: relative;
  flex-shrink: 0;
}
.gp { width: 100%; height: 100%; position: relative; }
.gp-body {
  position: absolute; bottom: 20px; left: 50%;
  transform: translateX(-50%);
  width: 100px; height: 68px;
  background: oklch(0.75 0.06 55);
  border-radius: 50% 50% 45% 45%;
}
.gp-body::after {
  content: ''; position: absolute; bottom: -5px; left: 50%;
  transform: translateX(-50%);
  width: 40px; height: 7px;
  background: oklch(0.68 0.05 50);
  border-radius: 50%;
}
.gp-head {
  position: absolute; top: 28px; left: 50%;
  transform: translateX(-50%);
  width: 64px; height: 54px;
  background: oklch(0.80 0.05 50);
  border-radius: 50% 50% 40% 40%;
}
.gp-ear-l, .gp-ear-r {
  position: absolute; width: 22px; height: 18px;
  background: oklch(0.75 0.06 55);
  border-radius: 50% 50% 0 0; top: 24px;
}
.gp-ear-l { left: 12px; transform: rotate(-15deg); }
.gp-ear-r { right: 12px; transform: rotate(15deg); }
.gp-ear-l::after, .gp-ear-r::after {
  content: ''; position: absolute;
  width: 12px; height: 10px;
  background: oklch(0.88 0.04 55);
  border-radius: 50% 50% 0 0; top: 3px; left: 5px;
}
.gp-eye-l, .gp-eye-r {
  position: absolute; width: 8px; height: 9px;
  background: var(--color-text); border-radius: 50%; top: 38px;
}
.gp-eye-l { left: 20px; } .gp-eye-r { right: 20px; }
.gp-eye-l::after, .gp-eye-r::after {
  content: ''; position: absolute; width: 3px; height: 3px;
  background: white; border-radius: 50%; top: 2px; left: 3px;
}
.gp-nose {
  position: absolute; width: 7px; height: 5px;
  background: oklch(0.62 0.06 40);
  border-radius: 50%; top: 45px; left: 50%;
  transform: translateX(-50%);
}
.gp-mouth {
  position: absolute; width: 12px; height: 5px;
  border-bottom: 2px solid oklch(0.62 0.06 40);
  border-radius: 0 0 50% 50%; top: 49px;
  left: 50%; transform: translateX(-50%);
}
.gp-whisker-l, .gp-whisker-r {
  position: absolute; width: 26px; height: 1.5px;
  background: oklch(0.62 0.05 45); top: 45px;
}
.gp-whisker-l { left: 4px; transform: rotate(-8deg); }
.gp-whisker-r { right: 4px; transform: rotate(8deg); }

.game-title {
  font-family: var(--font-serif);
  font-size: 2rem; font-weight: 700;
  color: var(--color-text);
  letter-spacing: -0.02em; line-height: 1.15;
}
.game-subtitle {
  font-size: 0.9rem; color: var(--color-muted);
  margin-top: -8px; font-weight: 450;
}

/* ── Difficulty selector ── */
.difficulty-section {
  display: flex; flex-direction: column; gap: 10px;
  width: 100%; max-width: 300px;
}
.difficulty-label {
  font-size: 0.75rem; font-weight: 600;
  color: var(--color-muted);
  text-transform: uppercase; letter-spacing: 0.08em;
}
.difficulty-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.diff-btn {
  padding: 10px 6px;
  border: 2px solid var(--color-border);
  border-radius: var(--radius-md);
  background: var(--color-bg);
  font-family: var(--font-sans);
  font-size: 0.8rem; font-weight: 500;
  color: var(--color-muted); cursor: pointer;
  transition: all 0.2s ease;
  text-align: center;
  -webkit-tap-highlight-color: transparent;
}
.diff-btn:hover { border-color: var(--color-accent); color: var(--color-accent); }
.diff-btn.selected {
  border-color: var(--color-accent);
  background: var(--color-accent);
  color: white;
}
.diff-btn .diff-icon { display: block; font-size: 1.2rem; margin-bottom: 1px; }
.diff-btn .diff-count { font-size: 0.65rem; opacity: 0.7; display: block; margin-top: 1px; }
.diff-btn.selected .diff-count { opacity: 0.8; }

/* ── Buttons ── */
.btn-primary {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 8px; padding: 14px 32px; border: none;
  border-radius: var(--radius-lg);
  background: var(--color-accent); color: white;
  font-family: var(--font-sans);
  font-size: 1rem; font-weight: 600; cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: var(--shadow-soft);
  width: 100%; max-width: 300px;
  -webkit-tap-highlight-color: transparent;
}
.btn-primary:hover {
  background: var(--color-accent-hover);
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
}
.btn-primary:active { transform: translateY(0); }

.btn-secondary {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 6px; padding: 12px 24px;
  border: 2px solid var(--color-border);
  border-radius: var(--radius-lg);
  background: var(--color-bg);
  color: var(--color-text);
  font-family: var(--font-sans);
  font-size: 0.88rem; font-weight: 500;
  cursor: pointer; transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.btn-secondary:hover { border-color: var(--color-muted); background: var(--color-surface); }

.hs-bar {
  display: flex; align-items: center; justify-content: center;
  gap: 6px; font-size: 0.78rem; color: var(--color-muted);
  padding: 8px 16px; background: var(--color-bg);
  border-radius: var(--radius-md);
  width: 100%; max-width: 300px;
}
.hs-bar .gold { color: var(--color-gold); }

/* ═══ GAME SCREEN ═══ */
#screen-game { padding: 0; min-height: 720px; gap: 0; justify-content: flex-start; }

.game-header {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 12px 16px; gap: 10px;
  border-bottom: 1px solid var(--color-border);
  position: relative; z-index: 10;
  background: var(--color-surface);
  width: 100%; flex-shrink: 0;
}
.btn-icon {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border: none; border-radius: var(--radius-sm);
  background: var(--color-bg); color: var(--color-muted);
  cursor: pointer; font-size: 0.95rem;
  transition: all 0.15s;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.btn-icon:hover { background: var(--color-border); }
.btn-icon.muted { opacity: 0.4; }

.game-timer {
  font-family: var(--font-mono);
  font-size: 1.1rem; font-weight: 600;
  color: var(--color-text);
  min-width: 56px; text-align: center;
}
.game-timer.warning { color: var(--color-accent); animation: timerPulse 0.6s ease-in-out infinite alternate; }
@keyframes timerPulse { from { opacity: 1; } to { opacity: 0.5; } }

.progress-wrap {
  display: flex; align-items: center; gap: 8px;
  flex: 1; justify-content: flex-end;
}
.progress-track {
  width: 64px; height: 6px;
  background: var(--color-border);
  border-radius: 3px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: var(--color-accent);
  border-radius: 3px; transition: width 0.4s ease;
}
.progress-text {
  font-family: var(--font-mono);
  font-size: 0.7rem; color: var(--color-muted);
  min-width: 28px; text-align: right;
}

.game-board {
  flex: 1;
  display: flex; align-items: center; justify-content: center;
  padding: 16px; position: relative;
  min-height: 440px; width: 100%;
}
#board-canvas {
  width: 100%;
  max-width: 340px;
  aspect-ratio: 1 / 1;
  border-radius: var(--radius-lg);
  display: block;
  cursor: grab;
  touch-action: none;
}
#board-canvas:active { cursor: grabbing; }

/* ── Game footer toolbar ── */
.game-footer {
  display: flex; align-items: center; justify-content: center;
  gap: 6px; padding: 12px 16px;
  border-top: 1px solid var(--color-border);
  background: var(--color-surface);
  width: 100%; flex-shrink: 0;
}
.ft-btn {
  display: inline-flex; align-items: center;
  gap: 5px; padding: 8px 14px;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  background: var(--color-bg);
  color: var(--color-muted);
  font-family: var(--font-sans);
  font-size: 0.78rem; font-weight: 500;
  cursor: pointer; transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.ft-btn:hover { background: var(--color-surface); border-color: var(--color-muted); color: var(--color-text); }
.ft-btn.active { background: var(--color-accent); border-color: var(--color-accent); color: white; }
.ft-btn .ico { font-size: 0.95rem; }

/* ═══ RESULT SCREEN ═══ */
#screen-result {
  min-height: 720px;
  justify-content: center;
  text-align: center;
  padding-top: 40px;
  padding-bottom: 40px;
  gap: 16px;
  position: relative;
  overflow: hidden;
}

.result-badge {
  width: 96px; height: 96px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--color-gold), oklch(0.72 0.12 70));
  display: flex; align-items: center; justify-content: center;
  font-size: 2.6rem;
  box-shadow: 0 4px 20px oklch(0.78 0.10 75 / 0.3);
  position: relative; flex-shrink: 0;
}
.result-badge::after {
  content: ''; position: absolute; inset: -4px;
  border-radius: 50%;
  border: 2px solid oklch(0.78 0.10 75 / 0.2);
  animation: badgeRing 2.5s ease-in-out infinite;
}
@keyframes badgeRing {
  0%, 100% { transform: scale(1); opacity: 0.5; }
  50%      { transform: scale(1.08); opacity: 0; }
}

.result-title { font-family: var(--font-serif); font-size: 1.7rem; font-weight: 700; color: var(--color-text); }
.result-subtitle { font-size: 0.85rem; color: var(--color-muted); margin-top: -10px; }

.result-stats {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; width: 100%; max-width: 280px;
}
.stat-card {
  background: var(--color-bg);
  border-radius: var(--radius-md);
  padding: 14px 10px; text-align: center;
}
.stat-value {
  font-family: var(--font-mono);
  font-size: 1.25rem; font-weight: 600;
  color: var(--color-text);
}
.stat-label {
  font-size: 0.65rem; color: var(--color-muted);
  text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px;
}
.stat-card.new-record {
  background: linear-gradient(135deg, var(--color-gold), oklch(0.82 0.08 70));
  color: white;
}
.stat-card.new-record .stat-value { color: white; }
.stat-card.new-record .stat-label { color: oklch(0.95 0.02 80 / 0.8); }

.star-row { display: flex; gap: 5px; justify-content: center; font-size: 1.5rem; }
.star-row .on { color: var(--color-gold); }
.star-row .off { color: var(--color-border); }

.new-record-tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 12px;
  background: oklch(0.78 0.10 75 / 0.18);
  color: oklch(0.60 0.14 70);
  border-radius: 20px;
  font-size: 0.7rem; font-weight: 600; letter-spacing: 0.04em;
}

.result-buttons {
  display: flex; flex-direction: column; gap: 10px;
  width: 100%; max-width: 280px;
}

.saved-note { font-size: 0.68rem; color: var(--color-muted); opacity: 0.7; }

/* ── Star particles ── */
.star-particles {
  position: absolute; inset: 0;
  pointer-events: none; overflow: hidden;
}
.s-particle {
  position: absolute; width: 5px; height: 5px;
  background: var(--color-gold);
  border-radius: 50%;
  animation: starRain linear forwards;
  opacity: 0;
}
@keyframes starRain {
  0%   { transform: translateY(-10px) rotate(0deg); opacity: 1; }
  80%  { opacity: 0.5; }
  100% { transform: translateY(620px) rotate(720deg); opacity: 0; }
}

/* ═══ Responsive ═══ */
@media (max-width: 480px) {
  body { padding: 0; align-items: stretch; }
  .phone-frame { max-width: 100%; border-radius: 0; min-height: 100dvh; box-shadow: none; }
  .screen { min-height: 100dvh; }
  #screen-title { min-height: 100dvh; }
  #screen-game { min-height: 100dvh; }
  #screen-result { min-height: 100dvh; }
  .game-board { min-height: 50vh; }
}
@media (min-width: 481px) {
  body { background: oklch(0.92 0.02 70); }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.1ms !important;
  }
}
</style>
</head>
<body>

<div class="phone-frame">

  <!-- ══════════════ TITLE SCREEN ══════════════ -->
  <section id="screen-title" class="screen active">
    <div class="mascot-area" aria-label="豚鼠吉祥物">
      <div class="gp">
        <div class="gp-ear-l"></div>
        <div class="gp-ear-r"></div>
        <div class="gp-head">
          <div class="gp-eye-l"></div>
          <div class="gp-eye-r"></div>
          <div class="gp-nose"></div>
          <div class="gp-mouth"></div>
        </div>
        <div class="gp-body">
          <div class="gp-whisker-l"></div>
          <div class="gp-whisker-r"></div>
        </div>
      </div>
    </div>

    <h1 class="game-title">Guinea Pig Jigsaw</h1>
    <p class="game-subtitle">拖拽拼块，完成可爱豚鼠照片</p>

    <div class="difficulty-section">
      <span class="difficulty-label">选择难度</span>
      <div class="difficulty-grid">
        <button class="diff-btn" data-diff="easy">
          <span class="diff-icon">🐣</span> 入门
          <span class="diff-count">2×2 · 4块</span>
        </button>
        <button class="diff-btn selected" data-diff="medium">
          <span class="diff-icon">🐹</span> 简单
          <span class="diff-count">3×3 · 9块</span>
        </button>
        <button class="diff-btn" data-diff="hard">
          <span class="diff-icon">🏆</span> 挑战
          <span class="diff-count">4×4 · 16块</span>
        </button>
      </div>
    </div>

    <button class="btn-primary" id="btn-start">开始游戏 →</button>

    <div class="hs-bar" id="hs-bar">
      <span class="gold">★</span>
      <span id="hs-text">简单模式最佳：--:-- · 0分</span>
    </div>
  </section>

  <!-- ══════════════ GAME SCREEN ══════════════ -->
  <section id="screen-game" class="screen">
    <div class="game-header">
      <button class="btn-icon" id="btn-back-menu" aria-label="返回菜单">←</button>
      <span class="game-timer" id="game-timer" aria-live="polite">00:00</span>
      <button class="btn-icon" id="btn-mute" aria-label="切换音效">🔊</button>
      <div class="progress-wrap">
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <span class="progress-text" id="progress-text">0/9</span>
      </div>
    </div>

    <div class="game-board">
      <canvas id="board-canvas"></canvas>
    </div>

    <div class="game-footer">
      <button class="ft-btn active" id="btn-preview">
        <span class="ico">👁️</span> 预览
      </button>
      <button class="ft-btn" id="btn-shuffle">
        <span class="ico">🔀</span> 洗牌
      </button>
      <button class="ft-btn" id="btn-photo">
        <span class="ico">📸</span> 换图
      </button>
    </div>
  </section>

  <!-- ══════════════ RESULT SCREEN ══════════════ -->
  <section id="screen-result" class="screen">
    <div class="star-particles" id="star-particles"></div>

    <div class="result-badge" id="result-badge">🎉</div>

    <h2 class="result-title" id="result-title">恭喜通关!</h2>
    <p class="result-subtitle" id="result-subtitle">你完成了这幅豚鼠拼图</p>

    <div class="result-stats">
      <div class="stat-card">
        <div class="stat-value" id="res-time">00:00</div>
        <div class="stat-label">用时</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="res-score">0</div>
        <div class="stat-label">得分</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="res-best">00:00</div>
        <div class="stat-label">个人最佳</div>
      </div>
      <div class="stat-card" id="res-new-record" style="display:none">
        <div class="stat-value">🏆 NEW!</div>
        <div class="stat-label">新纪录</div>
      </div>
    </div>

    <div class="star-row" id="star-rating">
      <span class="on">★</span>
      <span class="on">★</span>
      <span class="on">★</span>
      <span class="on">★</span>
      <span class="off">★</span>
    </div>

    <div class="new-record-tag" id="record-tag" style="display:none">⭐ 首次通关!</div>

    <div class="result-buttons">
      <button class="btn-primary" id="btn-replay">再来一局 →</button>
      <button class="btn-secondary" id="btn-menu">← 返回菜单</button>
    </div>

    <p class="saved-note">得分已保存到本地</p>
  </section>

</div>

<script>
(function() {
  'use strict';

  /* ═══════════════════════════════════════════
     CONSTANTS & STATE
     ═══════════════════════════════════════════ */

  var DIFFICULTIES = {
    easy:   { cols: 2, rows: 2, threshold: 64, label: '入门' },
    medium: { cols: 3, rows: 3, threshold: 48, label: '简单' },
    hard:   { cols: 4, rows: 4, threshold: 36, label: '挑战' }
  };

  var MAX_TIME = 180; // 3 minutes
  var state = {
    screen: 'title',
    difficulty: 'medium',
    pieces: [],
    cols: 3,
    rows: 3,
    snappedCount: 0,
    dragPiece: null,
    dragOffsetX: 0,
    dragOffsetY: 0,
    dragStartX: 0,
    dragStartY: 0,
    timer: 0,
    timerStarted: false,
    timerRunning: false,
    timerRAF: null,
    animFrame: null,
    ghostVisible: true,
    sfxEnabled: true,
    muted: false,
    canvasW: 0,
    canvasH: 0,
    pieceW: 0,
    pieceH: 0,
    sourceImage: null,
    imageLoaded: false,
    glowAnimations: [],
    gameImageIndex: 0
  };

  /* ═══════════════════════════════════════════
     DOM REFERENCES
     ═══════════════════════════════════════════ */

  var $ = function(id) { return document.getElementById(id); };
  var canvas = $('board-canvas');
  var ctx = canvas.getContext('2d');

  /* ═══════════════════════════════════════════
     IMAGE GENERATION — draw guinea pig on canvas
     ═══════════════════════════════════════════ */

  var IMAGE_COUNT = 5;
  var IMAGE_SEEDS = [
    // Seed 0: Classic brown guinea pig

      if (p.snapped) continue;
      if (px >= p.currentX && px <= p.currentX + p.w &&
          py >= p.currentY && py <= p.currentY + p.h) {
        return p;
      }
    }
    return null;
  }

  function onPointerDown(e) {
    if (state.screen !== 'playing') return;
    e.preventDefault();
    var pos = getCanvasPos(e);
    var piece = hitTest(pos.x, pos.y);
    if (piece) {
      state.dragPiece = piece;
      state.dragOffsetX = pos.x - piece.currentX;
      state.dragOffsetY = pos.y - piece.currentY;
      state.dragStartX = piece.currentX;
      state.dragStartY = piece.currentY;

      // Start timer on first pickup
      if (!state.timerStarted) {
        state.timerStarted = true;
        startTimer();
      }

      pointerId = e.pointerId;
      try { canvas.setPointerCapture(e.pointerId); } catch(ex) {}

      sfxPickup();
      if (navigator.vibrate) navigator.vibrate(10);
    }
  }

  function onPointerMove(e) {
    if (!state.dragPiece) return;
    e.preventDefault();
    var pos = getCanvasPos(e);
    state.dragPiece.currentX = pos.x - state.dragOffsetX;
    state.dragPiece.currentY = pos.y - state.dragOffsetY;

    // Snap preview: if close to home position, glow
    var dx = state.dragPiece.homeX - state.dragPiece.currentX;
    var dy = state.dragPiece.homeY - state.dragPiece.currentY;
    var dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < state.diffThreshold * 1.5) {
      // Within snap preview range
    }
  }

  function onPointerUp(e) {
    if (!state.dragPiece) return;
    e.preventDefault();
    var piece = state.dragPiece;

    // Check snap
    var dx = piece.homeX - piece.currentX;
    var dy = piece.homeY - piece.currentY;
    var dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < state.diffThreshold) {
      // Snap!
      piece.currentX = piece.homeX;
      piece.currentY = piece.homeY;
      piece.snapped = true;
      piece.snapGlow = 1.0;
      state.snappedCount++;
      sfxSnap();

      // Add glow animation
      state.glowAnimations.push({ piece: piece, alpha: 0.5 });

      // Update progress
      updateProgress();

      // Check win
      if (state.snappedCount >= state.pieces.length) {
        state.timerRunning = false;
        state.screen = 'complete';
        sfxComplete();
        showResult(true);
        return;
      }
    } else {
      sfxWrongDrop();
    }

    state.dragPiece = null;
    pointerId = null;
    try { canvas.releasePointerCapture(e.pointerId); } catch(ex) {}
  }

  /* ═══════════════════════════════════════════
     TIMER
     ═══════════════════════════════════════════ */

  var timerLastTime = 0;

  function startTimer() {
    state.timerRunning = true;
    state.timer = 0;
    timerLastTime = performance.now();
    timerTick();
  }

  function timerTick() {
    if (!state.timerRunning) return;
    var now = performance.now();
    var delta = (now - timerLastTime) / 1000;
    timerLastTime = now;
    state.timer += delta;

    if (state.timer >= MAX_TIME) {
      state.timer = MAX_TIME;
      state.timerRunning = false;
      // Time's up — complete with current score
      showResult(false);
      return;
    }

    updateTimerDisplay();
    state.timerRAF = requestAnimationFrame(timerTick);
  }

  function updateTimerDisplay() {
    var t = Math.round(state.timer);
    var mins = Math.floor(t / 60);
    var secs = t % 60;
    $('game-timer').textContent = pad(mins) + ':' + pad(secs);
    if (state.timer > MAX_TIME - 15) {
      $('game-timer').classList.add('warning');
    }
  }

  function pad(n) {
    return n < 10 ? '0' + n : '' + n;
  }

  /* ═══════════════════════════════════════════
     PROGRESS & SCORING
     ═══════════════════════════════════════════ */

  function updateProgress() {
    var total = state.pieces.length;
    var done = state.snappedCount;
    var pct = (done / total) * 100;
    $('progress-fill').style.width = pct + '%';
    $('progress-text').textContent = done + '/' + total;
  }

  function calcScore() {
    var baseScore = state.pieces.length * 100;
    var timeBonus = Math.max(0, (MAX_TIME - Math.round(state.timer)) * 10);
    return baseScore + timeBonus;
  }

  function calcStars(score, difficulty) {
    var thresholds = {
      easy:   { three: 600, four: 800, five: 1000 },
      medium: { three: 900, four: 1200, five: 1500 },
      hard:   { three: 1600, four: 2000, five: 2400 }
    };
    var t = thresholds[difficulty] || thresholds.medium;
    if (score >= t.five) return 5;
    if (score >= t.four) return 4;
    if (score >= t.three) return 3;
    if (score >= t.three * 0.6) return 2;
    return 1;
  }

  function loadBest() {
    try {
      var data = JSON.parse(localStorage.getItem('guinea-pig-jigsaw')) || {};
      return data;
    } catch(e) { return {}; }
  }

  function saveBest(difficulty, score, timeSec) {
    var data = loadBest();
    var key = difficulty;
    var prev = data[key];
    var isNewRecord = !prev || score > prev.bestScore;
    if (isNewRecord) {
      data[key] = { bestScore: score, bestTime: timeSec };
      localStorage.setItem('guinea-pig-jigsaw', JSON.stringify(data));
    }
    return { isNewRecord: isNewRecord, prevBest: prev ? prev.bestScore : 0 };
  }

  function updateHSBar() {
    var data = loadBest();
    var key = state.difficulty;
    var d = DIFFICULTIES[state.difficulty];
    var entry = data[key];
    var label = d ? d.label : '简单';
    if (entry) {
      var mins = Math.floor(entry.bestTime / 60);
      var secs = entry.bestTime % 60;
      $('hs-text').textContent = label + '模式最佳：' + pad(mins) + ':' + pad(secs) + ' · ' + entry.bestScore + '分';
    } else {
      $('hs-text').textContent = label + '模式最佳：--:-- · 0分';
    }
  }

  /* ═══════════════════════════════════════════
     SCREEN MANAGEMENT
     ═══════════════════════════════════════════ */

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(function(s) {
      s.classList.remove('active');
    });
    var target = $(id);
    if (target) target.classList.add('active');
    state.screen = id === 'screen-title' ? 'title' : (id === 'screen-game' ? 'playing' : 'complete');
  }

  function showResult(won) {
    showScreen('screen-result');

    var score = calcScore();
    var timeSec = Math.round(state.timer);
    var mins = Math.floor(timeSec / 60);
    var secs = timeSec % 60;
    var stars = calcStars(score, state.difficulty);
    var result = saveBest(state.difficulty, score, timeSec);

    $('res-time').textContent = pad(mins) + ':' + pad(secs);
    $('res-score').textContent = score;

    // Best display
    var data = loadBest();
    var entry = data[state.difficulty];
    if (entry) {
      var bm = Math.floor(entry.bestTime / 60);
      var bs = entry.bestTime % 60;
      $('res-best').textContent = pad(bm) + ':' + pad(bs);
    } else {
      $('res-best').textContent = '--:--';
    }

    // New record
    if (result.isNewRecord) {
      $('res-new-record').style.display = 'block';
      $('record-tag').style.display = 'inline-flex';
      $('record-tag').textContent = '⭐ ' + (won ? '新纪录!' : '超时但新纪录!');
    } else {
      $('res-new-record').style.display = 'none';
      $('record-tag').style.display = 'none';
    }

    // Stars
    var starHtml = '';
    for (var si = 0; si < 5; si++) {
      starHtml += '<span class="' + (si < stars ? 'on' : 'off') + '">★</span>';
    }
    $('star-rating').innerHTML = starHtml;

    // Title
    $('result-title').textContent = won ? '恭喜通关!' : '时间到!';
    $('result-subtitle').textContent = won ? '你完成了这幅豚鼠拼图' : '下次再快一点哦';

    // Badge
    $('result-badge').textContent = won ? '🎉' : '⏰';

    // Stars particles
    spawnStars();
  }

  function spawnStars() {
    var c = $('star-particles');
    if (!c) return;
    c.innerHTML = '';
    for (var i = 0; i < 28; i++) {
      var star = document.createElement('div');
      star.className = 's-particle';
      star.style.left = Math.random() * 100 + '%';
      star.style.animationDuration = (1.6 + Math.random() * 2) + 's';
      star.style.animationDelay = (Math.random() * 1.8) + 's';
      star.style.width = (3 + Math.random() * 5) + 'px';
      star.style.height = star.style.width;
      c.appendChild(star);
    }
  }

  /* ═══════════════════════════════════════════
     GAME SETUP
     ═══════════════════════════════════════════ */

  function startGame(difficulty) {
    state.difficulty = difficulty;
    var diff = DIFFICULTIES[difficulty];
    if (!diff) { diff = DIFFICULTIES.medium; difficulty = 'medium'; }
    state.cols = diff.cols;
    state.rows = diff.rows;
    state.diffThreshold = diff.threshold;

    // Reset state
    state.snappedCount = 0;
    state.timer = 0;
    state.timerStarted = false;
    state.timerRunning = false;
    state.dragPiece = null;
    state.glowAnimations = [];
    state.pieces = [];
    state.imageLoaded = false;

    if (state.timerRAF) { cancelAnimationFrame(state.timerRAF); state.timerRAF = null; }

    $('game-timer').textContent = '00:00';
    $('game-timer').classList.remove('warning');

    var canvasSize = getCanvasSize();
    var cw = canvasSize.w;
    var ch = canvasSize.h;

    // Load image
    state.gameImageIndex = (state.gameImageIndex + 1) % IMAGE_COUNT;
    generateImage(state.gameImageIndex, Math.max(cw, ch), function(img) {
      if (!img) return;
      state.sourceImage = img;
      state.imageLoaded = true;

      state.pieces = initPieces(img, state.cols, state.rows, cw, ch);
      shufflePieces(state.pieces, cw, ch, state.cols, state.rows);
      state.snappedCount = 0;
      updateProgress();

      showScreen('screen-game');
      state.screen = 'playing';

      if (state.animFrame) cancelAnimationFrame(state.animFrame);
      gameLoop();
    });
  }

  function getCanvasSize() {
    var rect = canvas.parentElement.getBoundingClientRect();
    var size = Math.min(rect.width - 16, rect.height - 16, 340);
    var dpr = window.devicePixelRatio || 1;
    var w = Math.round(size);
    var h = Math.round(size);
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    canvas.width = Math.round(w * dpr);
    canvas.height = Math.round(h * dpr);
    ctx.scale(dpr, dpr);
    state.canvasW = w;
    state.canvasH = h;
    return { w: w, h: h };
  }

  function gameLoop() {
    if (state.screen === 'playing' || state.screen === 'title') {
      render();
      state.animFrame = requestAnimationFrame(gameLoop);
    }
  }

  /* ═══════════════════════════════════════════
     CUSTOM PHOTO UPLOAD
     ═══════════════════════════════════════════ */

  function handleCustomPhoto(file) {
    if (!file || !file.type.match(/image\/.*/)) return;
    var reader = new FileReader();
    reader.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        state.sourceImage = img;
        state.imageLoaded = true;
        // Re-init pieces with new image
        var cw = state.canvasW;
        var ch = state.canvasH;
        state.pieces = initPieces(img, state.cols, state.rows, cw, ch);
        shufflePieces(state.pieces, cw, ch, state.cols, state.rows);
        state.snappedCount = 0;
        updateProgress();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  /* ═══════════════════════════════════════════
     EVENT BINDING
     ═══════════════════════════════════════════ */

  function init() {
    // Canvas pointer events
    canvas.addEventListener('pointerdown', onPointerDown);
    canvas.addEventListener('pointermove', onPointerMove);
    canvas.addEventListener('pointerup', onPointerUp);
    canvas.addEventListener('pointercancel', onPointerUp);

    // Keyboard support
    document.addEventListener('keydown', function(e) {
      if (state.screen === 'playing' && state.dragPiece) {
        var step = e.shiftKey ? 8 : 4;
        switch (e.key) {
          case 'ArrowLeft':  state.dragPiece.currentX -= step; e.preventDefault(); break;
          case 'ArrowRight': state.dragPiece.currentX += step; e.preventDefault(); break;
          case 'ArrowUp':    state.dragPiece.currentY -= step; e.preventDefault(); break;
          case 'ArrowDown':  state.dragPiece.currentY += step; e.preventDefault(); break;
          case 'Enter':
          case ' ':
            // Snap check at current position
            var dx = state.dragPiece.homeX - state.dragPiece.currentX;
            var dy = state.dragPiece.homeY - state.dragPiece.currentY;
            var dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < state.diffThreshold) {
              state.dragPiece.currentX = state.dragPiece.homeX;
              state.dragPiece.currentY = state.dragPiece.homeY;
              state.dragPiece.snapped = true;
              state.dragPiece.snapGlow = 1.0;
              state.snappedCount++;
              sfxSnap();
              state.glowAnimations.push({ piece: state.dragPiece, alpha: 0.5 });
              updateProgress();
              if (state.snappedCount >= state.pieces.length) {
                state.timerRunning = false;
                state.screen = 'complete';
                sfxComplete();
                showResult(true);
                return;
              }
            }
            state.dragPiece = null;
            e.preventDefault();
            break;
          case 'Escape':
            state.dragPiece = null;
            e.preventDefault();
            break;
        }
      }
    });

    // Difficulty selection
    document.querySelectorAll('.diff-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.diff-btn').forEach(function(b) { b.classList.remove('selected'); });
        this.classList.add('selected');
        state.difficulty = this.getAttribute('data-diff');
        updateHSBar();
      });
    });

    // Start button
    $('btn-start').addEventListener('click', function(e) {
      initAudio();
      state.muted = false;
      $('btn-mute').textContent = '🔊';
      $('btn-mute').classList.remove('muted');
      startGame(state.difficulty);
    });

    // Back to menu (from game)
    $('btn-back-menu').addEventListener('click', function() {
      state.timerRunning = false;
      if (state.timerRAF) cancelAnimationFrame(state.timerRAF);
      if (state.animFrame) cancelAnimationFrame(state.animFrame);
      state.dragPiece = null;
      showScreen('screen-title');
      updateHSBar();
    });

    // Mute toggle
    $('btn-mute').addEventListener('click', function() {
      state.muted = !state.muted;
      this.textContent = state.muted ? '🔇' : '🔊';
      this.classList.toggle('muted', state.muted);
    });

    // Preview toggle (ghost overlay)
    $('btn-preview').addEventListener('click', function() {
      state.ghostVisible = !state.ghostVisible;
      this.classList.toggle('active', state.ghostVisible);
    });

    // Shuffle button
    $('btn-shuffle').addEventListener('click', function() {
      if (state.pieces.length === 0) return;
      var unsnapped = state.pieces.filter(function(p) { return !p.snapped; });
      if (unsnapped.length === 0) return;

      // Re-shuffle unsnapped positions
      var indices = [];
      for (var i = 0; i < unsnapped.length; i++) indices.push(i);
      for (var i = indices.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = indices[i]; indices[i] = indices[j]; indices[j] = tmp;
      }

      var canvasW = state.canvasW;
      var canvasH = state.canvasH;
      var pw = state.pieceW;
      var ph = state.pieceH;
      var padding = 8;
      var centerX = canvasW / 2;
      var centerY = canvasH / 2;
      var spreadX = canvasW * 0.35;
      var spreadY = canvasH * 0.35;

      unsnapped.forEach(function(p, idx) {
        var ox = (Math.random() - 0.5) * spreadX * 2;
        var oy = (Math.random() - 0.5) * spreadY * 2;
        var x = centerX - pw/2 + ox;
        var y = centerY - ph/2 + oy;
        x = Math.max(padding, Math.min(x, canvasW - p.w - padding));
        y = Math.max(padding, Math.min(y, canvasH - p.h - padding));
        p.currentX = x;
        p.currentY = y;
      });
    });

    // Photo upload button
    $('btn-photo').addEventListener('click', function() {
      var input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.addEventListener('change', function(e) {
        if (e.target.files && e.target.files[0]) {
          handleCustomPhoto(e.target.files[0]);
        }
      });
      input.click();
    });

    // Replay
    $('btn-replay').addEventListener('click', function() {
      // Cycle to next image for replay
      state.gameImageIndex = (state.gameImageIndex + 1) % IMAGE_COUNT;
      initAudio();
      startGame(state.difficulty);
    });

    // Menu from result
    $('btn-menu').addEventListener('click', function() {
      showScreen('screen-title');
      updateHSBar();
    });

    // Initial sizing
    getCanvasSize();

    // Initial high score display
    updateHSBar();

    // Report played game
    if (window.recordPlayed) {
      window.recordPlayed('guinea-pig-jigsaw');
    }

    // Start render loop (shows board even on title)
    gameLoop();

    console.log('Guinea Pig Jigsaw v1.0 loaded');
  }

  // Start when DOM ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
</script>
</body>
</html>
