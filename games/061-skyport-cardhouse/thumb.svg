<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <rect width="120" height="120" rx="12" fill="#0b0f1c"/>
  <!-- Stars -->
  <circle cx="20" cy="15" r="1" fill="rgba(255,255,255,0.6)"/>
  <circle cx="100" cy="25" r="1" fill="rgba(255,255,255,0.5)"/>
  <circle cx="50" cy="10" r="1.5" fill="rgba(255,255,255,0.7)"/>
  <circle cx="85" cy="50" r="1" fill="rgba(255,255,255,0.3)"/>
  <circle cx="15" cy="70" r="1" fill="rgba(255,255,255,0.4)"/>
  <circle cx="105" cy="80" r="1" fill="rgba(255,255,255,0.5)"/>
  <!-- Pyramid: 5 card rows -->
  <!-- Row 1 (top) -->
  <rect x="52" y="18" width="16" height="20" rx="2" fill="rgba(255,200,60,0.7)" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="60" y="32" text-anchor="middle" font-size="10">🏠</text>
  <!-- Row 2 -->
  <rect x="42" y="40" width="16" height="18" rx="2" fill="rgba(60,180,220,0.4)" stroke="rgba(60,180,220,0.6)" stroke-width="0.8"/>
  <rect x="62" y="40" width="16" height="18" rx="2" fill="rgba(80,200,120,0.4)" stroke="rgba(80,200,120,0.6)" stroke-width="0.8"/>
  <!-- Row 3 -->
  <rect x="32" y="60" width="14" height="16" rx="2" fill="rgba(60,180,220,0.3)" stroke="rgba(60,180,220,0.5)" stroke-width="0.6"/>
  <rect x="48" y="60" width="14" height="16" rx="2" fill="rgba(255,200,60,0.4)" stroke="rgba(255,200,60,0.5)" stroke-width="0.6"/>
  <rect x="64" y="60" width="14" height="16" rx="2" fill="rgba(200,120,255,0.4)" stroke="rgba(200,120,255,0.6)" stroke-width="0.6"/>
  <!-- Row 4 -->
  <rect x="22" y="78" width="12" height="14" rx="2" fill="rgba(60,180,220,0.25)" stroke="rgba(60,180,220,0.4)" stroke-width="0.5"/>
  <rect x="36" y="78" width="12" height="14" rx="2" fill="rgba(80,200,120,0.3)" stroke="rgba(80,200,120,0.4)" stroke-width="0.5"/>
  <rect x="50" y="78" width="12" height="14" rx="2" fill="rgba(60,180,220,0.3)" stroke="rgba(60,180,220,0.4)" stroke-width="0.5"/>
  <rect x="64" y="78" width="12" height="14" rx="2" fill="rgba(80,200,120,0.25)" stroke="rgba(80,200,120,0.4)" stroke-width="0.5"/>
  <!-- Title text -->
  <text x="60" y="110" text-anchor="middle" font-size="8" font-weight="600" fill="#e8edf5" font-family="sans-serif">SKYPORT</text>
</svg>
