<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Idle Lemonade Stand · Smoke Tests</title>
  <style>
    body { font-family: -apple-system, "PingFang SC", sans-serif; padding: 16px; max-width: 760px; margin: 0 auto; background:#FFF8E7; color:#5C3A21;}
    h1 { font-size: 18px; }
    .test { padding: 6px 10px; margin: 4px 0; border-radius: 6px; font-family: monospace; font-size: 13px; word-break: break-all; }
    .pass { background: #e6f7e6; color: #0a6b0a; }
    .fail { background: #fde6e6; color: #a02020; }
    .info { background: #fff7d5; color: #5C3A21; }
    #summary { font-weight: 800; font-size: 16px; padding: 10px; border-radius: 8px; margin: 12px 0; }
    .ok { background: #6BCB77; color: white; }
    .ng { background: #E26D5A; color: white; }
    iframe { width: 100%; height: 320px; border: 1px solid #ccc; border-radius: 8px; margin-top: 16px;}
    button { padding: 8px 14px; font-weight: 700; border-radius: 6px; border:1px solid #5C3A21; background:#F9D423; cursor:pointer;}
  </style>
</head>
<body>
  <h1>🍋 Idle Lemonade Stand · Smoke Tests</h1>
  <p>验证 Issue #99 验收标准。打开此页面，会自动加载 ../index.html 到 iframe 并运行断言。</p>
  <button id="runBtn">▶ Run Tests</button>
  <div id="summary"></div>
  <div id="results"></div>
  <iframe id="frame" src="../index.html" title="game under test"></iframe>

  <script>
    const results = document.getElementById('results');
    const summary = document.getElementById('summary');
    let pass = 0, fail = 0;

    function record(name, ok, detail = '') {
      const div = document.createElement('div');
      div.className = 'test ' + (ok ? 'pass' : 'fail');
      div.textContent = (ok ? '✅ PASS  ' : '❌ FAIL  ') + name + (detail ? '  — ' + detail : '');
      results.appendChild(div);
      ok ? pass++ : fail++;
    }
    function info(text) {
      const div = document.createElement('div');
      div.className = 'test info';
      div.textContent = 'ℹ️  ' + text;
      results.appendChild(div);
    }
    function assert(name, cond, detail = '') { record(name, !!cond, detail); }

    async function runTests() {
      results.innerHTML = '';
      pass = 0; fail = 0;
      summary.textContent = 'running...';
      summary.className = '';

      const frame = document.getElementById('frame');
      // reload to get clean state
      await new Promise(res => {
        frame.onload = () => setTimeout(res, 800); // give app.js time to boot loop
        frame.src = '../index.html?t=' + Date.now();
      });

      const doc = frame.contentDocument;
      const win = frame.contentWindow;

      // ------- AC1: 首屏 3 秒可进入游玩 (核心 DOM + 主按钮立即可点) -------
      info('=== Acceptance: DOM & First-Screen ===');
      const requiredIds = [
        'cashDisplay', 'timeDisplay', 'bestDisplay', 'muteBtn',
        'progressFill', 'progressLabel', 'stage', 'floatLayer',
        'sellBtn', 'sellPrice', 'cpsHint',
        'tab-price', 'tab-staff', 'tab-upgrade',
        'panel-price', 'panel-staff', 'panel-upgrade',
        'priceCur', 'priceSub', 'staffList', 'upgradeList',
        'resultModal', 'resultTitle', 'resultEarn', 'resultTime', 'resultBest', 'restartBtn',
        'toast'
      ];
      for (const id of requiredIds) {
        assert('#' + id + ' exists', !!doc.getElementById(id));
      }

      // status bar / tab bar / settings (mute) all rendered
      assert('header.status-bar present', !!doc.querySelector('header.status-bar'));
      assert('canvas#stage present', !!doc.querySelector('canvas#stage'));
      assert('main.stage wraps canvas', !!doc.querySelector('main.stage canvas'));
      assert('nav.tab-bar with 3 tabs', doc.querySelectorAll('nav.tab-bar .tab').length === 3);
      assert('main sell button is enabled', !doc.getElementById('sellBtn').disabled);
      assert('progress bar has 0% width on boot', doc.getElementById('progressFill').style.width.startsWith('0'));

      // ------- AC2: 单局 ≤ 3 分钟 — 通过 CONFIG 校验 (MAX_GAME_SEC = 240, IPO_GOAL = 1e6) -------
      info('=== Acceptance: Game length & IPO threshold ===');
      const appText = await fetch('../app.js').then(r => r.text());
      assert('CONFIG.IPO_GOAL = 1_000_000 in source', /IPO_GOAL:\s*1_?000_?000/.test(appText));
      assert('CONFIG.MAX_GAME_SEC ≤ 240 (≤4 min cap)', /MAX_GAME_SEC:\s*240/.test(appText));
      assert('save/load via localStorage helpers (lsGet/lsSet)', /lsGet\s*\(/.test(appText) && /lsSet\s*\(/.test(appText));
      assert('localStorage key idle_lemonade_best defined', /idle_lemonade_best/.test(appText));
      assert('localStorage key idle_lemonade_settings defined', /idle_lemonade_settings/.test(appText));

      // ------- AC3: 至少 2 种输入 (鼠标/触屏 + 键盘) -------
      info('=== Acceptance: Input methods ===');
      assert('sellBtn has pointerdown listener (source check)', /sellBtn\.addEventListener\(['"]pointerdown/.test(appText));
      assert('keydown handler exists', /document\.addEventListener\(['"]keydown/.test(appText));
      assert('keydown supports Space/Enter sell', /e\.code === ['"]Space['"]|e\.key === ['"] ['"]/.test(appText) || /Space|Enter/.test(appText));
      assert('keydown supports 1/2/3 tab switch', /e\.key === ['"]1['"]/.test(appText) && /e\.key === ['"]2['"]/.test(appText) && /e\.key === ['"]3['"]/.test(appText));
      assert('keydown supports M for mute', /toLowerCase\(\) === ['"]m['"]/.test(appText));
      assert('keydown supports +/- for price', /e\.key === ['"]\+['"]|e\.key === ['"]=['"]/.test(appText) && /e\.key === ['"]-['"]|e\.key === ['"]_['"]/.test(appText));

      // simulate a click and check cash increments
      const cashBefore = doc.getElementById('cashDisplay').textContent;
      const sellBtn = doc.getElementById('sellBtn');
      // dispatch pointerdown (since click is preventDefault'd)
      sellBtn.dispatchEvent(new win.PointerEvent('pointerdown', { bubbles: true, clientX: 0, clientY: 0 }));
      await new Promise(r => setTimeout(r, 100));
      const cashAfter = doc.getElementById('cashDisplay').textContent;
      assert('clicking sellBtn increments cash display',
        cashAfter !== cashBefore || cashAfter !== '$0',
        'before=' + cashBefore + ' after=' + cashAfter);

      // simulate keyboard space to ensure non-button focus path works
      const evt = new win.KeyboardEvent('keydown', { code: 'Space', key: ' ', bubbles: true });
      doc.body.dispatchEvent(evt);
      await new Promise(r => setTimeout(r, 100));
      const cashAfter2 = doc.getElementById('cashDisplay').textContent;
      assert('Space key triggers sell', cashAfter2 !== '$0');

      // ------- AC4: 结算页有清晰「再来一局」按钮 -------
      info('=== Acceptance: Result modal & Restart button ===');
      const modal = doc.getElementById('resultModal');
      assert('result modal hidden on boot', modal.hasAttribute('hidden'));
      const restart = doc.getElementById('restartBtn');
      assert('restart button text matches "再来一局"', /再来一局/.test(restart.textContent));
      // computed style: button must be visibly tappable size (≥44px)
      restart.style.display = 'block'; // ignore parent hidden temporarily for compute
      modal.removeAttribute('hidden');
      const rect = restart.getBoundingClientRect();
      assert('restart button height ≥ 44 (touch friendly)', rect.height >= 44, 'h=' + rect.height);
      modal.setAttribute('hidden', ''); // restore

      // ------- AC5: 关键音效与震动反馈 -------
      info('=== Acceptance: Audio & Haptic ===');
      assert('AudioContext created in code', /AudioContext|webkitAudioContext/.test(appText));
      assert('sfx functions defined (sell/coin/upgrade/fanfare)',
        /sfxSell\s*\(/.test(appText) && /sfxCoin\s*\(/.test(appText) &&
        /sfxUpgrade\s*\(/.test(appText) && /sfxFanfare\s*\(/.test(appText));
      assert('navigator.vibrate guarded by truthy check', /if\s*\(\s*navigator\.vibrate\s*\)/.test(appText));
      assert('vibrate wrapped in try/catch', /try\s*\{\s*navigator\.vibrate/.test(appText));
      assert('mute button toggles aria-pressed',
        doc.getElementById('muteBtn').hasAttribute('aria-pressed'));
      // toggle mute by click
      const mb = doc.getElementById('muteBtn');
      const before = mb.getAttribute('aria-pressed');
      mb.click();
      assert('mute click flips aria-pressed', mb.getAttribute('aria-pressed') !== before);
      mb.click(); // restore

      // ------- AC6: 通关 / 失败记录最高分到 localStorage -------
      info('=== Acceptance: localStorage best score ===');
      // Force a victory by manipulating: simulate setting cash to threshold via state -> not directly accessible (IIFE).
      // Instead verify localStorage is write-capable from window context.
      try {
        win.localStorage.setItem('idle_lemonade_test_probe', JSON.stringify({ x: 1 }));
        const probe = JSON.parse(win.localStorage.getItem('idle_lemonade_test_probe'));
        assert('localStorage read/write works in iframe', probe.x === 1);
        win.localStorage.removeItem('idle_lemonade_test_probe');
      } catch (e) {
        record('localStorage read/write works in iframe', false, e.message);
      }
      assert('best schema fields referenced (fastestSec/maxEarn/gamesPlayed/ipoCount)',
        /fastestSec/.test(appText) && /maxEarn/.test(appText) &&
        /gamesPlayed/.test(appText) && /ipoCount/.test(appText));
      assert('best is persisted via lsSet(LS.BEST, best)', /lsSet\(LS\.BEST,\s*best\)/.test(appText));

      // ------- Bonus: prefers-reduced-motion -------
      info('=== Bonus: a11y / reduced-motion ===');
      const css = await fetch('../style.css').then(r => r.text());
      assert('CSS handles prefers-reduced-motion', /@media\s*\(prefers-reduced-motion:\s*reduce\)/.test(css));
      assert('focus-visible rings on key buttons', /:focus-visible/.test(css));

      // ------- Bonus: IPO threshold UI switch logic in code -------
      info('=== Bonus: Victory state code paths ===');
      assert('victory triggered when cash >= IPO_GOAL', /state\.cash\s*>=\s*CONFIG\.IPO_GOAL/.test(appText));
      assert('triggerEnd shows resultModal', /resultModal\.removeAttribute\(['"]hidden['"]\)/.test(appText));
      assert('confetti on victory', /spawnConfetti\s*\(\)/.test(appText));
      assert('restart re-attaches game state cleanly', /function\s+restartGame\s*\(/.test(appText));

      // ------- Bonus: tab switching works -------
      info('=== Bonus: Tab switching ===');
      // tab-staff click
      doc.getElementById('tab-staff').click();
      await new Promise(r => setTimeout(r, 80));
      assert('tab-staff aria-selected after click', doc.getElementById('tab-staff').getAttribute('aria-selected') === 'true');
      assert('panel-staff visible', !doc.getElementById('panel-staff').hasAttribute('hidden'));
      assert('panel-price hidden', doc.getElementById('panel-price').hasAttribute('hidden'));
      doc.getElementById('tab-price').click();
      await new Promise(r => setTimeout(r, 80));
      assert('returning to price tab works', !doc.getElementById('panel-price').hasAttribute('hidden'));

      // ------- Bonus: Pricing controls -------
      info('=== Bonus: Price controls ===');
      const priceCurEl = doc.getElementById('priceCur');
      const priceBefore = priceCurEl.textContent;
      const plusBtn = doc.querySelector('.price-btn[data-delta="0.5"]');
      plusBtn.click();
      await new Promise(r => setTimeout(r, 80));
      assert('price + 0.5 changes priceCur display',
        priceCurEl.textContent !== priceBefore,
        priceBefore + ' → ' + priceCurEl.textContent);

      // ============= SUMMARY =============
      summary.textContent = `${pass} passed · ${fail} failed`;
      summary.className = fail === 0 ? 'ok' : 'ng';
    }

    document.getElementById('runBtn').addEventListener('click', runTests);
    // auto-run when iframe first loads
    window.addEventListener('load', () => setTimeout(runTests, 200));
  </script>
</body>
</html>
