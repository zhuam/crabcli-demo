<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1a2e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <radialGradient id="bodyGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#5B8DB8"/>
      <stop offset="100%" stop-color="#2C5F7C"/>
    </radialGradient>
  </defs>
  <rect width="240" height="240" fill="url(#bg)" rx="16"/>
  <!-- bubbles -->
  <circle cx="190" cy="40" r="6" fill="rgba(255,255,255,0.08)"/>
  <circle cx="210" cy="65" r="4" fill="rgba(255,255,255,0.06)"/>
  <circle cx="30" cy="180" r="5" fill="rgba(255,255,255,0.07)"/>
  <circle cx="50" cy="200" r="3" fill="rgba(255,255,255,0.05)"/>
  <!-- shark fin body -->
  <path d="M120 30 C70 40 35 75 25 115 C18 145 22 170 35 182 C48 194 65 198 85 198 L155 198 C175 198 192 194 205 182 C218 170 222 145 215 115 C205 75 170 40 120 30Z" fill="url(#bodyGrad)"/>
  <!-- belly -->
  <path d="M75 95 C58 130 55 162 62 182 C70 192 85 195 100 195 L140 195 C155 195 170 192 178 182 C185 162 182 130 165 95 C148 112 132 118 120 120 C108 118 92 112 75 95Z" fill="#A8D8EA" opacity="0.4"/>
  <!-- eye -->
  <ellipse cx="100" cy="90" rx="10" ry="12" fill="#1a1a2e"/>
  <ellipse cx="103" cy="87" rx="4" ry="5" fill="white" opacity="0.7"/>
  <!-- smile -->
  <path d="M90 118 C98 130 115 135 128 128" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- painted nails -->
  <ellipse cx="92" cy="68" rx="10" ry="9" fill="#ff6b9d" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <ellipse cx="158" cy="68" rx="10" ry="9" fill="#4dd0e1" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <ellipse cx="125" cy="108" rx="10" ry="9" fill="#ffd54f" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <ellipse cx="88" cy="155" rx="10" ry="9" fill="#ce93d8" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <ellipse cx="162" cy="155" rx="10" ry="9" fill="#ff8a65" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <!-- polish sparkles -->
  <text x="92" y="71" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.6)">💅</text>
  <!-- title text -->
  <text x="120" y="220" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="white">Baby Shark</text>
  <text x="120" y="237" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ff6b9d">Manicure</text>
</svg>
