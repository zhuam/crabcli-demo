<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#0b1a2e" />
  <title>Baby Shark Manicure</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800;900&family=Inter:wght@400;500;600;700&family=Fredoka+One&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../games/shared/game-frame.css" />
  <style>
    /* ═══════════════════════════════════════════════════════
       Baby Shark Manicure — Paint & decorate baby shark nails!
       ═══════════════════════════════════════════════════════ */

    :root {
      --bg-ocean: #0b1a2e;
      --bg-ocean-light: #0f2240;
      --surface: rgba(255,255,255,0.07);
      --surface-hover: rgba(255,255,255,0.12);
      --border: rgba(255,255,255,0.10);
      --border-strong: rgba(255,255,255,0.20);
      --text: #f0f0f0;
      --text-dim: rgba(255,255,255,0.55);
      --text-muted: rgba(255,255,255,0.30);
      --pink: #ff6b9d;
      --cyan: #4dd0e1;
      --coral: #ff8a65;
      --yellow: #ffd54f;
      --purple: #ce93d8;
      --font-display: 'Outfit', 'Fredoka One', system-ui, sans-serif;
      --font-body: 'Inter', system-ui, sans-serif;
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 22px;
      --radius-xl: 30px;
      --hand-size: min(280px, 55vw);
      --nail-size: min(48px, 10vw);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg-ocean);
      color: var(--text);
      font-family: var(--font-body);
      overflow: hidden;
      height: 100%; width: 100%;
      user-select: none; -webkit-user-select: none;
      touch-action: none; -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }
    #app { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }

    /* ═══ Screens ═══ */
    .screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center;
      transition: opacity 0.45s ease, transform 0.45s ease;
      will-change: opacity, transform;
    }
    .screen.hidden {
      opacity: 0; pointer-events: none; transform: scale(0.96);
    }

    /* ═══════════════════════════
       TITLE SCREEN
       ═══════════════════════════ */
    .title-screen {
      justify-content: center; gap: 10px;
      background: linear-gradient(180deg, #0b1a2e 0%, #0d2440 40%, #0f3460 100%);
      padding: 24px;
    }
    .title-screen::before {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 120px 60px at 20% 30%, rgba(255,107,157,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 100px 80px at 80% 20%, rgba(77,208,225,0.10) 0%, transparent 70%),
        radial-gradient(ellipse 80px 50px at 50% 80%, rgba(255,213,79,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .title-bubble {
      position: absolute; border-radius: 50%;
      background: rgba(255,255,255,0.04);
      pointer-events: none;
    }
    .title-bubble:nth-child(1) { width: 60px; height: 60px; top: 8%; left: 10%; }
    .title-bubble:nth-child(2) { width: 30px; height: 30px; top: 15%; right: 15%; }
    .title-bubble:nth-child(3) { width: 45px; height: 45px; bottom: 20%; left: 20%; }
    .title-bubble:nth-child(4) { width: 25px; height: 25px; bottom: 30%; right: 12%; }
    .title-bubble:nth-child(5) { width: 50px; height: 50px; top: 50%; left: 5%; }
    .title-bubble:nth-child(6) { width: 35px; height: 35px; top: 40%; right: 8%; }

    .title-icon {
      font-size: 64px; line-height: 1;
      filter: drop-shadow(0 0 30px rgba(255,107,157,0.4));
      animation: titleBounce 2s ease-in-out infinite;
      position: relative; z-index: 1;
    }
    @keyframes titleBounce {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-8px) scale(1.05); }
    }

    .title-text {
      font-family: var(--font-display); font-size: 38px; font-weight: 900;
      background: linear-gradient(135deg, #ff6b9d, #4dd0e1, #ffd54f, #ce93d8);
      background-size: 300% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientSweep 4s ease infinite;
      line-height: 1.1; text-align: center;
      position: relative; z-index: 1;
    }
    @keyframes gradientSweep {
      0%, 100% { background-position: 0% center; }
      50% { background-position: 100% center; }
    }
    .title-sub {
      font-size: 14px; color: var(--text-dim); text-align: center; max-width: 280px; line-height: 1.5;
      position: relative; z-index: 1;
    }
    .title-level {
      font-family: var(--font-display); font-size: 15px; font-weight: 700;
      color: var(--pink); text-align: center; position: relative; z-index: 1;
    }
    .title-high {
      font-family: var(--font-body); font-size: 13px; color: var(--text-muted);
      margin-top: 4px; position: relative; z-index: 1;
    }
    .title-high span { color: var(--yellow); }

    /* ─── Buttons ─── */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 36px; border: none; border-radius: 50px;
      font-family: var(--font-display); font-size: 18px; font-weight: 700;
      cursor: pointer; transition: all 0.2s ease;
      position: relative; z-index: 1;
    }
    .btn:active { transform: scale(0.95); }
    .btn-primary {
      background: linear-gradient(135deg, #ff6b9d, #ce93d8);
      color: #fff; box-shadow: 0 4px 20px rgba(255,107,157,0.35);
    }
    .btn-primary:hover { box-shadow: 0 6px 28px rgba(255,107,157,0.5); transform: translateY(-2px); }
    .btn-primary:active { transform: scale(0.95) translateY(0); }
    .btn-secondary {
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border-strong);
    }
    .btn-secondary:hover { background: var(--surface-hover); }

    .btn-sm {
      padding: 10px 22px; font-size: 14px;
    }

    /* ═══════════════════════════
       GAME SCREEN
       ═══════════════════════════ */
    .game-screen {
      background: linear-gradient(180deg, #0b1a2e 0%, #0d2440 100%);
      padding: 10px;
      justify-content: flex-start;
      gap: 4px;
    }

    /* ─── Top Bar ─── */
    .game-top {
      width: 100%; max-width: 460px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 4px;
      position: relative; z-index: 2;
    }
    .game-level {
      font-family: var(--font-display); font-size: 16px; font-weight: 700;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .game-score {
      font-family: var(--font-display); font-size: 14px; font-weight: 700;
      color: var(--yellow);
    }
    .game-score span { color: var(--text-dim); font-weight: 400; }

    /* ─── Progress dots ─── */
    .progress-row {
      display: flex; gap: 8px; align-items: center;
      width: 100%; max-width: 460px; padding: 2px 4px;
      position: relative; z-index: 2;
    }
    .progress-dot {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid var(--border-strong);
      background: var(--surface); display: flex; align-items: center; justify-content: center;
      font-size: 12px; transition: all 0.3s ease;
    }
    .progress-dot.painted {
      border-color: var(--pink);
      background: linear-gradient(135deg, var(--pink), var(--purple));
      box-shadow: 0 0 12px rgba(255,107,157,0.3);
    }
    .progress-label {
      margin-left: auto; font-size: 12px; color: var(--text-dim);
    }

    /* ─── Baby Shark Hand Area ─── */
    .hand-area {
      position: relative;
      width: var(--hand-size);
      height: calc(var(--hand-size) * 1.15);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      margin: 4px 0;
      z-index: 1;
    }

    .shark-fin {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* SVG-based shark fin with nails */
    .shark-svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 4px 20px rgba(255,107,157,0.15));
    }

    .nail-area {
      cursor: pointer;
      transition: filter 0.15s ease;
    }
    .nail-area:hover {
      filter: brightness(1.2);
    }
    .nail-area.painted {
      filter: brightness(1.1);
    }
    .nail-area .nail-fill {
      transition: fill 0.2s ease;
    }
    .nail-area .nail-sticker {
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    .nail-area .nail-sticker.show {
      opacity: 1;
    }
    .nail-glow {
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .nail-glow.active {
      opacity: 0.6;
      animation: pulseGlow 1.2s ease-in-out infinite;
    }
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }

    .shark-eye {
      animation: blinkEye 4s ease-in-out infinite;
    }
    @keyframes blinkEye {
      0%, 94%, 100% { transform: scaleY(1); }
      97% { transform: scaleY(0.1); }
    }

    /* ─── Color Palette ─── */
    .palette-section {
      width: 100%; max-width: 460px;
      display: flex; flex-direction: column; gap: 6px;
      flex-shrink: 0;
      position: relative; z-index: 2;
    }
    .palette-label {
      font-size: 11px; font-weight: 600; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 1px;
    }
    .palette-row {
      display: flex; gap: 8px; flex-wrap: wrap;
      justify-content: center;
    }
    .color-swatch {
      width: 38px; height: 38px; border-radius: 50%;
      border: 2.5px solid transparent;
      cursor: pointer; transition: all 0.18s ease;
      position: relative;
      flex-shrink: 0;
    }
    .color-swatch:active { transform: scale(0.9); }
    .color-swatch.selected {
      border-color: #fff;
      box-shadow: 0 0 14px rgba(255,255,255,0.3);
      transform: scale(1.12);
    }
    .color-swatch:hover { transform: scale(1.08); }
    .color-swatch.selected::after {
      content: '✓'; position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.9); font-size: 16px; font-weight: 700;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }

    /* ─── Stickers ─── */
    .sticker-section {
      width: 100%; max-width: 460px;
      display: flex; flex-direction: column; gap: 6px;
      flex-shrink: 0;
      position: relative; z-index: 2;
    }
    .sticker-row {
      display: flex; gap: 8px; justify-content: center;
    }
    .sticker-btn {
      width: 38px; height: 38px; border-radius: var(--radius-sm);
      border: 2px solid var(--border);
      background: var(--surface); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; transition: all 0.18s ease;
    }
    .sticker-btn:active { transform: scale(0.9); }
    .sticker-btn.selected {
      border-color: var(--cyan);
      background: rgba(77,208,225,0.15);
      box-shadow: 0 0 10px rgba(77,208,225,0.3);
    }
    .sticker-btn:hover { background: var(--surface-hover); }

    .tool-row {
      display: flex; gap: 6px; align-items: center;
      justify-content: center; margin-top: 4px;
    }
    .tool-btn {
      padding: 6px 14px; border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--surface); color: var(--text-dim);
      font-size: 12px; font-weight: 600; cursor: pointer;
      transition: all 0.15s ease;
      font-family: var(--font-body);
    }
    .tool-btn:hover { background: var(--surface-hover); color: var(--text); }
    .tool-btn.active {
      border-color: var(--coral); color: var(--coral);
      background: rgba(255,138,101,0.12);
    }

    /* ─── Hint text ─── */
    .hint-text {
      font-size: 12px; color: var(--text-muted);
      text-align: center; margin-top: 2px;
      transition: color 0.3s ease;
    }

    /* ═══════════════════════════
       RESULT SCREEN
       ═══════════════════════════ */
    .result-screen {
      justify-content: center; gap: 16px; text-align: center;
      background: linear-gradient(180deg, #0b1a2e 0%, #0d2440 50%, #0f3460 100%);
      padding: 24px;
    }
    .result-screen::before {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 150px 80px at 30% 30%, rgba(255,107,157,0.10) 0%, transparent 70%),
        radial-gradient(ellipse 120px 100px at 70% 60%, rgba(77,208,225,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .result-icon {
      font-size: 72px; line-height: 1;
      position: relative; z-index: 1;
      animation: resultPop 0.6s ease-out;
    }
    @keyframes resultPop {
      0% { transform: scale(0); opacity: 0; }
      60% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }

    .result-title {
      font-family: var(--font-display); font-size: 32px; font-weight: 900;
      position: relative; z-index: 1;
    }
    .result-title.win {
      background: linear-gradient(135deg, #ff6b9d, #ffd54f);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .result-title.lose {
      color: var(--text-dim);
    }

    .result-details {
      font-size: 14px; color: var(--text-dim);
      position: relative; z-index: 1; line-height: 1.6;
    }
    .result-details span { color: var(--yellow); font-weight: 700; }
    .result-best {
      font-size: 13px; color: var(--text-muted);
      position: relative; z-index: 1;
    }
    .result-best span { color: var(--yellow); }
    .result-new-best {
      color: var(--pink); font-weight: 700; font-size: 14px;
      animation: newBestPulse 0.8s ease-in-out infinite alternate;
      position: relative; z-index: 1;
    }
    @keyframes newBestPulse {
      0% { opacity: 0.6; transform: scale(1); }
      100% { opacity: 1; transform: scale(1.08); }
    }

    .result-btns {
      display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
      position: relative; z-index: 1;
    }

    /* ═══ Responsive ═══ */
    @media (max-width: 480px) {
      .title-text { font-size: 30px; }
      .title-icon { font-size: 52px; }
      .shark-svg { width: 90%; height: auto; }
      .color-swatch { width: 34px; height: 34px; }
      .sticker-btn { width: 34px; height: 34px; font-size: 17px; }
      .game-top { padding: 4px; }
      .result-title { font-size: 26px; }
      .result-icon { font-size: 56px; }
    }

    @media (max-height: 640px) {
      .hand-area { width: min(200px, 42vw); }
      .color-swatch { width: 30px; height: 30px; }
      .sticker-btn { width: 30px; height: 30px; font-size: 15px; }
      .title-icon { font-size: 40px; }
      .title-text { font-size: 24px; }
      .game-top { padding: 2px; }
      .game-level { font-size: 13px; }
      .game-score { font-size: 12px; }
      .progress-dot { width: 22px; height: 22px; font-size: 10px; }
    }
  </style>
</head>
<body>
  <div id="app">

    <!-- ═══ TITLE SCREEN ═══ -->
    <div id="title-screen" class="screen title-screen">
      <div class="title-bubble"></div><div class="title-bubble"></div>
      <div class="title-bubble"></div><div class="title-bubble"></div>
      <div class="title-bubble"></div><div class="title-bubble"></div>
      <div class="title-icon">🦈</div>
      <div class="title-text">Baby Shark<br/>Manicure</div>
      <div class="title-sub">Pick a color, paint the nails,<br/>and make baby shark fabulous! 💅</div>
      <div id="title-level" class="title-level">🌸 Level 1 · Rainbow Reef</div>
      <div class="title-high">🏆 Best Score: <span id="title-high-score">0</span></div>
      <div style="height:6px"></div>
      <button id="play-btn" class="btn btn-primary">💅 Start!</button>
    </div>

    <!-- ═══ GAME SCREEN ═══ -->
    <div id="game-screen" class="screen game-screen hidden">
      <div class="game-top">
        <span class="game-level" id="level-label">🌸 Rainbow Reef</span>
        <span class="game-score">⭐ <span id="score-display">0</span></span>
      </div>

      <div class="progress-row">
        <div id="progress-dots"></div>
        <span class="progress-label"><span id="nails-done">0</span>/5 done</span>
      </div>

      <!-- Baby Shark Hand (SVG) -->
      <div class="hand-area">
        <div class="shark-fin">
          <svg class="shark-svg" viewBox="0 0 280 330" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Shark body / fin base -->
            <defs>
              <radialGradient id="bodyGrad" cx="50%" cy="40%" r="60%">
                <stop offset="0%" stop-color="#5B8DB8"/>
                <stop offset="100%" stop-color="#2C5F7C"/>
              </radialGradient>
              <radialGradient id="bellyGrad" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#A8D8EA"/>
                <stop offset="100%" stop-color="#8BC5D8"/>
              </radialGradient>
              <filter id="shadow1"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/></filter>
            </defs>

            <!-- Tail / fin shape -->
            <path d="M140 280 C80 260 40 240 25 220 C15 206 20 195 35 195 C50 195 60 200 70 210 C75 215 78 218 80 220 C90 230 110 245 140 255 C170 245 190 230 200 220 C202 218 205 215 210 210 C220 200 230 195 245 195 C260 195 265 206 255 220 C240 240 200 260 140 280Z" fill="url(#bellyGrad)" opacity="0.5"/>

            <!-- Main fin body -->
            <path d="M140 20 C80 30 40 70 25 120 C15 155 20 185 35 200 C50 215 70 220 90 220 L190 220 C210 220 230 215 245 200 C260 185 265 155 255 120 C240 70 200 30 140 20Z" fill="url(#bodyGrad)" filter="url(#shadow1)"/>

            <!-- Belly highlight -->
            <path d="M80 100 C60 140 55 180 65 205 C75 215 90 218 110 218 L170 218 C190 218 205 215 215 205 C225 180 220 140 200 100 C180 120 160 128 140 130 C120 128 100 120 80 100Z" fill="url(#bellyGrad)" opacity="0.6"/>

            <!-- Face area -->
            <!-- Eye -->
            <ellipse class="shark-eye" cx="115" cy="100" rx="12" ry="14" fill="#1a1a2e"/>
            <ellipse cx="118" cy="96" rx="5" ry="6" fill="white" opacity="0.8"/>

            <!-- Smile -->
            <path d="M100 130 C110 145 130 150 145 140" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round" fill="none"/>

            <!-- Blush -->
            <ellipse cx="90" cy="125" rx="10" ry="6" fill="#ff6b9d" opacity="0.25"/>
            <ellipse cx="155" cy="125" rx="10" ry="6" fill="#ff6b9d" opacity="0.25"/>

            <!-- Nail 1 (top left) -->
            <g class="nail-area" data-nail="0" data-x="95" data-y="75">
              <ellipse class="nail-glow" cx="95" cy="75" rx="18" ry="16"/>
              <ellipse class="nail-fill" cx="95" cy="75" rx="14" ry="13" fill="#A8D8EA" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
              <ellipse cx="90" cy="72" rx="5" ry="4" fill="rgba(255,255,255,0.2)"/>
              <text class="nail-sticker" x="95" y="79" text-anchor="middle" font-size="16" dominant-baseline="central">✨</text>
            </g>

            <!-- Nail 2 (top right) -->
            <g class="nail-area" data-nail="1" data-x="185" data-y="75">
              <ellipse class="nail-glow" cx="185" cy="75" rx="18" ry="16"/>
              <ellipse class="nail-fill" cx="185" cy="75" rx="14" ry="13" fill="#A8D8EA" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
              <ellipse cx="180" cy="72" rx="5" ry="4" fill="rgba(255,255,255,0.2)"/>
              <text class="nail-sticker" x="185" y="79" text-anchor="middle" font-size="16" dominant-baseline="central">✨</text>
            </g>

            <!-- Nail 3 (middle) -->
            <g class="nail-area" data-nail="2">
              <ellipse class="nail-glow" cx="140" cy="120" rx="18" ry="16"/>
              <ellipse class="nail-fill" cx="140" cy="120" rx="14" ry="13" fill="#A8D8EA" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
              <ellipse cx="135" cy="117" rx="5" ry="4" fill="rgba(255,255,255,0.2)"/>
              <text class="nail-sticker" x="140" y="124" text-anchor="middle" font-size="16" dominant-baseline="central">✨</text>
            </g>

            <!-- Nail 4 (bottom left) -->
            <g class="nail-area" data-nail="3" data-x="90" data-y="170">
              <ellipse class="nail-glow" cx="90" cy="170" rx="18" ry="16"/>
              <ellipse class="nail-fill" cx="90" cy="170" rx="14" ry="13" fill="#A8D8EA" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
              <ellipse cx="85" cy="167" rx="5" ry="4" fill="rgba(255,255,255,0.2)"/>
              <text class="nail-sticker" x="90" y="174" text-anchor="middle" font-size="16" dominant-baseline="central">✨</text>
            </g>

            <!-- Nail 5 (bottom right) -->
            <g class="nail-area" data-nail="4" data-x="190" data-y="170">
              <ellipse class="nail-glow" cx="190" cy="170" rx="18" ry="16"/>
              <ellipse class="nail-fill" cx="190" cy="170" rx="14" ry="13" fill="#A8D8EA" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
              <ellipse cx="185" cy="167" rx="5" ry="4" fill="rgba(255,255,255,0.2)"/>
              <text class="nail-sticker" x="190" y="174" text-anchor="middle" font-size="16" dominant-baseline="central">✨</text>
            </g>
          </svg>
        </div>
      </div>

      <!-- Color Palette -->
      <div class="palette-section">
        <div class="palette-label">🎨 Colors</div>
        <div class="palette-row" id="palette-row"></div>
      </div>

      <!-- Stickers & Tools -->
      <div class="sticker-section">
        <div class="sticker-row" id="sticker-row"></div>
        <div class="tool-row">
          <button class="tool-btn" id="eraser-btn">🧽 Eraser</button>
        </div>
      </div>

      <div class="hint-text" id="hint-text">💡 Tap a color, then tap a nail to paint!</div>
    </div>

    <!-- ═══ RESULT SCREEN ═══ -->
    <div id="result-screen" class="screen result-screen hidden">
      <div class="result-icon" id="result-icon">🎉</div>
      <div class="result-title" id="result-title">Level Complete!</div>
      <div class="result-details" id="result-details">
        You painted <span>5</span> nails perfectly!
      </div>
      <div id="new-best" class="result-new-best hidden">🌟 New Best Score! 🌟</div>
      <div class="result-best">🏆 Best: <span id="result-best">0</span></div>
      <div class="result-btns">
        <button id="result-next" class="btn btn-primary">➡️ Next Level</button>
        <button id="result-retry" class="btn btn-secondary">🔄 Retry</button>
      </div>
    </div>

  </div>

  <script>
  (function(){
    'use strict';

    /* ═══════════════════════════════════════════════
       BABY SHARK MANICURE — Game Logic
       ═══════════════════════════════════════════════ */

    // ─── DOM References ───
    const $ = id => document.getElementById(id);
    const titleScreen  = $('title-screen');
    const gameScreen   = $('game-screen');
    const resultScreen = $('result-screen');
    const levelLabel   = $('level-label');
    const scoreDisplay = $('score-display');
    const progressDots = $('progress-dots');
    const nailsDone    = $('nails-done');
    const paletteRow   = $('palette-row');
    const stickerRow   = $('sticker-row');
    const hintText     = $('hint-text');
    const eraserBtn    = $('eraser-btn');
    const playBtn      = $('play-btn');
    const titleHigh    = $('title-high-score');
    const titleLevel   = $('title-level');
    const resultIcon   = $('result-icon');
    const resultTitle  = $('result-title');
    const resultDet    = $('result-details');
    const resultBest   = $('result-best');
    const resultNewBest = $('new-best');
    const resultNext   = $('result-next');
    const resultRetry  = $('result-retry');
    const nailAreas    = document.querySelectorAll('.nail-area');
    const nailFills    = document.querySelectorAll('.nail-fill');
    const nailStickers = document.querySelectorAll('.nail-sticker');
    const nailGlows    = document.querySelectorAll('.nail-glow');

    // ─── Storage ───
    const STORAGE_KEY = 'babySharkManicure_highScore';

    // ─── Level Themes ───
    const LEVELS = [
      { name: '🌸 Rainbow Reef',   desc: 'Rainbow Reef',     theme: 'bright' },
      { name: '🌊 Ocean Blue',     desc: 'Ocean Blue',       theme: 'ocean' },
      { name: '💗 Pink Paradise',  desc: 'Pink Paradise',    theme: 'pink' },
      { name: '🌅 Golden Coral',   desc: 'Golden Coral',     theme: 'gold' },
      { name: '🧜 Mermaid Magic',  desc: 'Mermaid Magic',    theme: 'magic' },
      { name: '🌸 Rainbow Reef',   desc: 'Rainbow Reef II',  theme: 'bright' },
      { name: '🌊 Deep Blue',      desc: 'Deep Blue',        theme: 'ocean' },
      { name: '💎 Crystal Cove',   desc: 'Crystal Cove',     theme: 'magic' },
      { name: '🌺 Tropical Tide',  desc: 'Tropical Tide',    theme: 'pink' },
      { name: '⭐ Starfish Shine', desc: 'Starfish Shine',   theme: 'gold' },
    ];

    // ─── Palettes per theme ───
    const PALETTES = {
      bright: ['#ff4757','#ff6b81','#ffa502','#eccc68','#2ed573','#7bed9f','#1e90ff','#70a1ff','#a29bfe','#e056fd'],
      ocean:  ['#0abde3','#48dbfb','#1dd1a1','#10ac84','#0fbcf9','#34e7e4','#00d2d3','#01a3a4','#0abde3','#00bcd4'],
      pink:   ['#ff6b9d','#ff9ff3','#f368e0','#be2edd','#fd79a8','#e84393','#ffb8b8','#ff4757','#c44569','#f78fb3'],
      gold:   ['#ffd700','#ffa502','#ff6348','#eccc68','#f9ca24','#f0932b','#b8860b','#d35400','#e67e22','#f39c12'],
      magic:  ['#a29bfe','#6c5ce7','#fd79a8','#e056fd','#d980fa','#9b59b6','#8e44ad','#e84393','#74b9ff','#00cec9'],
    };

    const STICKERS = ['✨','⭐','💖','🌸','🐟','🫧','💎','🌈','🌺','🦋'];

    // ─── State ───
    let highScore = parseInt(localStorage.getItem(STORAGE_KEY) || '0', 10);
    let level = 0;
    let nails = [];          // { color: null|string, sticker: null|string }
    let score = 0;
    let selectedColor = null;
    let selectedSticker = null;
    let eraserMode = false;
    let gameActive = false;
    let lastSoundTime = 0;

    // ═══ Audio (Web Audio API — no external files) ═══
    let audioCtx = null;
    function getAudio() {
      if (!audioCtx) {
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (_) {}
      }
      return audioCtx;
    }
    function playTone(freq, duration, type, vol) {
      try {
        const ctx = getAudio();
        if (!ctx) return;
        const now = ctx.currentTime;
        // Throttle rapid sounds
        if (now - lastSoundTime < 0.05) return;
        lastSoundTime = now;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = type || 'sine';
        osc.frequency.setValueAtTime(freq, now);
        gain.gain.setValueAtTime(Math.min(vol || 0.12, 0.15), now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + (duration || 0.15));
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(now);
        osc.stop(now + (duration || 0.15));
      } catch (_) {}
    }
    function playPaint() { playTone(600, 0.12, 'sine', 0.12); setTimeout(() => playTone(800, 0.10, 'sine', 0.08), 60); }
    function playSelect() { playTone(500, 0.08, 'sine', 0.06); }
    function playWin() {
      [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playTone(f, 0.2, 'sine', 0.12), i * 100));
    }
    function playSticker() { playTone(900, 0.1, 'sine', 0.08); }
    function playEraser() { playTone(300, 0.08, 'square', 0.06); }
    function playComplete() {
      [523, 659, 784, 1047, 1319].forEach((f, i) => setTimeout(() => playTone(f, 0.15, 'sine', 0.10), i * 80));
    }

    // ═══ Vibrate ═══
    function vibe(ms) { try { navigator.vibrate && navigator.vibrate(ms); } catch (_) {} }

    // ═══ Screen helpers ═══
    function showScreen(screen) {
      [titleScreen, gameScreen, resultScreen].forEach(s => s.classList.add('hidden'));
      screen.classList.remove('hidden');
    }

    // ═══ Nail color logic ═══
    function getNailColor(theme, index) {
      const pal = PALETTES[theme];
      return pal[index % pal.length];
    }

    // ═══ Rendering ═══
    function buildPalette() {
      const theme = LEVELS[level % LEVELS.length].theme;
      const colors = PALETTES[theme];
      paletteRow.innerHTML = '';
      colors.forEach(c => {
        const swatch = document.createElement('div');
        swatch.className = 'color-swatch';
        swatch.dataset.color = c;
        swatch.style.background = c;
        swatch.addEventListener('pointerdown', e => {
          e.preventDefault();
          onColorSelect(c, swatch);
        });
        paletteRow.appendChild(swatch);
      });
    }

    function buildStickers() {
      stickerRow.innerHTML = '';
      STICKERS.forEach(s => {
        const btn = document.createElement('button');
        btn.className = 'sticker-btn';
        btn.dataset.sticker = s;
        btn.textContent = s;
        btn.addEventListener('click', () => onStickerSelect(s, btn));
        stickerRow.appendChild(btn);
      });
    }

    function renderNails() {
      nails.forEach((nail, i) => {
        const fill = nailFills[i];
        const sticker = nailStickers[i];
        const glow = nailGlows[i];
        if (nail.color) {
          fill.setAttribute('fill', nail.color);
          glow.classList.add('active');
        } else {
          fill.setAttribute('fill', '#A8D8EA');
          glow.classList.remove('active');
        }
        if (nail.sticker) {
          sticker.textContent = nail.sticker;
          sticker.classList.add('show');
        } else {
          sticker.classList.remove('show');
        }
      });
      updateProgress();
    }

    function updateProgress() {
      const done = nails.filter(n => n.color).length;
      nailsDone.textContent = done;
      const dots = progressDots.querySelectorAll('.progress-dot');
      dots.forEach((dot, i) => {
        dot.classList.toggle('painted', !!nails[i]?.color);
      });
      updateScoreDisplay();
    }

    function updateScoreDisplay() {
      scoreDisplay.textContent = score;
    }

    function buildProgressDots() {
      progressDots.innerHTML = '';
      nails.forEach((_, i) => {
        const dot = document.createElement('div');
        dot.className = 'progress-dot';
        dot.textContent = '💅';
        dot.style.fontSize = '12px';
        progressDots.appendChild(dot);
      });
    }

    // ═══ Selection ═══
    function clearSelection(exclude) {
      if (exclude !== 'color') {
        selectedColor = null;
        document.querySelectorAll('.color-swatch.selected').forEach(el => el.classList.remove('selected'));
      }
      if (exclude !== 'sticker') {
        selectedSticker = null;
        document.querySelectorAll('.sticker-btn.selected').forEach(el => el.classList.remove('selected'));
      }
    }

    function onColorSelect(color, swatch) {
      playSelect();
      vibe(10);
      eraserMode = false;
      eraserBtn.classList.remove('active');
      if (selectedColor === color) {
        clearSelection('sticker');
        hintText.textContent = '💡 Tap a nail to paint it!';
        return;
      }
      clearSelection();
      selectedColor = color;
      selectedSticker = null;
      swatch.classList.add('selected');
      hintText.textContent = `💡 Now tap a nail to paint it ${color}!`;
    }

    function onStickerSelect(sticker, btn) {
      playSelect();
      vibe(8);
      eraserMode = false;
      eraserBtn.classList.remove('active');
      if (selectedSticker === sticker) {
        clearSelection('color');
        hintText.textContent = '💡 Tap a painted nail to add a sticker!';
        return;
      }
      clearSelection();
      selectedSticker = sticker;
      selectedColor = null;
      btn.classList.add('selected');
      hintText.textContent = '💡 Tap a painted nail to add a sticker!';
    }

    // ═══ Paint / Decorate ═══
    function onNailClick(index) {
      if (!gameActive) return;

      const nail = nails[index];
      const area = nailAreas[index];

      // Eraser mode
      if (eraserMode) {
        if (nail.color) {
          nail.color = null;
          nail.sticker = null;
          score = Math.max(0, score - 5);
          renderNails();
          playEraser();
          vibe(15);
          hintText.textContent = '🧽 Nail erased!';
        }
        return;
      }

      // Color painting
      if (selectedColor) {
        if (nail.color === selectedColor) {
          hintText.textContent = '✨ This nail already has that color! Try a different one.';
          return;
        }
        nail.color = selectedColor;
        nail.sticker = nail.sticker || null;
        score += 10;
        renderNails();
        playPaint();
        vibe(20);
        hintText.textContent = '💅 Beautiful! Keep going!';

        // Check all painted
        if (nails.every(n => n.color)) {
          onLevelComplete();
        }
        return;
      }

      // Sticker placement
      if (selectedSticker) {
        if (!nail.color) {
          hintText.textContent = '🎨 Paint the nail first before adding a sticker!';
          return;
        }
        if (nail.sticker === selectedSticker) {
          hintText.textContent = '✨ This sticker is already on! Try a different one.';
          return;
        }
        nail.sticker = selectedSticker;
        score += 5;
        renderNails();
        playSticker();
        vibe(12);
        hintText.textContent = '⭐ Sticker added! So cute!';

        if (nails.every(n => n.color)) {
          onLevelComplete();
        }
        return;
      }

      // No tool selected — show hint
      hintText.textContent = '💡 First pick a color from the palette!';
    }

    // ═══ Level Flow ═══
    function initLevel() {
      nails = Array.from({ length: 5 }, () => ({ color: null, sticker: null }));
      score = 0;
      selectedColor = null;
      selectedSticker = null;
      eraserMode = false;
      eraserBtn.classList.remove('active');
      gameActive = true;

      const levelData = LEVELS[level % LEVELS.length];
      levelLabel.textContent = levelData.name;

      buildPalette();
      buildStickers();
      buildProgressDots();
      renderNails();

      hintText.textContent = '💡 Pick a color and paint each nail!';
      updateScoreDisplay();

      showScreen(gameScreen);
    }

    function onLevelComplete() {
      gameActive = false;
      playComplete();
      vibe([50, 30, 50]);

      const finalScore = score;
      const isNewBest = finalScore > highScore && finalScore > 0;
      if (isNewBest) {
        highScore = finalScore;
        localStorage.setItem(STORAGE_KEY, highScore);
      }

      // Build result screen
      const isLastLevel = level >= LEVELS.length - 1;
      resultIcon.textContent = '🎉';
      resultTitle.textContent = '✨ Nail-tastic! ✨';
      resultTitle.className = 'result-title win';
      resultDet.innerHTML = `You painted all nails!<br/>⭐ Score: <span>${finalScore}</span>`;
      resultBest.textContent = highScore;
      resultNewBest.classList.toggle('hidden', !isNewBest);

      if (isLastLevel) {
        resultNext.textContent = '🏆 You\'re a Manicure Master!';
        resultNext.style.display = 'inline-flex';
        resultNext.onclick = () => { level = 0; initLevel(); };
        resultRetry.textContent = '🔄 Play Again';
      } else {
        resultNext.textContent = '➡️ Next Level';
        resultNext.style.display = 'inline-flex';
        resultNext.onclick = () => { level++; initLevel(); };
        resultRetry.textContent = '🔄 Retry';
      }
      resultRetry.onclick = () => initLevel();

      showScreen(resultScreen);
    }

    // ═══ Event Binding ═══
    function nailToIndex(el) {
      const g = el.closest('.nail-area');
      if (!g) return -1;
      return parseInt(g.dataset.nail, 10);
    }

    function bindEvents() {
      // Nail clicks (pointer)
      nailAreas.forEach(area => {
        const handler = e => {
          e.preventDefault();
          const idx = parseInt(area.dataset.nail, 10);
          onNailClick(idx);
        };
        area.addEventListener('pointerdown', handler);
        area.addEventListener('touchstart', e => {
          // Prevent scroll on touch
          if (e.target.closest('.nail-area')) {
            e.preventDefault();
          }
        }, { passive: false });
      });

      // Keyboard
      window.addEventListener('keydown', e => {
        if (!gameActive) {
          if (e.key === 'Enter' || e.key === ' ') {
            if (!titleScreen.classList.contains('hidden')) {
              playBtn.click();
            } else if (!resultScreen.classList.contains('hidden')) {
              resultNext.click();
            }
          }
          return;
        }
        // Number keys 1-5 for color selection (if visible)
        if (e.key >= '1' && e.key <= '5') {
          const idx = parseInt(e.key, 10) - 1;
          if (idx < nails.length && !nails[idx].color) {
            // If a color is selected, apply to this nail
            if (selectedColor) onNailClick(idx);
          }
        }
        // 'E' for eraser
        if (e.key === 'e' || e.key === 'E') {
          eraserBtn.click();
        }
        // 'Esc' to clear selection
        if (e.key === 'Escape') {
          clearSelection();
          eraserMode = false;
          eraserBtn.classList.remove('active');
          hintText.textContent = '💡 Pick a color and paint each nail!';
        }
      });

      // Buttons
      playBtn.addEventListener('click', () => {
        try { getAudio(); } catch (_) {}
        initLevel();
      });

      eraserBtn.addEventListener('click', () => {
        playSelect();
        vibe(10);
        eraserMode = !eraserMode;
        eraserBtn.classList.toggle('active', eraserMode);
        if (eraserMode) {
          clearSelection();
          hintText.textContent = '🧽 Tap a painted nail to erase it!';
        } else {
          hintText.textContent = '💡 Pick a color and paint each nail!';
        }
      });
    }

    // ═══ Init ═══
    function init() {
      titleHigh.textContent = highScore;
      titleLevel.textContent = `${LEVELS[0].name}`;

      bindEvents();
      showScreen(titleScreen);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }

  })();
  </script>
</body>
