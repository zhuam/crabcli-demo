<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#1a1040"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bg)" rx="12"/>
  <!-- Grid background -->
  <rect x="20" y="20" width="160" height="160" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Bear blocks (match-3 grid pattern) -->
  <rect x="28" y="28" width="42" height="42" rx="6" fill="#8B5E3C"/><text x="49" y="56" text-anchor="middle" font-size="22">🐻</text>
  <rect x="77" y="28" width="42" height="42" rx="6" fill="#2D2D2D"/><text x="98" y="56" text-anchor="middle" font-size="22">🐼</text>
  <rect x="126" y="28" width="42" height="42" rx="6" fill="#A8D8EA"/><text x="147" y="56" text-anchor="middle" font-size="22">🐻‍❄️</text>
  <rect x="28" y="77" width="42" height="42" rx="6" fill="#FF9FF3"/><text x="49" y="105" text-anchor="middle" font-size="22">🦊</text>
  <rect x="77" y="77" width="42" height="42" rx="6" fill="#8B5E3C"/><text x="98" y="105" text-anchor="middle" font-size="22">🐻</text>
  <rect x="126" y="77" width="42" height="42" rx="6" fill="#FFEAA7"/><text x="147" y="105" text-anchor="middle" font-size="22">🐨</text>
  <rect x="28" y="126" width="42" height="42" rx="6" fill="#2D2D2D"/><text x="49" y="154" text-anchor="middle" font-size="22">🐼</text>
  <rect x="77" y="126" width="42" height="42" rx="6" fill="#A8D8EA"/><text x="98" y="154" text-anchor="middle" font-size="22">🐻‍❄️</text>
  <rect x="126" y="126" width="42" height="42" rx="6" fill="#FF9FF3"/><text x="147" y="154" text-anchor="middle" font-size="22">🦊</text>
  <!-- Glow overlay -->
  <rect x="77" y="77" width="42" height="42" rx="6" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <!-- Title at bottom -->
  <text x="100" y="192" text-anchor="middle" font-family="Outfit,system-ui,sans-serif" font-size="10" font-weight="700" fill="rgba(255,255,255,0.6)">🐻 BEARS BLOCKS</text>
</svg>
