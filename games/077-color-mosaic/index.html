<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#f9f9fc">
<title>Color Mosaic — 按编号涂色</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/games/shared/game-frame.css">
<style>
/* ═══════════════════════════════════════════════════════
   Color Mosaic — Number-based pixel coloring game
   Issue: #77 — Modern-Minimal Redesign
   ═══════════════════════════════════════════════════════ */

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --color-bg:oklch(0.99 0 0);
  --color-surface:oklch(0.97 0 0);
  --color-border:oklch(0.92 0 0);
  --color-text:oklch(0.20 0 0);
  --color-muted:oklch(0.55 0 0);
  --color-accent:oklch(0.55 0.18 250);
  --color-success:oklch(0.55 0.15 145);
  --color-error:oklch(0.55 0.20 30);
  --font-sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Consolas,monospace;
  --space-1:4px;--space-2:8px;--space-3:12px;--space-4:16px;--space-5:24px;--space-6:32px;--space-7:48px;
  --radius-sm:4px;--radius-md:8px;--radius-lg:12px;--radius-xl:16px;
  --ease-spring:cubic-bezier(0.34,1.56,0.64,1);--ease-smooth:cubic-bezier(0.4,0,0.2,1);
}

html{font-size:16px;-webkit-text-size-adjust:100%}

body{
  font-family:var(--font-sans);
  background:var(--color-bg);
  color:var(--color-text);
  min-height:100dvh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:var(--space-5) var(--space-4);
  touch-action:manipulation;
  -webkit-user-select:none;
  user-select:none;
  overflow-x:hidden;
}

/* ─── Phone frame ─── */
.phone-frame{
  width:100%;
  max-width:420px;
  min-height:740px;
  background:var(--color-bg);
  border:1px solid var(--color-border);
  border-radius:var(--radius-xl);
  box-shadow:0 2px 24px rgba(0,0,0,0.04),0 0 0 1px rgba(0,0,0,0.02);
  overflow:hidden;
  position:relative;
  display:flex;
  flex-direction:column;
}

/* ─── Screen base ─── */
.screen{display:none;flex-direction:column;min-height:740px;}
.screen.active{display:flex;}

/* ═══ STATUS BAR ═══ */
.status-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:var(--space-2) var(--space-5) var(--space-1);
  font-family:var(--font-mono);font-size:12px;font-weight:600;
  color:var(--color-text);min-height:36px;flex-shrink:0;
}
.status-bar .icons{display:flex;gap:var(--space-1);align-items:center;}
.status-bar .icons svg{fill:var(--color-text);opacity:0.4;}
.status-bar .time{font-feature-settings:'tnum';}

/* ═══ HEADER BAR ═══ */
.header-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:var(--space-1) var(--space-4) 0;flex-shrink:0;
}
.header-bar .back-link{
  display:flex;align-items:center;gap:var(--space-1);
  font-family:var(--font-mono);font-size:12px;
  color:var(--color-muted);cursor:pointer;
  background:none;border:none;padding:var(--space-1) 0;
}
.header-bar .back-link svg{fill:none;stroke:var(--color-muted);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;width:16px;height:16px;}
.header-bar .actions{display:flex;gap:var(--space-2);}
.mute-btn{
  background:none;border:none;cursor:pointer;
  font-size:16px;opacity:0.4;padding:var(--space-1);
  color:var(--color-text);transition:opacity 0.2s;
}
.mute-btn:hover{opacity:0.7;}

/* ═══ TITLE / LEVEL SELECT SCREEN ═══ */
.title-section{
  padding:var(--space-4) var(--space-5) var(--space-2);
  text-align:center;flex-shrink:0;
}
.title-section h1{
  font-family:var(--font-sans);font-size:31px;font-weight:600;
  color:var(--color-text);line-height:1.2;letter-spacing:-0.01em;
}
.title-section h1 span{color:var(--color-accent);}
.title-section .subtitle{
  font-size:14px;color:var(--color-muted);margin-top:var(--space-1);font-weight:400;
}

/* Level cards */
.puzzle-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:var(--space-3);padding:var(--space-3) var(--space-4) var(--space-5);
  flex:1;overflow-y:auto;
}
.puzzle-grid::-webkit-scrollbar{width:3px;}
.puzzle-grid::-webkit-scrollbar-thumb{background:var(--color-border);border-radius:4px;}

.puzzle-card{
  background:var(--color-surface);
  border:1px solid var(--color-border);
  border-radius:var(--radius-lg);
  padding:var(--space-3) var(--space-3);
  text-align:center;cursor:pointer;
  transition:transform 0.25s var(--ease-spring), border-color 0.25s ease, box-shadow 0.25s ease;
  position:relative;overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}
.puzzle-card:hover{
  transform:translateY(-2px) scale(1.02);
  border-color:var(--color-accent);
  box-shadow:0 4px 16px rgba(0,0,0,0.04);
}

.puzzle-card .thumb{
  width:100%;aspect-ratio:1;
  border-radius:var(--radius-sm);
  background:var(--color-bg);
  margin-bottom:var(--space-2);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;
  border:1px solid var(--color-border);
  position:relative;overflow:hidden;
}

.puzzle-card .name{
  font-size:13px;font-weight:600;color:var(--color-text);
}
.puzzle-card .meta{
  display:flex;justify-content:center;align-items:center;
  gap:var(--space-2);margin-top:3px;
}
.puzzle-card .difficulty{
  display:inline-block;padding:1px 8px;border-radius:20px;
  font-family:var(--font-mono);font-size:9px;font-weight:600;
  text-transform:uppercase;letter-spacing:0.06em;
}
.puzzle-card .difficulty.easy{background:oklch(0.93 0.05 200);color:oklch(0.40 0.15 200);}
.puzzle-card .difficulty.medium{background:oklch(0.95 0.06 80);color:oklch(0.50 0.14 80);}
.puzzle-card .difficulty.hard{background:oklch(0.93 0.08 30);color:oklch(0.45 0.18 30);}
.puzzle-card .grid-size{
  font-family:var(--font-mono);font-size:10px;color:var(--color-muted);
}

.stars{display:inline-flex;gap:2px;}
.stars svg{fill:#F59E0B;}

.puzzle-card.locked{
  opacity:0.5;cursor:default;
}
.puzzle-card.locked:hover{transform:none;border-color:var(--color-border);box-shadow:none;}
.puzzle-card.locked .lock-overlay{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,0.3);
  backdrop-filter:blur(4px);
  border-radius:var(--radius-lg);z-index:2;
}
.puzzle-card.locked .lock-overlay svg{fill:var(--color-muted);width:24px;height:24px;}
.puzzle-card.locked .thumb{filter:grayscale(0.5) brightness(0.9);}

.puzzle-card.active{
  border-color:var(--color-accent);
  box-shadow:0 0 0 2px var(--color-accent), 0 4px 16px rgba(0,0,0,0.06);
}

.play-cta{
  display:flex;align-items:center;justify-content:center;
  gap:var(--space-2);
  padding:var(--space-3) var(--space-5);margin:0 var(--space-4) var(--space-4);
  background:var(--color-accent);color:white;
  border:none;border-radius:var(--radius-lg);
  font-family:var(--font-sans);font-size:15px;font-weight:600;
  cursor:pointer;
  transition:transform 0.25s var(--ease-spring), box-shadow 0.25s ease;
  flex-shrink:0;
}
.play-cta:hover{transform:scale(1.02);box-shadow:0 6px 20px rgba(0,0,0,0.08);}
.play-cta svg{fill:white;width:16px;height:16px;}

/* ═══ GAME SCREEN ═══ */
.game-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:var(--space-1) var(--space-4);flex-shrink:0;
}
.game-header .left{display:flex;align-items:center;gap:var(--space-2);}
.game-header .back-btn{
  background:none;border:none;cursor:pointer;
  padding:var(--space-1);color:var(--color-muted);
}
.game-header .back-btn svg{fill:none;stroke:var(--color-muted);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;width:20px;height:20px;}
.game-header .level-name{
  font-size:13px;font-weight:600;color:var(--color-text);
}
.game-header .timer{
  font-family:var(--font-mono);font-size:16px;font-weight:600;
  color:var(--color-text);font-feature-settings:'tnum';
}

/* Palette strip */
.palette-strip{
  display:flex;gap:var(--space-2);
  padding:var(--space-2) var(--space-4) var(--space-2);
  overflow-x:auto;flex-shrink:0;
  -webkit-overflow-scrolling:touch;
}
.palette-strip::-webkit-scrollbar{height:0;}

.palette-swatch{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:var(--space-2) var(--space-2) var(--space-1);
  border-radius:var(--radius-md);
  border:2px solid transparent;cursor:pointer;
  min-width:44px;flex-shrink:0;
  transition:all 0.2s var(--ease-smooth);
  position:relative;
  -webkit-tap-highlight-color:transparent;
}
.palette-swatch .color-dot{
  width:24px;height:24px;border-radius:var(--radius-sm);
  flex-shrink:0;border:1px solid rgba(0,0,0,0.06);
  transition:transform 0.2s var(--ease-spring);
}
.palette-swatch .num{
  font-family:var(--font-mono);font-size:11px;font-weight:700;
  color:var(--color-text);
}
.palette-swatch .count{
  font-family:var(--font-mono);font-size:9px;
  color:var(--color-muted);
}
.palette-swatch.active{
  border-color:var(--color-accent);
  background:color-mix(in oklch, var(--color-accent) 6%, transparent);
}
.palette-swatch.active .color-dot{transform:scale(1.15);}
.palette-swatch.completed{opacity:0.3;pointer-events:none;}
.palette-swatch.completed .check-badge{
  position:absolute;top:-4px;right:-4px;
  width:16px;height:16px;
  background:var(--color-text);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
}
.palette-swatch.completed .check-badge svg{fill:white;width:10px;height:10px;}

.hint-label{
  font-size:12px;color:var(--color-muted);
  padding:0 var(--space-4) var(--space-2);
  text-align:center;flex-shrink:0;font-weight:400;
  transition:opacity 0.3s, color 0.3s;
}

/* Grid area */
.grid-area{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:0 var(--space-4);min-height:280px;
}
.game-grid{
  display:grid;gap:2px;width:100%;max-width:320px;
  aspect-ratio:1;
  border-radius:var(--radius-sm);
  background:var(--color-surface);
  padding:4px;
  touch-action:manipulation;
}
.gcell{
  aspect-ratio:1;border-radius:3px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);font-size:11px;font-weight:600;
  color:var(--color-muted);cursor:pointer;
  position:relative;transition:background 0.15s ease, transform 0.15s var(--ease-spring), box-shadow 0.15s ease;
  min-height:0;
  -webkit-tap-highlight-color:transparent;
}
.gcell.unfilled{background:var(--color-bg);border:1px solid var(--color-border);}
.gcell.unfilled:hover{filter:brightness(0.97);}
.gcell.unfilled .num{opacity:0.7;}
.gcell.highlighted{
  animation:pulse-glow 1.2s ease-in-out infinite;
  box-shadow:inset 0 0 0 2px var(--color-accent), 0 0 6px color-mix(in oklch, var(--color-accent) 20%, transparent);
}
@keyframes pulse-glow{0%,100%{opacity:1;}50%{opacity:0.6;}}
.gcell.filled{border:1px solid transparent;animation:pop-fill 0.2s var(--ease-spring);}
.gcell.filled .num{display:none;}
@keyframes pop-fill{0%{transform:scale(0.8);opacity:0.5;}100%{transform:scale(1);opacity:1;}}
.gcell.wrong-fill{animation:shake 0.3s ease-out;background:color-mix(in oklch, var(--color-error) 20%, transparent)!important;}
.gcell .wrong-num{position:absolute;top:1px;right:2px;font-family:var(--font-mono);font-size:9px;font-weight:700;color:var(--color-error);opacity:0.9;pointer-events:none;line-height:1;}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-3px)}40%{transform:translateX(3px)}60%{transform:translateX(-2px)}80%{transform:translateX(2px)}}
.gcell.cursor-highlight{
  box-shadow:inset 0 0 0 2.5px #F59E0B, 0 0 8px rgba(245,158,11,0.3);
  z-index:2;
}

/* Progress bar */
.progress-section{
  padding:var(--space-2) var(--space-4) var(--space-3);
  flex-shrink:0;
}
.progress-bar-track{
  width:100%;height:4px;
  background:var(--color-border);
  border-radius:4px;overflow:hidden;
}
.progress-bar-fill{
  height:100%;width:0%;
  background:var(--color-accent);
  border-radius:4px;
  transition:width 0.5s var(--ease-smooth);
}
.progress-meta{
  display:flex;justify-content:space-between;
  margin-top:var(--space-1);
  font-family:var(--font-mono);font-size:10px;
  color:var(--color-muted);font-feature-settings:'tnum';
}

/* ═══ RESULT SCREEN ═══ */
.results-content{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:var(--space-5);text-align:center;
  position:relative;overflow:hidden;
}

.confetti-container{
  position:absolute;inset:0;pointer-events:none;overflow:hidden;
}
@keyframes confetti-drift{
  0%{transform:translateY(-10px) rotate(0deg);opacity:1;}
  100%{transform:translateY(420px) rotate(540deg);opacity:0;}
}
.confetti-container .particle{
  position:absolute;width:5px;height:5px;border-radius:1px;
  top:-8px;animation:confetti-drift 2.8s ease-in forwards;
}

.check-icon-big{
  width:56px;height:56px;border-radius:50%;
  background:color-mix(in oklch, var(--color-accent) 10%, transparent);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:var(--space-3);
  animation:bounce-pop 0.5s var(--ease-spring);
  position:relative;z-index:1;
}
.check-icon-big svg{fill:none;stroke:var(--color-accent);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;width:28px;height:28px;}
@keyframes bounce-pop{0%{transform:scale(0);}60%{transform:scale(1.15);}100%{transform:scale(1);}}

.results-content .complete-title{
  font-family:var(--font-sans);font-size:25px;font-weight:600;
  color:var(--color-text);letter-spacing:-0.01em;
  position:relative;z-index:1;
}
.results-content .complete-subtitle{
  font-size:14px;color:var(--color-muted);margin-top:var(--space-1);
  position:relative;z-index:1;
}

.new-best{
  display:inline-flex;align-items:center;gap:var(--space-1);
  font-family:var(--font-mono);font-size:10px;font-weight:600;
  color:#F59E0B;
  background:color-mix(in oklch, #F59E0B 10%, transparent);
  padding:2px var(--space-3);border-radius:20px;
  margin-top:var(--space-1);position:relative;z-index:1;
}
.new-best svg{fill:#F59E0B;width:10px;height:10px;}

.score-card{
  background:var(--color-surface);
  border:1px solid var(--color-border);
  border-radius:var(--radius-lg);
  padding:var(--space-5) var(--space-5);
  margin:var(--space-4) 0;
  width:100%;max-width:240px;
  position:relative;z-index:1;
}
.score-card .score-big{
  font-family:var(--font-sans);font-size:39px;font-weight:600;
  color:var(--color-text);line-height:1;
  letter-spacing:-0.02em;font-feature-settings:'tnum';
}
.score-card .score-label{
  font-family:var(--font-mono);font-size:10px;
  text-transform:uppercase;letter-spacing:0.1em;
  color:var(--color-muted);margin-top:2px;
}
.score-card .score-stats{
  display:flex;justify-content:center;
  gap:var(--space-4);margin-top:var(--space-3);
  padding-top:var(--space-3);
  border-top:1px solid var(--color-border);
}
.score-card .score-stats div{text-align:center;}
.score-card .score-stats .stat-val{
  font-family:var(--font-mono);font-size:14px;font-weight:600;
  color:var(--color-text);font-feature-settings:'tnum';
}
.score-card .score-stats .stat-label{
  font-family:var(--font-mono);font-size:8px;
  text-transform:uppercase;letter-spacing:0.06em;
  color:var(--color-muted);margin-top:2px;
}

.results-buttons{
  display:flex;flex-direction:column;
  gap:var(--space-2);width:100%;max-width:200px;
  position:relative;z-index:1;
}
.btn-primary{
  display:flex;align-items:center;justify-content:center;
  gap:var(--space-2);
  font-family:var(--font-sans);font-size:14px;font-weight:600;
  padding:var(--space-3) var(--space-5);
  border-radius:var(--radius-lg);
  background:var(--color-accent);color:white;
  border:none;cursor:pointer;
  transition:transform 0.2s var(--ease-spring), box-shadow 0.2s ease;
}
.btn-primary:hover{transform:scale(1.02);box-shadow:0 6px 20px rgba(0,0,0,0.08);}
.btn-primary svg{fill:white;width:14px;height:14px;}
.btn-secondary{
  display:flex;align-items:center;justify-content:center;
  gap:var(--space-2);
  font-family:var(--font-sans);font-size:13px;font-weight:500;
  padding:var(--space-2) var(--space-4);
  border-radius:var(--radius-md);
  background:transparent;color:var(--color-text);
  border:1px solid var(--color-border);
  cursor:pointer;
  transition:all 0.2s ease;
}
.btn-secondary:hover{background:var(--color-surface);border-color:var(--color-muted);}
.btn-secondary svg{fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;width:14px;height:14px;}

/* ═══ RESPONSIVE ═══ */
@media(max-width:480px){
  .phone-frame{max-width:100%;min-height:100dvh;border-radius:0;border-left:none;border-right:none;}
  body{padding:0;}
  .screen{min-height:100dvh;}
}
@media(prefers-reduced-motion:reduce){
  *{transition:none!important;animation:none!important;}
  .confetti-container{display:none;}
  .gcell.highlighted{animation:none;opacity:0.65;}
  .gcell{transition:none!important;animation:none!important;}
  .gcell.filled{animation:none;}
  .check-icon-big{animation:none;}
}


</style>
</head>
<body>

<div class="phone-frame" id="app">
  <!-- ═══ STATUS BAR (global) ═══ -->
  <div class="status-bar" id="status-bar">
    <span class="time" id="status-time">9:41</span>
    <div class="icons">
      <svg width="14" height="10" viewBox="0 0 14 10"><rect x="1" y="1" width="12" height="8" rx="1.5" fill="none" stroke="currentColor" stroke-width="1"/><rect x="2" y="3" width="5" height="4" rx="0.5" fill="currentColor"/></svg>
      <svg width="14" height="10" viewBox="0 0 14 10"><path d="M7 1C4.5 1 2.3 2.2 1 4c1.3 1.8 3.5 3 6 3s4.7-1.2 6-3c-1.3-1.8-3.5-3-6-3zm0 5a2 2 0 110-4 2 2 0 010 4z"/></svg>
    </div>
  </div>

  <!-- ═══ TITLE / LEVEL SELECT ═══ -->
  <section id="screen-title" class="screen active">
    <div class="header-bar">
      <button class="back-link" onclick="window.location.href='/'">
        <svg viewBox="0 0 16 16"><path d="M10 2L4 8l6 6"/></svg>Arcade
      </button>
      <button class="mute-btn" id="title-mute-btn" onclick="toggleMute()">🔊</button>
    </div>

    <div class="title-section">
      <h1>Color <span>Mosaic</span></h1>
      <div class="subtitle">Select a puzzle to begin</div>
    </div>

    <div class="puzzle-grid" id="level-grid"></div>

    <button class="play-cta" id="play-cta" onclick="playSelected()" style="display:none;">
      <svg viewBox="0 0 16 16"><path d="M4 2v12l10-6z"/></svg>Play Selected
    </button>
  </section>

  <!-- ═══ GAMEPLAY ═══ -->
  <section id="screen-game" class="screen">
    <div class="game-header">
      <div class="left">
        <button class="back-btn" onclick="goToMenu()">
          <svg viewBox="0 0 20 20"><path d="M12 4l-6 6 6 6"/></svg>
        </button>
        <span class="level-name" id="level-name">Twinkle Star</span>
      </div>
      <span class="timer" id="timer">0:00</span>
    </div>

    <div class="hint-label" id="hint-text">Select a color, then tap cells</div>

    <div class="palette-strip" id="palette"></div>

    <div class="grid-area">
      <div class="game-grid" id="game-grid"></div>
    </div>

    <div class="progress-section">

  <!-- ═══ RESULT ═══ -->
  <section id="screen-result" class="screen">

      </div>

      <div class="complete-subtitle" id="result-subtitle">Twinkle Star · 1:42</div>
      <div class="new-best" id="new-best-badge" style="display:none;">
        <svg viewBox="0 0 20 20"><path d="M10 1l2.4 7.2H20l-6.2 4.5 2.4 7.2L10 15.4l-6.2 4.5 2.4-7.2L0 8.2h7.6z"/></svg>NEW BEST
      </div>

        <div class="score-big" id="result-score">0</div>

          <div><div class="stat-val" id="result-cells">0</div><div class="stat-label">Cells</div></div>

</div>

<script>
(function(){
  'use strict';

  /* ═══════════════════════════════════════════
     PALETTE
     ═══════════════════════════════════════════ */
  var PALETTE = [
    '',              // 0 = unused
    '#E52521',       // 1 = Red
    '#0051A8',       // 2 = Blue
    '#049D10',       // 3 = Green
    '#FBD000',       // 4 = Yellow
    '#F59E0B',       // 5 = Orange
    '#7C3AED',       // 6 = Purple
    '#DC2626',       // 7 = Pink/Red
    '#0F766E',       // 8 = Teal
  ];

  /* ═══════════════════════════════════════════
     LEVELS (12 total)
     ═══════════════════════════════════════════ */

  function makeGrid(rows, cols, fillVal) {
    var g = [];
    for (var r = 0; r < rows; r++) {
      g[r] = [];
      for (var c = 0; c < cols; c++) {
        g[r][c] = fillVal;
      }
    }
    return g;
  }

  function pattern(grid, fn) {
    for (var r = 0; r < grid.length; r++) {
      for (var c = 0; c < grid[r].length; c++) {
        grid[r][c] = fn(r, c);
      }
    }
    return grid;
  }

  /* Level 1: Twinkle Star (8x8, 4 colors) */
  function lvl1Grid() {
    return pattern(makeGrid(8,8,0), function(r,c){
      if (r===0&&c!==3&&c!==4) return 0;
      if (r===1&&c!==2&&c!==3&&c!==4&&c!==5) return 0;
      if (r===2&&c!==1&&c!==2&&c!==3&&c!==4&&c!==5&&c!==6) return 0;
      if (r===3&&c!==0&&c!==1&&c!==2&&c!==3&&c!==4&&c!==5&&c!==6&&c!==7) return 0;
      if (r===4&&c!==0&&c!==1&&c!==2&&c!==3&&c!==4&&c!==5&&c!==6&&c!==7) return 0;
      if (r===5&&c!==1&&c!==2&&c!==3&&c!==4&&c!==5&&c!==6) return 0;
      if (r===6&&c!==2&&c!==3&&c!==4&&c!==5) return 0;
      if (r===7&&c!==3&&c!==4) return 0;
      return (r===3||r===4)&&c===3||(r===3||r===4)&&c===4?4:3;
    });
  }

  /* Level 2: Heart Beat (8x8, 4 colors) */
  function lvl2Grid() {
    return pattern(makeGrid(8,8,0), function(r,c){
      if (r===0&&(c<2||c>5)) return 0;
      if (r===1&&(c<1||c>6)) return 0;
      if (r===2&&(c<0||c>7)) return 0;
      if (r===3&&(c<0||c>7)) return 0;
      if (r===4&&(c<0||c>7)) return 0;
      if (r===5&&(c<1||c>6)) return 0;
      if (r===6&&(c<2||c>5)) return 0;
      if (r===7&&(c<3||c>4)) return 0;
      if (r===0&&c>=2&&c<=3) return 2;
      if (r===0&&c>=4&&c<=5) return 2;
      if (r===1&&(c===2||c===3||c===4||c===5)) return 7;
      if (r===2&&(c===2||c===3||c===4||c===5)) return 7;
      if (r===3&&(c===3||c===4)) return 4;
      return 7;
    });
  }

  /* Level 3: Shining Star (8x8, 4 colors) - actually just the original star */
  function lvl3Grid() {
    return pattern(makeGrid(8,8,0), function(r,c){
      if (r===0&&c!==3&&c!==4) return 0;
      if (r===1&&c!==2&&c!==3&&c!==4&&c!==5) return 0;
      if (r===2&&c!==1&&c!==2&&c!==3&&c!==4&&c!==5&&c!==6) return 0;
      if (r===3&&c!==0&&c!==1&&c!==2&&c!==3&&c!==4&&c!==5&&c!==6&&c!==7) return 0;
      if (r===4&&c!==1&&c!==2&&c!==3&&c!==4&&c!==5&&c!==6) return 0;
      if (r===5&&c!==2&&c!==3&&c!==4&&c!==5) return 0;
      if (r===6&&c!==3&&c!==4) return 0;
      if (r===7) return 0;
      return (r===2||r===3)&&c===3||(r===2||r===3)&&c===4?4:3;
    });
  }

  /* Level 4: Pink Flower (10x10, 4 colors) */
  function lvl4Grid() {
    return pattern(makeGrid(10,10,0), function(r,c){
      if (r===0&&(c<3||c>6)) return 0;
      if (r===1&&(c<2||c>7)) return 0;
      if (r===2&&(c<1||c>8)) return 0;
      if (r===3&&(c<0||c>9)) return 0;
      if (r===4&&(c<0||c>9)) return 0;
      if (r===5&&(c<1||c>8)) return 0;
      if (r===6&&(c<2||c>7)) return 0;
      if (r===7&&(c<3||c>6)) return 0;
      if (r===8&&(c<4||c>5)) return 0;
      if (r===9) return 0;
      if (r===0||r===1) return 7;
      if ((r===2||r===3)&&c>=2&&c<=4) return 7;
      if ((r===2||r===3)&&c>=5&&c<=7) return 1;
      if (r===4&&(c===1||c===2)) return 7;
      if (r===4&&(c===7||c===8)) return 1;
      if (r===5&&(c===2||c===3)) return 3;
      if (r===5&&(c===6||c===7)) return 1;
      if ((r===6||r===7)&&c>=3&&c<=6) return 3;
      if (r===8&&c>=4&&c<=5) return 3;
      if ((r===2||r===3||r===4||r===5)&&c>=4&&c<=5) return 4;
      return 0;
    });
  }

  /* Level 5: Cozy House (10x10, 4 colors) */
  function lvl5Grid() {
    return pattern(makeGrid(10,10,0), function(r,c){
      if (r<1&&(c<3||c>6)) return 0;
      if (r===1&&(c<2||c>7)) return 0;
      if (r===2&&(c<1||c>8)) return 0;
      if (r===3&&(c<0||c>9)) return 0;
      if (r>8) return 0;
      if (r<=3) return 1;
      if (r===4) return 2;
      if (r>=5&&r<=8) {
        if (r>=6&&r<=7&&c>=3&&c<=4) return 4;
        if (r>=6&&r<=7&&c>=6&&c<=7) return 4;
        if (r>=6&&r<=8&&c>=5&&c<=5) return 5;
        if (r===8&&c>=5&&c<=5) return 5;
        return 4;
      }
      return 4;
    });
  }

  /* Level 6: Tall Tree (10x10, 4 colors) */
  function lvl6Grid() {
    return pattern(makeGrid(10,10,0), function(r,c){
      if (r>=7&&r<=9&&c>=4&&c<=5) return 5;
      var dr=Math.abs(r-3), dc=Math.abs(c-4);
      if (dr*dr+dc*dc<=9&&r<=5) return 3;
      if (dr*dr+dc*dc<=12&&r<=6) return 3;
      if ((r===1||r===2)&&(c===2||c===6)) return 1;
      if ((r===4||r===5)&&(c===1||c===7)) return 1;
      if (r===0&&c===4) return 1;
      return 0;
    });
  }

  /* Level 7: Blue Fish (12x12, 5 colors) */
  function lvl7Grid() {
    return pattern(makeGrid(12,12,0), function(r,c){
      var dr=Math.abs(r-5), dc=Math.abs(c-5);
      if (dr*2+dc>6) return 0;
      if (c>=9&&c<=11&&r>=3&&r<=7) {
        if (c===9&&(r>=4&&r<=6)) return 2;
        if (c===10&&(r===4||r===6)) return 2;
        if (c===10&&r===5) return 2;
        if (c===11&&r===5) return 2;
        return 0;
      }
      if (r<=2&&c>=3&&c<=5) return 6;
      if (r<=1&&c===4) return 6;
      if (r===4&&c===2) return 7;
      if (r===4&&c===1) return 7;
      if (r>=3&&r<=7&&c>=1&&c<=8) return 2;
      return 0;
    });
  }

  /* Level 8: Crystal Gem (12x12, 5 colors) */
  function lvl8Grid() {
    return pattern(makeGrid(12,12,0), function(r,c){
      var center=5;
      var hw=function(ro){
        if(ro<0||ro>11) return -1;
        if(ro<=center) return ro;
        return 11-ro;
      };
      var w=hw(r);
      if(c<center-w||c>center+w) return 0;
      if(r<=3) return 2;
      if(r<=center) return 2;
      if(r<=8) return 6;
      return 6;
    });
  }

  /* Level 9: Butterfly (15x15, 6 colors) */
  function lvl9Grid() {
    return pattern(makeGrid(15,15,0), function(r,c){
      if(c<5||c>9) return 0;
      if(c>=7&&c<=7&&r>=4&&r<=10) return 8;
      if((c===6||c===8)&&r>=4&&r<=10) return 8;
      if(r>=2&&r<=3&&(c===6||c===8)) return 8;
      if(r===1&&(c===5||c===9)) return 8;
      if(r===0&&(c===4||c===10)) return 8;
      if(r>=2&&r<=6&&c>=2&&c<=5) return 7;
      if(r>=6&&r<=10&&c>=2&&c<=5) return 5;
      if(r>=2&&r<=6&&c>=9&&c<=12) return 7;
      if(r>=6&&r<=10&&c>=9&&c<=12) return 5;
      if(r>=3&&r<=5&&c>=3&&c<=4) return 2;
      if(r>=3&&r<=5&&c>=10&&c<=11) return 2;
      return 0;
    });
  }

  /* Level 10: Old Castle (15x15, 6 colors) */
  function lvl10Grid() {
    return pattern(makeGrid(15,15,0), function(r,c){
      if(c<2||c>12) return 0;
      if(r>12) return 0;
      if(r>=11) return 3;
      if((c>=2&&c<=3)||(c>=11&&c<=12)) {
        if(r<=5) return 1;
        if(r<=10) return 8;
      }
      if((c===2||c===3||c===11||c===12)&&r<=5) return 1;
      if(r>=4&&r<=10&&c>=4&&c<=10) return 8;
      if(r===3&&c>=4&&c<=10&&c%2===0) return 1;
      if(r>=9&&r<=10&&c>=6&&c<=8) return 5;
      if(r>=5&&r<=7&&c>=5&&c<=6) return 4;
      if(r>=5&&r<=7&&c>=8&&c<=9) return 4;
      return 0;
    });
  }

  /* Level 11: Space Rocket (15x15, 6 colors) */
  function lvl11Grid() {
    return pattern(makeGrid(15,15,0), function(r,c){
      if(c<5||c>9) return 0;
      if(r<=1&&(c<6||c>8)) return 0;
      if(r===2&&(c<5||c>9)) return 0;
      if(r>13) return 0;
      if(r<=3) return 1;
      if(r>=4&&r<=10) return 2;
      if(r>=11&&r<=12&&(c===5||c===9)) return 1;
      if(r>=7&&r<=9&&c>=6&&c<=8) {
        if(r===7||r===9||c===6||c===8) return 8;
        return 2;
      }
      if(r>=8&&r<=8&&c>=7&&c<=7) return 1;
      if(r>=12&&r<=13&&c>=6&&c<=8) return 4;
      if(r>=13&&r<=13&&c>=7&&c<=7) return 5;
      return 0;
    });
  }

  /* Level 12: Wise Owl (15x15, 6 colors) */
  function lvl12Grid() {
    return pattern(makeGrid(15,15,0), function(r,c){
      if(c<3||c>11) return 0;
      if(r===0&&(c<5||c>9)) return 0;
      if(r===1&&(c<4||c>10)) return 0;
      if(r===0&&c>=6&&c<=8) return 0;
      if(r===1&&c>=6&&c<=8) return 0;
      if(r===0&&(c===5||c===9)) return 5;
      if(r===1&&(c===4||c===5||c===9||c===10)) return 5;
      if(r>=2&&r<=12) {
        if(r<=5) {
          if(c<5||c>9) return 0;
          if((r>=2&&r<=4)&&(c>=5&&c<=6)) return 4;
          if((r>=2&&r<=4)&&(c>=8&&c<=9)) return 4;
          if((r>=3&&r<=3)&&(c>=6&&c<=6)) return 8;
          if((r>=3&&r<=3)&&(c>=8&&c<=8)) return 8;
          if(r>=4&&r<=5&&c>=6&&c<=8) return 5;
          return 7;
        }
        if(r<=9) {
          if(c<5||c>9) return 0;
          return 5;
        }
        if(c<5||c>9) return 0;
        return 4;
      }
      if(r>=13&&r<=14&&c>=5&&c<=9) return 5;
      return 0;
    });
  }

  var LEVELS = [
    { name:'Twinkle Star',  icon:'⭐', grid:lvl1Grid,  diff:'easy',   size:'8×8' },
    { name:'Heart Beat',    icon:'❤️', grid:lvl2Grid,  diff:'easy',   size:'8×8' },
    { name:'Shining Star',  icon:'🌟', grid:lvl3Grid,  diff:'easy',   size:'8×8' },
    { name:'Pink Flower',   icon:'🌸', grid:lvl4Grid,  diff:'easy',   size:'10×10' },
    { name:'Cozy House',    icon:'🏠', grid:lvl5Grid,  diff:'easy',   size:'10×10' },
    { name:'Tall Tree',     icon:'🌲', grid:lvl6Grid,  diff:'medium', size:'10×10' },
    { name:'Blue Fish',     icon:'🐟', grid:lvl7Grid,  diff:'medium', size:'12×12' },
    { name:'Crystal Gem',   icon:'💎', grid:lvl8Grid,  diff:'medium', size:'12×12' },
    { name:'Butterfly',     icon:'🦋', grid:lvl9Grid,  diff:'medium', size:'15×15' },
    { name:'Old Castle',    icon:'🏰', grid:lvl10Grid, diff:'hard',   size:'15×15' },
    { name:'Space Rocket',  icon:'🚀', grid:lvl11Grid, diff:'hard',   size:'15×15' },
    { name:'Wise Owl',      icon:'🦉', grid:lvl12Grid, diff:'hard',   size:'15×15' },
  ];

  /* ═══════════════════════════════════════════
     STATE
     ═══════════════════════════════════════════ */

  var state = {
    currentLevel: 0,
    selectedLevel: 0,
    unlockedLevel: 1,
    gridState: [],
    correctCount: 0,
    totalFillable: 0,
    selectedColor: 0,
    timer: 0,
    timerStarted: false,
    timerRunning: false,
    timerRAF: null,
    cursorRow: -1,
    cursorCol: -1,
    muted: false,
    highScore: 0,
    levelScores: {},
    levelCompleted: {},
  };

  var timerLast = 0;
  var STORAGE_KEY = 'colorMosaic';

  /* DOM refs */
  var $ = function(id) { return document.getElementById(id); };
  var gridEl = $('game-grid');
  var paletteEl = $('palette');

  /* ═══════════════════════════════════════════
     AUDIO
     ═══════════════════════════════════════════ */

  var audioCtx = null;

  function initAudio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    }
    if (audioCtx && audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }

  function playTone(freq, type, dur, vol) {
    if (!audioCtx || state.muted) return;
    try {
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.type = type || 'sine';
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      if (type === 'sweep') {
        osc.frequency.exponentialRampToValueAtTime(freq * 1.3, audioCtx.currentTime + dur);
        osc.type = 'sine';
      }
      gain.gain.setValueAtTime(vol || 0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + dur);
    } catch(e) {}
  }

  function sfxSelect() { playTone(500, 'sine', 0.08, 0.08); }
  function sfxPaint() {
    playTone(700, 'sweep', 0.06, 0.07);
    try { if (navigator.vibrate) navigator.vibrate(10); } catch(e) {}
  }
  function sfxError() {
    playTone(200, 'sawtooth', 0.15, 0.1);
    playTone(150, 'square', 0.12, 0.06);
    try { if (navigator.vibrate) navigator.vibrate([5,10,10]); } catch(e) {}
  }
  function sfxComplete() {
    playTone(523, 'sine', 0.12, 0.08);
    setTimeout(function(){ playTone(659, 'sine', 0.12, 0.08); }, 100);
    setTimeout(function(){ playTone(784, 'sine', 0.12, 0.08); }, 200);
    setTimeout(function(){ playTone(1047, 'sine', 0.25, 0.1); }, 300);
    try { if (navigator.vibrate) navigator.vibrate([10,20,10,20,10]); } catch(e) {}
  }

  /* ═══════════════════════════════════════════
     STORAGE
     ═══════════════════════════════════════════ */

  function loadSave() {
    try {
      var data = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if (data) {
        state.highScore = data.highScore || 0;
        state.unlockedLevel = data.unlockedLevel || 1;
        state.levelScores = data.levelScores || {};
        state.levelCompleted = data.levelCompleted || {};
      }
    } catch(e) {}
  }

  function saveProgress() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        highScore: state.highScore,
        unlockedLevel: state.unlockedLevel,
        levelScores: state.levelScores,
        levelCompleted: state.levelCompleted
      }));
    } catch(e) {}
  }

  /* ═══════════════════════════════════════════
     SCREEN MANAGEMENT
     ═══════════════════════════════════════════ */

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(function(s){
      s.classList.remove('active');
    });
    var target = $(id);
    if (target) target.classList.add('active');
  }

  /* ═══════════════════════════════════════════
     MUTE TOGGLE
     ═══════════════════════════════════════════ */

  function toggleMute() {
    state.muted = !state.muted;
    var icon = state.muted ? '🔇' : '🔊';
    var els = document.querySelectorAll('.mute-btn');
    for (var i = 0; i < els.length; i++) els[i].textContent = icon;
  }
  window.toggleMute = toggleMute;

  /* ═══════════════════════════════════════════
     LEVEL SELECTOR
     ═══════════════════════════════════════════ */

  function buildLevelSelector() {
    var grid = $('level-grid');
    grid.innerHTML = '';
    LEVELS.forEach(function(lvl, i){
      var card = document.createElement('div');
      card.className = 'puzzle-card';
      var levelNum = i + 1;
      var locked = levelNum > state.unlockedLevel;
      var completed = state.levelCompleted[i];

      if (locked) card.classList.add('locked');

      // Thumbnail
      var thumbHtml = '<div class="thumb">';
      if (locked) {
        thumbHtml += '<svg viewBox="0 0 24 24" width="24" height="24"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 118 0v4"/></svg>';
      } else {
        thumbHtml += '<span style="font-size:28px">' + lvl.icon + '</span>';
      }
      thumbHtml += '</div>';

      var starsHtml = '';
      if (completed) {
        var s = state.levelScores[i] || 0;
        var starCount = s >= 1200 ? 3 : s >= 800 ? 2 : 1;
        starsHtml = '<span class="stars">';
        for (var si = 0; si < 3; si++) {
          starsHtml += '<svg width="10" height="10" viewBox="0 0 20 20"><path d="M10 1l2.4 7.2H20l-6.2 4.5 2.4 7.2L10 15.4l-6.2 4.5 2.4-7.2L0 8.2h7.6z" fill="' + (si < starCount ? '#F59E0B' : 'oklch(0.85 0 0)') + '"/></svg>';
        }
        starsHtml += '</span>';
      }

      card.innerHTML =
        (locked ? '<div class="lock-overlay"><svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 118 0v4"/></svg></div>' : '') +
        thumbHtml +
        '<div class="name">' + lvl.name + '</div>' +
        '<div class="meta">' +
          '<span class="difficulty ' + lvl.diff + '">' + lvl.diff + '</span>' +
          '<span class="grid-size">' + lvl.size + '</span>' +
          starsHtml +
        '</div>';

      if (!locked) {
        card.addEventListener('click', function(idx){
          return function(){
            state.selectedLevel = idx;
            // Visual active state
            document.querySelectorAll('.puzzle-card').forEach(function(c){ c.classList.remove('active'); });
            card.classList.add('active');
            $('play-cta').style.display = '';
          };
        }(i));
      }

      grid.appendChild(card);
    });
  }

  /* ═══════════════════════════════════════════
     PLAY SELECTED
     ═══════════════════════════════════════════ */

  function playSelected() {
    if (state.selectedLevel !== undefined) {
      state.currentLevel = state.selectedLevel;
      initAudio();
      startLevel(state.currentLevel);
    }
  }
  window.playSelected = playSelected;

  /* ═══════════════════════════════════════════
     GAME SETUP
     ═══════════════════════════════════════════ */

  function startLevel(levelIdx) {
    var lvlDef = LEVELS[levelIdx];
    var lvl = lvlDef.grid();
    state.currentLevel = levelIdx;
    state.selectedColor = 0;
    _currentLvlGrid = null;

    // Build grid state
    state.gridState = [];
    var total = 0;
    for (var r = 0; r < lvl.length; r++) {
      state.gridState[r] = [];
      for (var c = 0; c < lvl[r].length; c++) {
        if (lvl[r][c] > 0) {
          state.gridState[r][c] = 0;
          total++;
        } else {
          state.gridState[r][c] = -1;
        }
      }
    }
    state.totalFillable = total;
    state.correctCount = 0;
    state.timer = 0;
    state.timerStarted = false;
    state.timerRunning = false;
    state.cursorRow = -1;
    state.cursorCol = -1;

    // Build palette
    buildPalette(lvl);

    // Render grid
    renderGrid(lvl);

    // Update header
    $('level-name').textContent = lvlDef.name;
    $('progress-text').textContent = '0 / ' + total;
    $('progress-fill').style.width = '0%';
    $('progress-pct').textContent = '0%';

    $('hint-text').textContent = 'Select a color, then tap cells';
    showScreen('screen-game');
  }

  /* ═══════════════════════════════════════════
     PALETTE
     ═══════════════════════════════════════════ */

  function buildPalette(lvl) {
    paletteEl.innerHTML = '';
    // Find used colors
    var usedColors = {};
    for (var r = 0; r < lvl.length; r++) {
      for (var c = 0; c < lvl[r].length; c++) {
        var val = lvl[r][c];
        if (val > 0) usedColors[val] = true;
      }
    }
    var colorKeys = Object.keys(usedColors).map(Number).sort();

    colorKeys.forEach(function(ci){
      var swatch = document.createElement('div');
      swatch.className = 'palette-swatch';
      swatch.setAttribute('data-color', ci);

      // Remaining count
      var remaining = 0;
      for (var r = 0; r < lvl.length; r++) {
        for (var c = 0; c < lvl[r].length; c++) {
          if (lvl[r][c] === ci && state.gridState[r] && state.gridState[r][c] === 0) {
            remaining++;
          }
        }
      }

      swatch.innerHTML =
        '<span class="color-dot" style="background:' + PALETTE[ci] + '"></span>' +
        '<span class="num">' + ci + '</span>' +
        '<span class="count">' + remaining + '</span>';

      swatch.addEventListener('pointerdown', function(e){
        e.preventDefault();
        selectColor(parseInt(this.getAttribute('data-color')));
      });

      paletteEl.appendChild(swatch);
    });
  }

  function selectColor(ci) {
    state.selectedColor = ci;
    var swatches = document.querySelectorAll('.palette-swatch');
    for (var i = 0; i < swatches.length; i++) {
      swatches[i].classList.toggle('active', parseInt(swatches[i].getAttribute('data-color')) === ci);
    }
    sfxSelect();
    // Highlight matching cells
    var lvlGrid = LEVELS[state.currentLevel].grid();
    var cells = gridEl.children;
    for (var idx = 0; idx < cells.length; idx++) {
      var row = parseInt(cells[idx].getAttribute('data-row'));
      var col = parseInt(cells[idx].getAttribute('data-col'));
      if (row >= 0 && col >= 0) {
        var target = lvlGrid[row][col];
        var filled = state.gridState[row] && state.gridState[row][col] > 0;
        if (target === ci && !filled) {
          cells[idx].classList.add('highlighted');
        } else {
          cells[idx].classList.remove('highlighted');
        }
      }
    }
    $('hint-text').textContent = 'Tap cells with number ' + ci + ' to fill';
  }

  function deselectColor() {
    state.selectedColor = 0;
    var swatches = document.querySelectorAll('.palette-swatch');
    for (var i = 0; i < swatches.length; i++) swatches[i].classList.remove('active');
    var cells = gridEl.children;
    for (var idx = 0; idx < cells.length; idx++) {
      cells[idx].classList.remove('highlighted');
    }
    $('hint-text').textContent = 'Select a color, then tap cells';
  }

  /* ═══════════════════════════════════════════
     GRID RENDERING
     ═══════════════════════════════════════════ */

  function renderGrid(lvl) {
    gridEl.innerHTML = '';
    var rows = lvl.length;
    var cols = lvl[0].length;
    gridEl.style.gridTemplateColumns = 'repeat(' + cols + ', 1fr)';

    for (var r = 0; r < rows; r++) {
      for (var c = 0; c < cols; c++) {
        var cell = document.createElement('div');
        cell.className = 'gcell';
        cell.setAttribute('data-row', r);
        cell.setAttribute('data-col', c);

        var val = lvl[r][c];
        if (val === 0) {
          cell.style.visibility = 'hidden';
          cell.style.cursor = 'default';
        } else {
          cell.classList.add('unfilled');
          cell.innerHTML = '<span class="num">' + val + '</span>';
          cell.addEventListener('pointerdown', (function(row, col){
            return function(e) {
              e.preventDefault();
              paintCell(row, col);
            };
          })(r, c));
        }
        gridEl.appendChild(cell);
      }
    }
  }

  function paintCell(row, col) {
    if (state.selectedColor === 0) {
      $('hint-text').style.opacity = '0.5';
      setTimeout(function(){ $('hint-text').style.opacity = '1'; }, 800);
      return;
    }

    var lvlGrid = getCurrentLvlGrid();
    var target = lvlGrid[row][col];
    if (target === 0) return;

    var currentVal = state.gridState[row][col];

    // Toggle off if same color
    if (currentVal === state.selectedColor) {
      state.gridState[row][col] = 0;
      state.correctCount--;
      updateCellVisual(row, col, 0, lvlGrid);
      updateProgress();
      return;
    }

    // If previously filled with a different color, decrement correct count
    if (currentVal > 0) {
      state.correctCount--;
    }

    state.gridState[row][col] = state.selectedColor;

    if (state.selectedColor === target) {
      state.correctCount++;
      sfxPaint();
    } else {
      // Wrong color feedback
      sfxError();
      var cols = lvlGrid[0].length;
      var cellIdx = row * cols + col;
      var cellEl = gridEl.children[cellIdx];
      if (cellEl) {
        cellEl.classList.add('wrong-fill');
        setTimeout(function(){ cellEl.classList.remove('wrong-fill'); }, 350);
        // Add persistent wrong-number badge so user knows what number belongs here
        var existingBadge = cellEl.querySelector('.wrong-num');
        if (!existingBadge) {
          var badge = document.createElement('span');
          badge.className = 'wrong-num';
          badge.textContent = target;
          cellEl.appendChild(badge);
        }
      }
      $('hint-text').textContent = 'Wrong color! Try number ' + target;
      $('hint-text').style.color = 'oklch(0.55 0.20 30)';
      setTimeout(function(){ $('hint-text').style.color = ''; }, 1200);
    }

    updateCellVisual(row, col, state.selectedColor, lvlGrid);

    // Start timer on first action
    if (!state.timerStarted) {
      state.timerStarted = true;
      state.timerRunning = true;
      timerLast = performance.now();
      timerTick();
    }

    updateProgress();

    // Check win
    if (state.correctCount >= state.totalFillable) {
      state.timerRunning = false;
      sfxComplete();
      setTimeout(function(){ showResult(); }, 500);
    }
  }

  function updateCellVisual(row, col, colorIdx, lvlGrid) {
    var cols = lvlGrid[0].length;
    var idx = row * cols + col;
    var cell = gridEl.children[idx];
    if (!cell) return;

    void cell.offsetWidth; // force reflow

    if (colorIdx === 0) {
      cell.className = 'gcell unfilled';
      cell.style.background = '';
      var val = lvlGrid[row][col];
      cell.innerHTML = '<span class="num">' + val + '</span>';
    } else {
      cell.className = 'gcell filled';
      cell.style.background = PALETTE[colorIdx];
      cell.innerHTML = '';
    }
  }

  /* ═══════════════════════════════════════════
     TIMER
     ═══════════════════════════════════════════ */

  function timerTick() {
    if (!state.timerRunning) return;
    var now = performance.now();
    var dt = (now - timerLast) / 1000;
    timerLast = now;
    state.timer += dt;
    if (state.timer > 180) state.timer = 180;
    updateTimerDisplay();
    state.timerRAF = requestAnimationFrame(timerTick);
  }

  function updateTimerDisplay() {
    var sec = Math.round(state.timer);
    var m = Math.floor(sec / 60);
    var s = sec % 60;
    $('timer').textContent = (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
  }

  /* function lvlGrid for palette update - cache it */
  var _currentLvlGrid = null;

  function getCurrentLvlGrid() {
    if (!_currentLvlGrid) {
      _currentLvlGrid = LEVELS[state.currentLevel].grid();
    }
    return _currentLvlGrid;
  }

  /* ═══════════════════════════════════════════
     PROGRESS
     ═══════════════════════════════════════════ */

  function updateProgress() {
    var pct = state.totalFillable > 0 ? (state.correctCount / state.totalFillable) * 100 : 0;
    $('progress-fill').style.width = pct + '%';
    $('progress-text').textContent = state.correctCount + ' / ' + state.totalFillable;
    $('progress-pct').textContent = Math.round(pct) + '%';
    updatePaletteCounts();
  }

  function updatePaletteCounts() {
    var lvlGrid = getCurrentLvlGrid();
    var swatches = document.querySelectorAll('.palette-swatch');
    for (var i = 0; i < swatches.length; i++) {
      var ci = parseInt(swatches[i].getAttribute('data-color'));
      var remaining = 0;
      for (var r = 0; r < lvlGrid.length; r++) {
        for (var c = 0; c < lvlGrid[r].length; c++) {
          if (lvlGrid[r][c] === ci && state.gridState[r] && state.gridState[r][c] === 0) {
            remaining++;
          }
        }
      }
      var countEl = swatches[i].querySelector('.count');
      if (countEl) countEl.textContent = remaining;
      if (remaining === 0 && ci > 0) {
        swatches[i].classList.add('completed');
      } else {
        swatches[i].classList.remove('completed');
      }
    }
  }

  /* ═══════════════════════════════════════════
     SCORING
     ═══════════════════════════════════════════ */

  function calcScore() {
    var totalCells = state.totalFillable;
    var timerSec = state.timer;
    var base = totalCells * 10;
    var factor = 1 + Math.max(0, (180 - timerSec) / 180) * 0.5;
    return Math.round(base * factor);
  }

  /* ═══════════════════════════════════════════
     RESULT SCREEN
     ═══════════════════════════════════════════ */

  function showResult() {
    showScreen('screen-result');

    var score = calcScore();
    var timeSec = Math.round(state.timer);
    var factor = 1 + Math.max(0, (180 - timeSec) / 180) * 0.5;
    var lvlName = LEVELS[state.currentLevel].name;

    $('result-score').textContent = score.toLocaleString();
    $('result-time').textContent = formatTime(timeSec);
    $('result-cells').textContent = state.totalFillable;
    $('result-bonus').textContent = factor.toFixed(1) + 'x';
    $('result-subtitle').textContent = lvlName + ' \u00b7 ' + formatTime(timeSec);

    // Check new record
    var isNewBest = score > (state.levelScores[state.currentLevel] || 0);
    if (isNewBest) {
      state.levelScores[state.currentLevel] = score;
      if (score > state.highScore) {
        state.highScore = score;
      }
      $('new-best-badge').style.display = 'inline-flex';
    } else {
      $('new-best-badge').style.display = 'none';
    }

    // Mark completed, unlock next
    if (!state.levelCompleted[state.currentLevel]) {
      state.levelCompleted[state.currentLevel] = true;
      if (state.currentLevel + 1 < LEVELS.length) {
        if (state.unlockedLevel < state.currentLevel + 2) {
          state.unlockedLevel = state.currentLevel + 2;
        }
      }
    }

    saveProgress();
    spawnConfetti();

    // Next level button
    var nextBtn = $('btn-next');
    if (state.currentLevel + 1 < LEVELS.length) {
      nextBtn.style.display = '';
    } else {
      nextBtn.style.display = 'none';
    }
  }

  function spawnConfetti() {
    var container = $('confetti');
    container.innerHTML = '';
    var colors = ['oklch(0.55 0.18 250)','#7C3AED','#F59E0B','#059669','#E52521','#DC2626'];
    for (var i = 0; i < 16; i++) {
      var p = document.createElement('div');
      p.className = 'particle';
      p.style.left = (5 + Math.random() * 90) + '%';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.animationDuration = (1.8 + Math.random() * 1.5) + 's';
      p.style.animationDelay = (Math.random() * 0.8) + 's';
      p.style.width = (4 + Math.random() * 4) + 'px';
      p.style.height = p.style.width;
      container.appendChild(p);
    }
  }

  function formatTime(sec) {
    var m = Math.floor(sec / 60);
    var s = sec % 60;
    return (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
  }

  /* ═══════════════════════════════════════════
     NAVIGATION
     ═══════════════════════════════════════════ */

  function goToMenu() {
    state.timerRunning = false;
    if (state.timerRAF) cancelAnimationFrame(state.timerRAF);
    _currentLvlGrid = null;
    deselectColor();
    buildLevelSelector();
    showScreen('screen-title');
    $('play-cta').style.display = 'none';
  }
  window.goToMenu = goToMenu;

  function playAgain() {
    _currentLvlGrid = null;
    initAudio();
    startLevel(state.currentLevel);
  }
  window.playAgain = playAgain;

  function nextLevel() {
    if (state.currentLevel + 1 < LEVELS.length) {
      state.currentLevel++;
      state.selectedLevel = state.currentLevel;
      _currentLvlGrid = null;
      initAudio();
      startLevel(state.currentLevel);
    }
  }
  window.nextLevel = nextLevel;

  /* ═══════════════════════════════════════════
     KEYBOARD SUPPORT
     ═══════════════════════════════════════════ */

  document.addEventListener('keydown', function(e) {
    if (document.querySelector('#screen-game.active')) {
      var num = parseInt(e.key);
      if (num >= 1 && num <= 8) {
        var swatches = document.querySelectorAll('.palette-swatch[data-color="' + num + '"]');
        if (swatches.length > 0 && !swatches[0].classList.contains('completed')) {
          selectColor(num);
          e.preventDefault();
        }
        return;
      }

      var lvlDef = LEVELS[state.currentLevel];
      if (!lvlDef) return;
      var lvlGrid = lvlDef.grid();
      var rows = lvlGrid.length;
      var cols = lvlGrid[0].length;

      if (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'ArrowUp' || e.key === 'ArrowDown') {
        e.preventDefault();
        if (state.cursorRow < 0 || state.cursorCol < 0) {
          state.cursorRow = 0;
          state.cursorCol = 0;
        }
        clearCursor();
        if (e.key === 'ArrowLeft') state.cursorCol = Math.max(0, state.cursorCol - 1);
        else if (e.key === 'ArrowRight') state.cursorCol = Math.min(cols - 1, state.cursorCol + 1);
        else if (e.key === 'ArrowUp') state.cursorRow = Math.max(0, state.cursorRow - 1);
        else if (e.key === 'ArrowDown') state.cursorRow = Math.min(rows - 1, state.cursorRow + 1);
        highlightCursor();
        return;
      }

      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        if (state.cursorRow >= 0 && state.cursorCol >= 0) {
          paintCell(state.cursorRow, state.cursorCol);
        }
        return;
      }

      if (e.key === 'Escape') {
        deselectColor();
        e.preventDefault();
        return;
      }

      if (e.key === 'r' || e.key === 'R') {
        _currentLvlGrid = null;
        startLevel(state.currentLevel);
        e.preventDefault();
        return;
      }
    }
  });

  function clearCursor() {
    var lvlDef = LEVELS[state.currentLevel];
    if (!lvlDef) return;
    var lvlGrid = lvlDef.grid();
    var cols = lvlGrid[0].length;
    var cells = gridEl.children;
    if (state.cursorRow >= 0 && state.cursorCol >= 0) {
      var idx = state.cursorRow * cols + state.cursorCol;
      if (cells[idx]) cells[idx].classList.remove('cursor-highlight');
    }
  }

  function highlightCursor() {
    var lvlDef = LEVELS[state.currentLevel];
    if (!lvlDef) return;
    var lvlGrid = lvlDef.grid();
    var cols = lvlGrid[0].length;
    var cells = gridEl.children;
    var idx = state.cursorRow * cols + state.cursorCol;
    if (cells[idx] && lvlGrid[state.cursorRow] && lvlGrid[state.cursorRow][state.cursorCol] > 0) {
      cells[idx].classList.add('cursor-highlight');
    }
  }

  /* ═══════════════════════════════════════════
     STATUS BAR CLOCK
     ═══════════════════════════════════════════ */

  function updateClock() {
    var now = new Date();
    var h = now.getHours();
    var m = now.getMinutes();
    $('status-time').textContent = (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m;
  }

  /* ═══════════════════════════════════════════
     INIT
     ═══════════════════════════════════════════ */

  function init() {
    loadSave();
    buildLevelSelector();
    updateClock();
    setInterval(updateClock, 30000);
    if (window.recordPlayed) {
      window.recordPlayed('color-mosaic');
    }
    console.log('Color Mosaic v2.0 (modern-minimal) loaded');
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
</script>
</body>
</html>
