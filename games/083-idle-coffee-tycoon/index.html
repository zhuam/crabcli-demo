<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#5D4432" />
  <title>Idle Coffee Tycoon · 咖啡帝国</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="/games/shared/game-frame.css" />
  <style>
    .back-to-hub { /* Styles in shared game-frame.css */ }
  </style>
</head>
<body>
  <a href="/" class="back-to-hub" onclick="window.recordPlayed && window.recordPlayed('idle-coffee-tycoon')">← Arcade</a>

  <script>
    window.recordPlayed = function recordPlayed(gameId) {
      try {
        const recent = JSON.parse(localStorage.getItem('recentlyPlayed') || '[]');
        const filtered = recent.filter(p => p.id !== gameId);
        filtered.unshift({ id: gameId, playedAt: Date.now() });
        localStorage.setItem('recentlyPlayed', JSON.stringify(filtered.slice(0, 10)));
      } catch {}
    };
  </script>

  <div id="app" role="application" aria-label="Idle Coffee Tycoon">

    <!-- ARIA LIVE -->
    <div aria-live="polite" id="announcer"></div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <!-- STATUS BAR -->
    <header class="status-bar" role="banner">
      <div class="status-item money">
        <span class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#FCD34D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
            <path d="M18 8h1a4 4 0 0 1 0 8h-1"/>
            <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
            <line x1="6" y1="1" x2="6" y2="4"/>
            <line x1="10" y1="1" x2="10" y2="4"/>
            <line x1="14" y1="1" x2="14" y2="4"/>
          </svg>
        </span>
        <span class="num" id="moneyDisplay">$50</span>
      </div>
      <div class="status-right">
        <div class="status-item">
          <span class="num" id="timerDisplay" role="timer">0:00</span>
        </div>
        <div class="status-item">
          <span class="num" id="bestDisplay">🏆 --:--</span>
        </div>
        <button class="mute-btn" id="muteBtn" aria-label="切换静音" aria-pressed="false">
          <span id="muteIcon">🔊</span>
        </button>
      </div>
    </header>

    <!-- PROGRESS -->
    <section class="progress-area">
      <div class="progress-label">
        <span id="progressLabel">开店进度 1/12</span>
        <span><span id="storeCount">1</span>/<span id="storeTotal">12</span></span>
      </div>
      <div class="progress-track" role="progressbar" aria-valuenow="8" aria-valuemin="0" aria-valuemax="100">
        <div class="progress-fill" id="progressFill" style="width:8%"></div>
      </div>
    </section>

    <!-- COFFEE SHOP SCENE -->
    <section class="scene">
      <span class="scene-level" id="sceneLevel">☕ 手冲壶</span>
      <span class="scene-money" id="sceneMoney">+$1.00/s</span>

      <div class="steam"></div>
      <div class="steam"></div>
      <div class="steam"></div>

      <div class="scene-building">
        <div class="awning"></div>
        <div class="sign">COFFEE</div>
        <div class="window left"></div>
        <div class="door"></div>
        <div class="window right"></div>
      </div>

      <div class="scene-customers">☕☕☕</div>
      <div class="scene-ground"></div>
    </section>

    <!-- CTA BUTTON -->
    <section class="cta-area">
      <button class="cta-btn" id="brewBtn">
        <span class="emoji">☕</span>
        <span>冲一杯咖啡</span>
        <span class="earn" id="brewEarn">+$1.00</span>
      </button>
      <div class="cta-sub">
        每秒收入 <span class="num" id="cpsDisplay">$1.00</span>
        <span style="color:var(--cafe-warning);font-size:0.68rem;font-weight:600;">(点击加速)</span>
      </div>
    </section>

    <!-- TAB BAR -->
    <nav class="tab-bar" role="tablist" aria-label="游戏面板">
      <button class="tab-btn active" role="tab" aria-selected="true" data-tab="machines" aria-controls="panel-machines">
        <span class="tab-icon">☕</span> 咖啡机
      </button>
      <button class="tab-btn" role="tab" aria-selected="false" data-tab="staff" aria-controls="panel-staff">
        <span class="tab-icon">👥</span> 员工
      </button>
      <button class="tab-btn" role="tab" aria-selected="false" data-tab="expansion" aria-controls="panel-expansion">
        <span class="tab-icon">🏙</span> 扩张
      </button>
    </nav>

    <!-- PANELS -->
    <div class="panel-container">
      <!-- Panel: Coffee Machines -->
      <div class="panel active" id="panel-machines" role="tabpanel">
        <div class="upgrade-list" id="machineList"></div>
      </div>

      <!-- Panel: Staff -->
      <div class="panel" id="panel-staff" role="tabpanel">
        <div class="staff-grid" id="staffList"></div>
      </div>

      <!-- Panel: Expansion Map -->
      <div class="panel" id="panel-expansion" role="tabpanel">
        <div class="expansion-header">
          <h3>🏙 咖啡帝国扩张</h3>
          <span class="drink-unlock" id="drinkProgress">已解锁 0/4 饮品</span>
        </div>

        <div class="city-map" id="cityMap"></div>

        <div class="drink-row" id="drinkRow"></div>
      </div>
    </div>

    <!-- OFFLINE EARNINGS -->
    <div class="offline-overlay" id="offlineOverlay">
      <div class="offline-box">
        <div class="big-coffee">☕</div>
        <h2>欢迎回来，店主！</h2>
        <div class="offline-amount" id="offlineAmount">$0</div>
        <div class="offline-sub">你离开时店铺自动为你赚取的收入</div>
        <button class="modal-btn" id="collectBtn">💰 领取离线收益</button>
      </div>
    </div>

    <!-- END GAME MODAL -->
    <div class="modal-overlay" id="endModal">
      <div class="modal-box">
        <div class="confetti-layer" id="confettiLayer"></div>
        <div class="modal-icon" id="endIcon">🎉</div>
        <div class="modal-title" id="endTitle">咖啡帝国建成！</div>
        <div class="modal-sub" id="endSub">全城店铺已开满！</div>
        <div class="modal-stats">
          <div class="modal-stat">
            <div class="label">总营收</div>
            <div class="value" id="endEarn">$0</div>
          </div>
          <div class="modal-stat">
            <div class="label">用时</div>
            <div class="value" id="endTime">0:00</div>
          </div>
          <div class="modal-stat">
            <div class="label">开店数</div>
            <div class="value" id="endStores">0/12</div>
          </div>
          <div class="modal-stat">
            <div class="label">解锁城市</div>
            <div class="value" id="endCities">1</div>
          </div>
          <div class="modal-stat new-best" id="newBestRow" hidden>
            <div class="value">⭐ 新纪录!</div>
          </div>
        </div>
        <button class="modal-btn" id="restartBtn">🔄 再来一局</button>
        <div class="modal-hint">
          提示：按 <kbd>Space</kbd> 快速冲咖啡
        </div>
      </div>
    </div>

    <!-- KEYBOARD HINTS -->
    <div class="kbd-hint" id="kbdHint">
      <div class="kbd-box">
        <h3>⌨️ 快捷键</h3>
        <div class="kbd-row"><span>冲咖啡</span> <kbd>Space</kbd> / <kbd>Enter</kbd></div>
        <div class="kbd-row"><span>咖啡机面板</span> <kbd>1</kbd></div>
        <div class="kbd-row"><span>员工面板</span> <kbd>2</kbd></div>
        <div class="kbd-row"><span>扩张面板</span> <kbd>3</kbd></div>
        <div class="kbd-row"><span>静音</span> <kbd>M</kbd></div>
        <div class="kbd-row"><span>快捷键帮助</span> <kbd>K</kbd></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
