<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" width="320" height="240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d1f3a"/>
    </linearGradient>
    <linearGradient id="water" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#facc15"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="320" height="240" fill="url(#bg)"/>

  <!-- Car wash bay lines -->
  <rect x="20" y="140" width="280" height="60" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>

  <!-- Car -->
  <rect x="50" y="148" width="70" height="35" rx="10" fill="#38bdf8" opacity="0.9"/>
  <rect x="62" y="155" width="46" height="22" rx="6" fill="rgba(255,255,255,0.2)"/>
  <circle cx="62" cy="188" r="8" fill="#333"/>
  <circle cx="108" cy="188" r="8" fill="#333"/>
  <circle cx="62" cy="188" r="5" fill="#666"/>
  <circle cx="108" cy="188" r="5" fill="#666"/>

  <!-- Soap bubbles -->
  <circle cx="130" cy="150" r="8" fill="rgba(56,189,248,0.3)"/>
  <circle cx="148" cy="142" r="6" fill="rgba(56,189,248,0.25)"/>
  <circle cx="160" cy="155" r="7" fill="rgba(56,189,248,0.2)"/>
  <circle cx="140" cy="165" r="5" fill="rgba(56,189,248,0.15)"/>

  <!-- Tools at bottom -->
  <g transform="translate(0, 10)">
    <rect x="40" y="195" width="44" height="34" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <text x="62" y="218" text-anchor="middle" font-size="20">🧽</text>

    <rect x="138" y="195" width="44" height="34" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <text x="160" y="218" text-anchor="middle" font-size="20">🧴</text>

    <rect x="236" y="195" width="44" height="34" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <text x="258" y="218" text-anchor="middle" font-size="20">🧹</text>
  </g>

  <!-- Title -->
  <text x="160" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" font-weight="900" fill="url(#titleGrad)">Auto Spa Dash</text>
  <text x="160" y="105" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">Wash · Wax · Dry</text>

  <!-- Stars -->
  <text x="160" y="130" text-anchor="middle" font-size="16">⭐</text>
</svg>
