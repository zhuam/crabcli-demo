<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pomodoro — 25-minute focus timer</title>
  <meta name="description" content="A minimal 25-minute focus timer. Start, pause, reset. Nothing else." />
  <link rel="stylesheet" href="./style.css" />
</head>
<body data-comp-id="page-pomodoro">

  <!-- TOP BAR — minimal brand + utility actions -->
  <header class="top" data-comp-id="top-bar">
    <div class="brand" data-comp-id="brand">
      <b>Pomodoro</b> · 25-minute focus
    </div>
    <div class="top-actions" data-comp-id="top-actions">
      <button class="icon-btn" type="button" aria-label="Toggle sound" aria-pressed="true" data-comp-id="btn-sound" title="Sound (S)">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 9h4l5-4v14l-5-4H4z" stroke-linejoin="round"/>
          <path d="M16 8.5a4 4 0 0 1 0 7" stroke-linecap="round"/>
        </svg>
      </button>
      <button class="icon-btn" type="button" aria-label="Toggle theme" data-comp-id="btn-theme" title="Theme">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="4.5"/>
          <path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M5.6 18.4 7 17M17 7l1.4-1.4" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- STAGE — the timer owns the page -->
  <main class="stage" data-state="idle" data-comp-id="stage" aria-labelledby="page-heading">
    <h1 id="page-heading" class="visually-hidden">Pomodoro timer</h1>

    <div class="timer-block" data-comp-id="timer-block">
      <p class="eyebrow" data-comp-id="status-eyebrow">
        <span class="dot" aria-hidden="true"></span>
        <span data-status-label>Ready when you are</span>
      </p>

      <div
        class="timer"
        role="timer"
        aria-live="off"
        aria-atomic="true"
        data-comp-id="timer-display"
      ><span data-mm>25</span><span class="colon">:</span><span data-ss>00</span></div>

      <p class="subline" data-comp-id="status-subline">Focus session · 25 minutes · no distractions</p>

      <div class="progress" aria-hidden="true" data-comp-id="progress"><i data-progress-bar></i></div>

      <div class="controls" data-comp-id="controls">
        <button
          class="btn btn-primary"
          type="button"
          data-action="primary"
          data-comp-id="btn-primary"
          aria-keyshortcuts="Space"
        >Start</button>
        <button
          class="btn btn-ghost"
          type="button"
          data-action="reset"
          data-comp-id="btn-reset"
          aria-keyshortcuts="R"
          disabled
        >Reset</button>
      </div>
    </div>

    <!-- foot: keyboard hint + session meta -->
    <div class="stage-foot" data-comp-id="stage-foot">
      <div class="kbd-row" data-comp-id="kbd-hints">
        <span><kbd>Space</kbd> start / pause</span>
        <span><kbd>R</kbd> reset</span>
        <span><kbd>S</kbd> sound</span>
      </div>
      <div class="session-meta" data-comp-id="session-meta">
        Session <b data-session-count>1</b> · target <b>25:00</b>
      </div>
    </div>
  </main>

  <!-- A region for assistive announcements; populated only on completion -->
  <div
    aria-live="assertive"
    role="status"
    class="visually-hidden"
    data-live-region
  ></div>

  <script src="./app.js" defer></script>
</body>
</html>
