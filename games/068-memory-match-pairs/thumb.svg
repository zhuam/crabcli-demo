<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <rect width="256" height="256" rx="24" fill="#121214"/>
  <!-- Card back -->
  <rect x="48" y="48" width="70" height="70" rx="10" fill="url(#g1)" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  <text x="83" y="92" text-anchor="middle" font-size="24" fill="rgba(255,255,255,0.2)">?</text>
  <rect x="138" y="48" width="70" height="70" rx="10" fill="url(#g2)" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  <text x="173" y="92" text-anchor="middle" font-size="24" fill="rgba(255,255,255,0.2)">?</text>
  <rect x="48" y="138" width="70" height="70" rx="10" fill="#fff" stroke="rgba(0,0,0,0.08)" stroke-width="1.5"/>
  <text x="83" y="182" text-anchor="middle" font-size="28">🎈</text>
  <rect x="138" y="138" width="70" height="70" rx="10" fill="#fff" stroke="rgba(0,0,0,0.08)" stroke-width="1.5"/>
