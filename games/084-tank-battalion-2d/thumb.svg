<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="16" fill="url(#bg)"/>
  <!-- Tank body -->
  <rect x="40" y="48" width="48" height="30" rx="3" fill="url(#body)" opacity="0.7"/>
  <!-- Tank turret -->
  <rect x="46" y="38" width="36" height="20" rx="4" fill="#3B82F6"/>
  <!-- Tank barrel -->
  <rect x="60" y="30" width="8" height="16" rx="2" fill="#60A5FA"/>
  <!-- Tank treads -->
  <rect x="36" y="48" width="6" height="30" rx="1" fill="#1D4ED8"/>
  <rect x="86" y="48" width="6" height="30" rx="1" fill="#1D4ED8"/>
  <!-- Wheels -->
  <circle cx="42" cy="56" r="4" fill="#1E3A5F" stroke="#3B82F6" stroke-width="1"/>
  <circle cx="42" cy="72" r="4" fill="#1E3A5F" stroke="#3B82F6" stroke-width="1"/>
  <circle cx="86" cy="56" r="4" fill="#1E3A5F" stroke="#3B82F6" stroke-width="1"/>
  <circle cx="86" cy="72" r="4" fill="#1E3A5F" stroke="#3B82F6" stroke-width="1"/>
  <!-- Title text -->
  <text x="64" y="105" text-anchor="middle" fill="#22D3EE" font-family="monospace" font-size="10" font-weight="bold">TANK</text>
  <text x="64" y="118" text-anchor="middle" fill="#64748B" font-family="monospace" font-size="7">BATTALION</text>
  <!-- Bullet -->
  <circle cx="64" cy="26" r="3" fill="#FBBF24" opacity="0.8"/>
</svg>
