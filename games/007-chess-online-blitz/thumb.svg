    <rect x="18" y="41" width="11.5" height="11.5"/><rect x="41" y="41" width="11.5" height="11.5"/><rect x="64" y="41" width="11.5" height="11.5"/><rect x="87" y="41" width="11.5" height="11.5"/>
    <rect x="29.5" y="52" width="11.5" height="11.5"/><rect x="52" y="52" width="11.5" height="11.5"/><rect x="75" y="52" width="11.5" height="11.5"/><rect x="98" y="52" width="11.5" height="11.5"/>
    <rect x="18" y="64" width="11.5" height="11.5"/><rect x="41" y="64" width="11.5" height="11.5"/><rect x="64" y="64" width="11.5" height="11.5"/><rect x="87" y="64" width="11.5" height="11.5"/>
    <rect x="29.5" y="75" width="11.5" height="11.5"/><rect x="52" y="75" width="11.5" height="11.5"/><rect x="75" y="75" width="11.5" height="11.5"/><rect x="98" y="75" width="11.5" height="11.5"/>
    <rect x="18" y="87" width="11.5" height="11.5"/><rect x="41" y="87" width="11.5" height="11.5"/><rect x="64" y="87" width="11.5" height="11.5"/><rect x="87" y="87" width="11.5" height="11.5"/>
