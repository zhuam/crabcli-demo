<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#2d1b4e"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bg)" rx="16"/>
  <!-- Monkey face -->
  <circle cx="100" cy="85" r="35" fill="#8B5E3C"/>
  <ellipse cx="85" cy="72" rx="12" ry="14" fill="#C4956A"/>
  <ellipse cx="115" cy="72" rx="12" ry="14" fill="#C4956A"/>
  <ellipse cx="85" cy="72" rx="8" ry="10" fill="#E8B88A"/>
  <ellipse cx="115" cy="72" rx="8" ry="10" fill="#E8B88A"/>
  <!-- Eyes -->
  <circle cx="92" cy="82" r="4" fill="#1a0a2e"/>
  <circle cx="108" cy="82" r="4" fill="#1a0a2e"/>
  <circle cx="93" cy="81" r="1.5" fill="#fff"/>
  <circle cx="109" cy="81" r="1.5" fill="#fff"/>
  <!-- Mouth (happy) -->
  <path d="M88 95 Q100 105 112 95" stroke="#5C3317" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <ellipse cx="100" cy="90" rx="4" ry="3" fill="#5C3317"/>
  <!-- Chef hat -->
  <rect x="78" y="46" width="44" height="10" rx="5" fill="#fff"/>
  <rect x="84" y="34" width="32" height="14" rx="7" fill="#fff"/>
  <!-- Drink glass -->
  <rect x="125" y="95" width="22" height="30" rx="4" fill="#ff6b81" opacity="0.9"/>
  <rect x="127" y="97" width="18" height="10" rx="2" fill="#ff9ff3" opacity="0.7"/>
  <rect x="125" y="95" width="22" height="4" rx="2" fill="#fff" opacity="0.3"/>
  <line x1="131" y1="105" x2="131" y2="115" stroke="#ff9ff3" stroke-width="1.5"/>
  <line x1="136" y1="108" x2="136" y2="118" stroke="#ff9ff3" stroke-width="1.5"/>
  <line x1="141" y1="102" x2="141" y2="112" stroke="#ff9ff3" stroke-width="1.5"/>
  <!-- Straw -->
  <line x1="135" y1="95" x2="140" y2="80" stroke="#feca57" stroke-width="2" stroke-linecap="round"/>
  <line x1="140" y1="80" x2="148" y2="78" stroke="#feca57" stroke-width="2" stroke-linecap="round"/>
  <!-- Fruit garnishes -->
  <circle cx="145" cy="92" r="4" fill="#ff4757"/>
  <circle cx="143" cy="91" r="1" fill="#fff" opacity="0.5"/>
  <text x="100" y="175" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#feca57">Punch Monkey</text>
  <text x="100" y="190" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#c084fc">Cafe</text>
</svg>