<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#1a0a2e" />
  <title>Punch Monkey Cafe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../games/shared/game-frame.css" />
  <style>
    /* ═══════════════════════════════════════════════════════
       Punch Monkey Cafe — 🐒🍹 Mix fruit punches for thirsty customers!
       ═══════════════════════════════════════════════════════ */

    :root {
      --bg-deep: #1a0a2e;
      --bg-mid:  #2d1b4e;
      --bg-surface: rgba(255,255,255,0.06);
      --bg-surface-hover: rgba(255,255,255,0.10);
      --border: rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.16);
      --text: #f0edf5;
      --text-dim: rgba(255,255,255,0.55);
      --text-muted: rgba(255,255,255,0.30);
      --primary: #6c5ce7;
      --primary-dark: #5a4bd1;
      --primary-glow: rgba(108,92,231,0.35);
      --accent: #fd79a8;
      --accent-glow: rgba(253,121,168,0.3);
      --gold: #feca57;
      --success: #55efc4;
      --danger: #ff6b6b;
      --warning: #ff9f43;
      --monkey: #8B5E3C;
      --monkey-light: #C4956A;
      --font-display: 'Outfit', system-ui, sans-serif;
      --font-body: 'Inter', system-ui, sans-serif;
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --radius-xl: 28px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg-deep);
      color: var(--text);
      font-family: var(--font-body);
      overflow: hidden;
      height: 100%; width: 100%;
      user-select: none; -webkit-user-select: none;
      touch-action: none; -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }

    #app { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }

    /* ═══ Screens ═══ */
    .screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center;
      transition: opacity 0.4s ease, transform 0.4s ease;
      will-change: opacity, transform;
    }
    .screen.hidden {
      opacity: 0; pointer-events: none; transform: scale(0.96);
    }

    /* ═══════════════════════════════
       TITLE SCREEN
       ═══════════════════════════════ */
    .title-screen {
      justify-content: center; gap: 10px;
      background: linear-gradient(180deg, #1a0a2e 0%, #2d1b4e 40%, #1a1a4e 75%, #0d2440 100%);
      padding: 24px;
    }
    .title-screen::before {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 160px 80px at 25% 25%, rgba(108,92,231,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 100px 70px at 75% 30%, rgba(253,121,168,0.10) 0%, transparent 70%),
        radial-gradient(ellipse 120px 60px at 50% 80%, rgba(254,202,87,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .title-icon {
      font-size: 72px; line-height: 1;
      filter: drop-shadow(0 0 30px rgba(108,92,231,0.35));
      animation: titleFloat 2.5s ease-in-out infinite;
      position: relative; z-index: 1;
    }
    @keyframes titleFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-8px) scale(1.03); }
    }

    .title-text {
      font-family: var(--font-display); font-size: 38px; font-weight: 900;
      background: linear-gradient(135deg, #6c5ce7, #fd79a8, #feca57);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1; text-align: center;
      position: relative; z-index: 1;
    }
    .title-sub {
      font-size: 14px; color: var(--text-dim); text-align: center; max-width: 300px; line-height: 1.5;
      position: relative; z-index: 1;
    }
    .title-best {
      font-size: 14px; color: var(--text-muted);
      position: relative; z-index: 1;
    }
    .title-best span { color: var(--gold); }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 36px; border: none; border-radius: 50px;
      font-family: var(--font-display); font-size: 18px; font-weight: 700;
      cursor: pointer; transition: all 0.2s ease;
      position: relative; z-index: 1;
    }
    .btn:active { transform: scale(0.95); }
    .btn-primary {
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      color: #fff; box-shadow: 0 4px 20px rgba(108,92,231,0.35);
    }
    .btn-primary:hover { box-shadow: 0 6px 28px rgba(108,92,231,0.5); transform: translateY(-2px); }
    .btn-primary:active { transform: scale(0.95) translateY(0); }
    .btn-secondary {
      background: var(--bg-surface); color: var(--text);
      border: 1px solid var(--border-strong);
    }
    .btn-secondary:hover { background: var(--bg-surface-hover); }
    .btn-sm { padding: 10px 24px; font-size: 14px; }

    .mute-btn {
      width: 40px; height: 40px; border: none; border-radius: 50%;
      background: var(--bg-surface); font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      position: fixed; top: 12px; right: 12px; z-index: 10001;
      transition: background 0.15s ease; color: var(--text);
    }
    .mute-btn:hover { background: var(--bg-surface-hover); }
    .mute-btn:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }

    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }

    /* ═══════════════════════════════
       PLAY SCREEN
       ═══════════════════════════════ */
    .play-screen {
      background: linear-gradient(180deg, #1a0a2e 0%, #2d1b4e 100%);
      padding: 4px 6px 8px;
      justify-content: flex-start;
    }

    .play-top {
      width: 100%; max-width: 500px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 6px; position: relative; z-index: 5;
      flex-shrink: 0;
    }
    .play-day {
      font-family: var(--font-display); font-size: 14px; font-weight: 700;
      color: var(--accent);
      white-space: nowrap;
    }
    .play-stat {
      display: flex; align-items: center; gap: 12px;
    }
    .play-stat-item {
      font-family: var(--font-body); font-size: 12px; font-weight: 600;
      color: var(--text-dim);
      white-space: nowrap;
    }
    .play-stat-item span { color: var(--gold); }
    .play-stat-item .money { color: var(--success); }
    .play-stat-item .target { color: var(--accent); }

    .play-progress-bar {
      width: calc(100% - 12px); max-width: 488px; height: 6px;
      background: var(--bg-surface); border-radius: 3px;
      overflow: hidden; margin: 2px 0 6px; position: relative; z-index: 5;
      flex-shrink: 0;
    }
    .play-progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--success), var(--gold));
      border-radius: 3px; transition: width 0.2s ease;
    }

    /* ─── Customer Area ─── */
    .customer-area {
      width: min(500px, 96vw);
      display: flex; gap: 6px;
      flex: 1;
      padding: 0 2px;
      overflow: hidden;
      z-index: 3;
    }

    .station {
      flex: 1;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: linear-gradient(160deg, rgba(108,92,231,0.05), rgba(253,121,168,0.04));
      overflow: hidden;
      display: flex; flex-direction: column;
      transition: border-color 0.2s ease;
      position: relative;
      min-height: 0;
    }
    .station.highlight {
      border-color: var(--primary);
      background: linear-gradient(160deg, rgba(108,92,231,0.12), rgba(253,121,168,0.08));
    }
    .station.empty {
      border-style: dashed;
      border-color: rgba(255,255,255,0.06);
      justify-content: center; align-items: center;
    }
    .station.empty::after {
      content: '🪑';
      font-size: 28px;
      opacity: 0.3;
    }

    .station-inner {
      flex: 1;
      display: flex; flex-direction: column;
      padding: 6px;
      gap: 3px;
      min-height: 0;
    }

    /* Customer sprite */
    .customer-row {
      display: flex; align-items: center;
      gap: 4px;
      padding: 2px 0;
    }
    .customer-emoji {
      font-size: 26px; line-height: 1;
      flex-shrink: 0;
    }
    .customer-name {
      font-size: 9px; color: var(--text-muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      flex: 1;
    }

    /* Order bubble */
    .order-bubble {
      background: rgba(255,255,255,0.08);
      border-radius: var(--radius-sm);
      padding: 4px 6px;
      display: flex; flex-wrap: wrap;
      gap: 3px;
      align-items: center;
      min-height: 30px;
    }
    .order-ingredient {
      font-size: 16px;
      line-height: 1;
      opacity: 0.9;
    }
    .order-arrow {
      font-size: 10px;
      color: var(--text-muted);
    }
    .order-price {
      font-size: 10px; font-weight: 700;
      color: var(--success);
      margin-left: auto;
    }

    /* Build area inside station */
    .build-area {
      flex: 1;
      display: flex; flex-direction: column;
      gap: 2px;
      min-height: 0;
    }
    .build-label {
      font-size: 9px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .build-ingredients {
      display: flex;
      gap: 3px;
      flex-wrap: wrap;
      flex: 1;
      align-content: flex-start;
    }
    .build-slot {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: var(--bg-surface);
      border: 1px dashed var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all 0.2s ease;
    }
    .build-slot.filled {
      border-style: solid;
      border-color: var(--success);
      background: rgba(85,239,196,0.10);
      animation: slotPop 0.3s ease-out;
    }
    @keyframes slotPop {
      0% { transform: scale(0); }
      60% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    .build-slot.waiting {
      border-color: var(--primary);
      animation: pulseSlot 0.8s ease-in-out infinite alternate;
    }
    @keyframes pulseSlot {
      0% { border-color: var(--primary); }
      100% { border-color: var(--accent); }
    }

    .serve-btn {
      width: 100%;
      padding: 6px 0;
      border: none;
      border-radius: var(--radius-sm);
      background: var(--primary);
      color: #fff;
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s ease;
      margin-top: auto;
      flex-shrink: 0;
    }
    .serve-btn:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .serve-btn:active { transform: scale(0.97); }
    .serve-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none;
    }
    .serve-btn .checkmark { font-size: 16px; }

    /* ─── Ingredient Tray ─── */
    .ingredient-tray {
      display: flex;
      gap: 8px;
      padding: 6px 8px 8px;
      justify-content: center;
      flex-wrap: wrap;
      flex-shrink: 0;
      z-index: 5;
      width: 100%; max-width: 500px;
    }

    .ingredient-btn {
      width: 58px; height: 58px;
      border-radius: var(--radius-md);
      border: 2px solid var(--border);
      background: var(--bg-surface);
      cursor: grab;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1px;
      transition: all 0.15s ease;
      font-size: 10px; color: var(--text-dim); font-weight: 600;
      position: relative;
    }
    .ingredient-btn:hover { background: var(--bg-surface-hover); border-color: var(--border-strong); }
    .ingredient-btn:active { cursor: grabbing; transform: scale(0.92); }
    .ingredient-btn .ing-icon { font-size: 26px; line-height: 1; }
    .ingredient-btn .ing-label { font-size: 8px; line-height: 1; }

    .ingredient-btn.selected {
      border-color: var(--primary);
      background: rgba(108,92,231,0.12);
      box-shadow: 0 0 12px rgba(108,92,231,0.2);
    }
    .ingredient-btn.disabled {
      opacity: 0.3;
      pointer-events: none;
    }

    /* ─── Drag ghost ─── */
    .drag-ghost {
      position: fixed; pointer-events: none;
      z-index: 10002;
      width: 48px; height: 48px;
      border-radius: var(--radius-md);
      background: rgba(108,92,231,0.18);
      border: 2px solid var(--primary);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      transform: translate(-50%, -50%) scale(1.15);
      opacity: 0.9;
    }

    /* ─── Money popup ─── */
    .money-popup {
      position: fixed; pointer-events: none;
      z-index: 10003;
      font-family: var(--font-display);
      font-size: 22px; font-weight: 900;
      color: var(--success);
      text-shadow: 0 2px 8px rgba(85,239,196,0.3);
      animation: moneyFloat 0.8s ease-out forwards;
    }
    @keyframes moneyFloat {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-40px) scale(1.3); }
    }

    /* ─── Wrong ingredient shake ─── */
    .station.shake {
      animation: shakeStation 0.35s ease-out;
    }
    @keyframes shakeStation {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-4px); }
      40% { transform: translateX(4px); }
      60% { transform: translateX(-3px); }
      80% { transform: translateX(3px); }
    }

    /* ─── Customer leaving animation ─── */
    .customer-row.leaving {
      animation: customerLeave 0.4s ease-in forwards;
    }
    @keyframes customerLeave {
      0% { transform: translateX(0); opacity: 1; }
      100% { transform: translateX(40px); opacity: 0; }
    }
    .customer-row.entering {
      animation: customerEnter 0.4s ease-out;
    }
    @keyframes customerEnter {
      0% { transform: translateX(-30px); opacity: 0; }
      100% { transform: translateX(0); opacity: 1; }
    }

    /* ═══════════════════════════════
       RESULT SCREEN
       ═══════════════════════════════ */
    .result-screen {
      justify-content: center; gap: 12px; text-align: center;
      background: linear-gradient(180deg, #1a0a2e 0%, #2d1b4e 50%, #1a1a4e 100%);
      padding: 24px;
    }
    .result-screen::before {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 160px 80px at 30% 30%, rgba(108,92,231,0.10) 0%, transparent 70%),
        radial-gradient(ellipse 130px 100px at 70% 60%, rgba(254,202,87,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .result-icon {
      font-size: 72px; line-height: 1;
      position: relative; z-index: 1;
      animation: resultPop 0.6s ease-out;
    }
    @keyframes resultPop {
      0% { transform: scale(0) rotate(-20deg); opacity: 0; }
      60% { transform: scale(1.2) rotate(5deg); }
      100% { transform: scale(1) rotate(0); opacity: 1; }
    }

    .result-title {
      font-family: var(--font-display); font-size: 32px; font-weight: 900;
      position: relative; z-index: 1;
    }
    .result-title.win {
      background: linear-gradient(135deg, #6c5ce7, #fd79a8, #feca57);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .result-title.lose { color: var(--text-dim); }

    .result-stars {
      font-size: 40px; line-height: 1;
      position: relative; z-index: 1;
      letter-spacing: 6px;
    }
    .result-star { opacity: 0.2; }
    .result-star.active {
      opacity: 1;
      animation: starPop 0.4s ease-out;
    }
    @keyframes starPop {
      0% { transform: scale(0); }
      60% { transform: scale(1.4); }
      100% { transform: scale(1); }
    }

    .result-details {
      font-size: 14px; color: var(--text-dim); line-height: 1.7;
      position: relative; z-index: 1;
    }
    .result-details span { color: var(--gold); font-weight: 700; }

    .result-best {
      font-size: 13px; color: var(--text-muted);
      position: relative; z-index: 1;
    }
    .result-best span { color: var(--gold); }

    .result-new-best {
      color: var(--accent); font-weight: 700; font-size: 14px;
      animation: pulseBest 0.8s ease-in-out infinite alternate;
      position: relative; z-index: 1;
    }
    @keyframes pulseBest {
      0% { opacity: 0.5; transform: scale(1); }
      100% { opacity: 1; transform: scale(1.1); }
    }

    .result-btns {
      display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
      position: relative; z-index: 1;
    }

    /* ═══ Confetti ═══ */
    .confetti-piece {
      position: absolute;
      width: 8px; height: 8px;
      border-radius: 2px;
      z-index: 0;
      pointer-events: none;
      animation: confettiFall 2.5s ease-out forwards;
    }
    @keyframes confettiFall {
      0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
      100% { opacity: 0; transform: translateY(350px) rotate(720deg) scale(0.3); }
    }

    /* ═══ Sunburst effect ═══ */
    .sunburst {
      position: absolute; pointer-events: none;
      z-index: 3; border-radius: 50%;
      background: radial-gradient(circle, rgba(255,215,0,0.4) 0%, transparent 70%);
      animation: sunburstAnim 0.5s ease-out forwards;
    }
    @keyframes sunburstAnim {
      0% { width: 0; height: 0; opacity: 0.6; }
      100% { width: 120px; height: 120px; opacity: 0; transform: translate(-60px, -60px); }
    }

    /* ═══ Responsive ═══ */
    @media (max-width: 480px) {
      .title-text { font-size: 30px; }
      .title-icon { font-size: 56px; }
      .result-title { font-size: 26px; }
      .result-icon { font-size: 56px; }
      .result-stars { font-size: 30px; }
      .play-stat-item { font-size: 11px; }
      .ingredient-btn { width: 50px; height: 50px; }
      .ingredient-btn .ing-icon { font-size: 22px; }
      .ingredient-btn .ing-label { font-size: 7px; }
      .customer-emoji { font-size: 22px; }
      .build-slot { width: 22px; height: 22px; font-size: 12px; }
    }
    @media (max-height: 640px) {
      .title-text { font-size: 26px; }
      .title-icon { font-size: 44px; }
      .ingredient-btn { width: 44px; height: 44px; }
      .ingredient-btn .ing-icon { font-size: 20px; }
      .build-slot { width: 20px; height: 20px; font-size: 11px; }
      .customer-emoji { font-size: 20px; }
      .order-bubble { min-height: 24px; gap: 2px; }
      .serve-btn { font-size: 11px; padding: 4px 0; }
    }
  </style>
</head>
<body>
  <div id="app">

    <!-- ═══ MUTE BUTTON ═══ -->
    <button class="mute-btn" id="muteBtn" aria-label="Toggle sound" aria-pressed="false">🔊</button>

    <!-- ═══ BACK TO HUB ═══ -->
    <a href="/" class="back-to-hub" aria-label="Back to hub">&larr; Hub</a>

    <!-- ═══ TITLE SCREEN ═══ -->
    <div id="titleScreen" class="screen title-screen">
      <div class="title-icon">🐒🍹</div>
      <h1 class="title-text">Punch Monkey<br/>Cafe</h1>
      <p class="title-sub">Mix fruit punches for thirsty monkey customers!</p>
      <div style="height:4px"></div>
      <button id="startBtn" class="btn btn-primary">🐒 Open for Business!</button>
      <div class="title-best">🏆 Best Revenue: <span id="titleBest">$0</span></div>
    </div>

    <!-- ═══ PLAY SCREEN ═══ -->
    <div id="playScreen" class="screen play-screen hidden">
      <div class="play-top">
        <span class="play-day" id="dayDisplay">🌴 Day 1</span>
        <div class="play-stat">
          <span class="play-stat-item">⏱ <span id="timerDisplay">0:00</span></span>
          <span class="play-stat-item">💰 <span class="money" id="moneyDisplay">$0</span></span>
          <span class="play-stat-item">🎯 <span class="target" id="targetDisplay">$0</span></span>
        </div>
      </div>

      <div class="play-progress-bar">
        <div class="play-progress-fill" id="progressFill"></div>
      </div>

      <!-- Customer stations -->
      <div class="customer-area" id="customerArea"></div>

      <!-- Ingredient tray -->
      <div class="ingredient-tray" id="ingredientTray"></div>
    </div>

    <!-- ═══ RESULT SCREEN ═══ -->
    <div id="resultScreen" class="screen result-screen hidden">
      <div class="result-icon" id="resultIcon">🐒</div>
      <h2 class="result-title" id="resultTitle">Day Complete!</h2>
      <div class="result-stars" id="resultStars">
        <span class="result-star" data-i="0">⭐</span>
        <span class="result-star" data-i="1">⭐</span>
        <span class="result-star" data-i="2">⭐</span>
      </div>
      <div class="result-details" id="resultDetails">
        Revenue: <span id="resultMoney">$0</span> / <span id="resultTarget">$0</span>
      </div>
      <div class="result-new-best hidden" id="resultNewBest">🌟 New Best Revenue! 🌟</div>
      <div class="result-best">🏆 Best: <span id="resultBest">$0</span></div>
      <div class="result-btns">
        <button id="resultNextBtn" class="btn btn-primary">➡️ Next Day</button>
        <button id="resultRetryBtn" class="btn btn-secondary">🔄 Retry Day</button>
      </div>
    </div>

    <!-- ═══ ARIA LIVE ═══ -->
    <div class="sr-only" role="status" aria-live="polite" id="ariaLive">Punch Monkey Cafe</div>

  </div>

  <script>
  (function(){
    'use strict';

    /* ═══════════════════════════════════════════════════════
       PUNCH MONKEY CAFE — Mix fruit punches for profit!
       ═══════════════════════════════════════════════════════ */

    // ─── DOM refs ───
    var $ = function(id) { return document.getElementById(id); };
    var titleScreen    = $('titleScreen');
    var playScreen     = $('playScreen');
    var resultScreen   = $('resultScreen');
    var startBtn       = $('startBtn');
    var dayDisplay     = $('dayDisplay');
    var timerDisplay   = $('timerDisplay');
    var moneyDisplay   = $('moneyDisplay');
    var targetDisplay  = $('targetDisplay');
    var progressFill   = $('progressFill');
    var customerArea   = $('customerArea');
    var ingredientTray = $('ingredientTray');
    var resultIcon     = $('resultIcon');
    var resultTitle    = $('resultTitle');
    var resultStars    = $('resultStars');
    var resultDetails  = $('resultDetails');
    var resultMoney    = $('resultMoney');
    var resultTarget   = $('resultTarget');
    var resultBest     = $('resultBest');
    var resultNewBest  = $('resultNewBest');
    var resultNextBtn  = $('resultNextBtn');
    var resultRetryBtn = $('resultRetryBtn');
    var titleBest      = $('titleBest');
    var muteBtn        = $('muteBtn');
    var ariaLive       = $('ariaLive');

    // ─── Constants ───
    var MAX_DAY_SEC    = 60; // seconds per day
    var STORAGE_KEY    = 'punchMonkeyCafe_best';
    var PROGRESS_KEY   = 'punchMonkeyCafe_progress';
    var STATION_COUNT  = 3;

    // ─── Ingredients ───
    var ALL_INGREDIENTS = [
      { id: 'orange',     icon: '🍊', label: 'Orange',     color: '#ff9f43' },
      { id: 'apple',      icon: '🍎', label: 'Apple',      color: '#ff6b6b' },
      { id: 'strawberry', icon: '🍓', label: 'Strawberry', color: '#ff4757' },
      { id: 'blueberry',  icon: '🫐', label: 'Blueberry',  color: '#5f27cd' },
      { id: 'mango',      icon: '🥭', label: 'Mango',      color: '#feca57' },
      { id: 'watermelon', icon: '🍉', label: 'Watermelon', color: '#ff6b81' },
      { id: 'pineapple',  icon: '🍍', label: 'Pineapple',  color: '#feca57' },
      { id: 'banana',     icon: '🍌', label: 'Banana',     color: '#ffdd59' },
      { id: 'yogurt',     icon: '🥛', label: 'Yogurt',     color: '#dfe6e9' },
      { id: 'honey',      icon: '🍯', label: 'Honey',      color: '#eccc68' },
      { id: 'ice',        icon: '🧊', label: 'Ice',        color: '#74b9ff' },
      { id: 'mint',       icon: '🌿', label: 'Mint',       color: '#55efc4' },
      { id: 'coconut',    icon: '🥥', label: 'Coconut',    color: '#ffeaa7' },
    ];

    // ─── Recipes ───
    var RECIPES = {
      day1: [
        { name: 'Orange Juice',    ingredients: ['orange'],                price: 5,  emoji: '🍊' },
        { name: 'Apple Juice',     ingredients: ['apple'],                 price: 5,  emoji: '🍎' },
        { name: 'Berry Yogurt',    ingredients: ['strawberry', 'yogurt'],  price: 8,  emoji: '🍓' },
      ],
      day2: [
        { name: 'Tropical Punch',  ingredients: ['orange', 'pineapple', 'ice'],         price: 10, emoji: '🍍' },
        { name: 'Berry Blast',     ingredients: ['strawberry', 'blueberry', 'yogurt'],  price: 11, emoji: '🫐' },
        { name: 'Minty Melon',     ingredients: ['watermelon', 'mint', 'ice'],          price: 9,  emoji: '🍉' },
        { name: 'Mango Lassi',     ingredients: ['mango', 'yogurt'],                     price: 8,  emoji: '🥭' },
      ],
      day3: [
        { name: 'Monkey Special',  ingredients: ['banana', 'strawberry', 'mango', 'honey'],     price: 14, emoji: '🐒' },
        { name: 'Paradise Punch',  ingredients: ['orange', 'pineapple', 'mango', 'coconut'],    price: 15, emoji: '🌴' },
        { name: 'Rainbow Splash',  ingredients: ['strawberry', 'orange', 'blueberry', 'ice'],   price: 13, emoji: '🌈' },
        { name: 'Sunrise Crush',   ingredients: ['watermelon', 'mango', 'mint', 'ice'],         price: 12, emoji: '🌅' },
      ],
    };

    var DAY_RECIPES = [RECIPES.day1, RECIPES.day2, RECIPES.day3];

    // ─── Days config ───
    var DAYS = [
      { day: 1, name: 'Grand Opening', revenueTarget: 30,  customerInterval: 8000, maxCustomers: 10, ingredientPool: ['orange','apple','strawberry','yogurt'] },
      { day: 2, name: 'Tropical Rush', revenueTarget: 55,  customerInterval: 6500, maxCustomers: 14, ingredientPool: ['orange','apple','strawberry','blueberry','mango','watermelon','pineapple','yogurt','mint','ice'] },
      { day: 3, name: 'Monkey Empire', revenueTarget: 90,  customerInterval: 5500, maxCustomers: 18, ingredientPool: ['orange','apple','strawberry','blueberry','mango','watermelon','pineapple','banana','yogurt','honey','ice','mint','coconut'] },
    ];

    // ─── Customer names ───
    var CUSTOMER_NAMES = ['Momo','Bobo','Kiki','Lulu','Pepe','Dodo','Zuzu','Coco','Fifi','Gigi','Jojo','Nana','Pip','Roro','Toto','Wawa'];
    var CUSTOMER_EMOJIS = ['🐒','🙈','🙉','🙊','🐵','🦧'];

    // ─── State ───
    var muted = localStorage.getItem('punchMonkeyCafe_muted') === 'true';
    var highScore = 0;
    var currentDay = 0;
    var money = 0;
    var revenueTarget = 0;
    var stations = [];     // index → station object or null
    var stationEls = [];
    var gameActive = false;
    var gamePhase = 'TITLE'; // TITLE | PLAYING | RESULT
    var elapsedMs = 0;
    var timerInterval = null;
    var spawnInterval = null;
    var selectedIngredient = null; // ingredient id string or null
    var customersServed = 0;
    var customersLost = 0;
    var dayMaxCustomers = 0;
    var customersSpawned = 0;
    var isDragging = false;
    var dragGhost = null;
    var customerIdCounter = 0;
    var preferReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    // Audio
    var audioCtx = null;
    var lastSoundTime = 0;

    // ─── Load / Save ───
    function loadHighScore() {
      try { return parseInt(localStorage.getItem(STORAGE_KEY)) || 0; }
      catch(_) { return 0; }
    }
    function saveHighScore(val) {
      try {
        var cur = loadHighScore();
        if (val > cur) {
          localStorage.setItem(STORAGE_KEY, String(val));
          return true;
        }
        return false;
      } catch(_) { return false; }
    }

    function loadProgress() {
      try {
        var p = parseInt(localStorage.getItem(PROGRESS_KEY)) || 0;
        return Math.min(p, DAYS.length - 1);
      } catch(_) { return 0; }
    }
    function saveProgress(day) {
      try {
        var cur = loadProgress();
        if (day > cur) {
          localStorage.setItem(PROGRESS_KEY, String(day));
        }
      } catch(_) {}
    }

    function recordPlayed() {
      try {
        var recent = JSON.parse(localStorage.getItem('recentlyPlayed') || '[]');
        var filtered = recent.filter(function(p) { return p.id !== 'punch-monkey-cafe'; });
        filtered.unshift({ id: 'punch-monkey-cafe', playedAt: Date.now() });
        localStorage.setItem('recentlyPlayed', JSON.stringify(filtered.slice(0, 10)));
      } catch(_) {}
    }

    // ─── Audio ───
    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playTone(freq, dur, type, vol) {
      if (muted || !audioCtx) return;
      try {
        var now = audioCtx.currentTime;
        if (now - lastSoundTime < 0.04) return;
        lastSoundTime = now;
        var osc = audioCtx.createOscillator();
        var gain = audioCtx.createGain();
        osc.type = type || 'sine';
        osc.frequency.setValueAtTime(freq, now);
        gain.gain.setValueAtTime(Math.min(vol || 0.1, 0.15), now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + (dur || 0.1));
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + (dur || 0.1));
      } catch(_) {}
    }

    function playSwoosh() { playTone(400, 0.08, 'sine', 0.06); setTimeout(function() { playTone(600, 0.08, 'sine', 0.05); }, 40); }
    function playEarn() { playTone(800, 0.08, 'sine', 0.08); setTimeout(function() { playTone(1000, 0.1, 'sine', 0.08); }, 60); }
    function playComplete() { [523, 659, 784, 1047, 1319].forEach(function(f, i) { setTimeout(function() { playTone(f, 0.18, 'sine', 0.10); }, i * 100); }); }
    function playNewBest() { [659, 784, 1047, 1319, 1568].forEach(function(f, i) { setTimeout(function() { playTone(f, 0.2, 'triangle', 0.10); }, i * 80); }); }
    function playTimeout() { playTone(300, 0.3, 'sawtooth', 0.08); setTimeout(function() { playTone(200, 0.4, 'sawtooth', 0.08); }, 200); }
    function playDrop() { playTone(500, 0.06, 'sine', 0.05); }
    function playError() { playTone(200, 0.15, 'square', 0.06); }
    function playBlip() { playTone(660, 0.08, 'triangle', 0.06); }
    function playServe() { playTone(880, 0.1, 'sine', 0.08); setTimeout(function(){ playTone(1100, 0.12, 'sine', 0.08); }, 70); }

    function vibrate(ms) { try { if (navigator.vibrate) navigator.vibrate(ms); } catch(_) {} }

    // ─── Mute ───
    muteBtn.addEventListener('click', function() {
      muted = !muted;
      localStorage.setItem('punchMonkeyCafe_muted', String(muted));
      muteBtn.textContent = muted ? '🔇' : '🔊';
      muteBtn.setAttribute('aria-pressed', String(muted));
      if (!muted) ensureAudio();
    });
    function updateMuteBtn() {
      muteBtn.textContent = muted ? '🔇' : '🔊';
      muteBtn.setAttribute('aria-pressed', String(muted));
    }
    updateMuteBtn();

    // ─── Screens ───
    function showScreen(screen) {
      [titleScreen, playScreen, resultScreen].forEach(function(s) {
        s.classList.add('hidden');
      });
      screen.classList.remove('hidden');
    }

    // ─── Get available ingredients for current day ───
    function getDayIngredients() {
      var day = DAYS[currentDay];
      return ALL_INGREDIENTS.filter(function(ing) {
        return day.ingredientPool.indexOf(ing.id) >= 0;
      });
    }

    // ─── Get available recipes for current day ───
    function getDayRecipes() {
      return DAY_RECIPES[currentDay] || RECIPES.day1;
    }

    // ─── Stations ───
    function buildStations(count) {
      customerArea.innerHTML = '';
      stationEls = [];
      stations = [];
      for (var i = 0; i < count; i++) {
        var station = document.createElement('div');
        station.className = 'station empty';
        station.dataset.stationIndex = i;
        customerArea.appendChild(station);
        stationEls.push(station);
        stations.push(null);
      }
    }

    function getEmptyStation() {
      for (var i = 0; i < stations.length; i++) {
        if (stations[i] === null) return i;
      }
      return -1;
    }

    // ─── Customer Generation ───
    function generateCustomer() {
      var recipes = getDayRecipes();
      var recipe = recipes[Math.floor(Math.random() * recipes.length)];
      var nameIdx = Math.floor(Math.random() * CUSTOMER_NAMES.length);
      var emojiIdx = Math.floor(Math.random() * CUSTOMER_EMOJIS.length);

      // Build order steps from recipe ingredients
      var steps = recipe.ingredients.map(function(ingId) {
        return { ingredientId: ingId, done: false };
      });

      return {
        id: ++customerIdCounter,
        emoji: CUSTOMER_EMOJIS[emojiIdx],
        name: CUSTOMER_NAMES[nameIdx],
        recipe: recipe,
        steps: steps,
        currentStep: 0,
        served: false,
        left: false,
        buildTimer: null,
      };
    }

    function spawnCustomer() {
      if (!gameActive || gamePhase !== 'PLAYING') return;
      if (customersSpawned >= dayMaxCustomers) return;

      var emptyIdx = getEmptyStation();
      if (emptyIdx < 0) {
        // All stations full — customer waits outside (no penalty yet)
        return;
      }

      customersSpawned++;
      var customer = generateCustomer();
      stations[emptyIdx] = customer;
      renderStation(emptyIdx);

      if (!preferReduced) {
        var cr = stationEls[emptyIdx].querySelector('.customer-row');
        if (cr) cr.classList.add('entering');
      }

      playSwoosh();
    }

    function renderStation(index) {
      var station = stationEls[index];
      var customer = stations[index];

      station.classList.remove('empty');

      if (!customer) {
        station.classList.add('empty');
        station.innerHTML = '';
        return;
      }

      var recipe = customer.recipe;

      // Build order ingredients display
      var orderHtml = '';
      for (var i = 0; i < recipe.ingredients.length; i++) {
        var ingId = recipe.ingredients[i];
        var ing = findIngredient(ingId);
        if (i > 0) orderHtml += '<span class="order-arrow">+</span>';
        orderHtml += '<span class="order-ingredient">' + (ing ? ing.icon : '❓') + '</span>';
      }
      orderHtml += '<span class="order-price">+$' + recipe.price + '</span>';

      // Build ingredients display
      var buildHtml = '';
      for (var j = 0; j < customer.steps.length; j++) {
        var step = customer.steps[j];
        var stepIng = findIngredient(step.ingredientId);
        var slotClass = 'build-slot';
        if (step.done) slotClass += ' filled';
        else if (j === customer.currentStep && !customer.left) slotClass += ' waiting';
        buildHtml += '<div class="build-slot ' + slotClass + '">' +
          (step.done && stepIng ? stepIng.icon : '') +
        '</div>';
      }

      var allDone = customer.steps.every(function(s) { return s.done; });
      var serveDisabled = (!allDone || customer.served || customer.left) ? 'disabled' : '';

      station.innerHTML =
        '<div class="station-inner">' +
          '<div class="customer-row" data-customer-id="' + customer.id + '">' +
            '<span class="customer-emoji">' + customer.emoji + '</span>' +
            '<span class="customer-name">' + customer.name + '</span>' +
          '</div>' +
          '<div class="order-bubble">' + orderHtml + '</div>' +
          '<div class="build-area">' +
            '<div class="build-label">🍹 Build</div>' +
            '<div class="build-ingredients">' + buildHtml + '</div>' +
            '<button class="serve-btn" data-station="' + index + '" ' + serveDisabled + '>' +
              '<span class="checkmark">✅</span> Serve!' +
            '</button>' +
          '</div>' +
        '</div>';

      // Bind serve button
      var serveBtn = station.querySelector('.serve-btn');
      if (serveBtn && !serveDisabled) {
        serveBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          serveDrink(index);
        });
      }
    }

    function findIngredient(id) {
      for (var i = 0; i < ALL_INGREDIENTS.length; i++) {
        if (ALL_INGREDIENTS[i].id === id) return ALL_INGREDIENTS[i];
      }
      return null;
    }

    function getCurrentStepIndex(customer) {
      for (var i = 0; i < customer.steps.length; i++) {
        if (!customer.steps[i].done) return i;
      }
      return -1; // all done
    }

    // ─── Apply ingredient to station ───
    function applyIngredientToStation(ingredientId, stationIndex) {
      if (!gameActive || gamePhase !== 'PLAYING') return;
      var customer = stations[stationIndex];
      if (!customer) return;
      if (customer.served || customer.left) return;

      var stepIdx = getCurrentStepIndex(customer);
      if (stepIdx < 0) return; // all done

      var step = customer.steps[stepIdx];
      if (step.done) return;

      if (step.ingredientId !== ingredientId) {
        // Wrong ingredient
        playError();
        stationEls[stationIndex].classList.add('shake');
        setTimeout(function() {
          stationEls[stationIndex].classList.remove('shake');
        }, 400);
        vibrate(20);
        return;
      }

      // Correct ingredient
      step.done = true;
      customer.currentStep++;

      playBlip();
      vibrate(10);
      renderStation(stationIndex);

      // Check if all done
      var allDone = customer.steps.every(function(s) { return s.done; });
      if (allDone) {
        playServe();
        vibrate(15);
      }
    }

    // ─── Serve drink ───
    function serveDrink(stationIndex) {
      if (!gameActive || gamePhase !== 'PLAYING') return;
      var customer = stations[stationIndex];
      if (!customer) return;
      if (customer.served || customer.left) return;

      var allDone = customer.steps.every(function(s) { return s.done; });
      if (!allDone) return;

      customer.served = true;
      var reward = customer.recipe.price;
      earnMoney(reward);
      customersServed++;

      // Animate departure
      if (!preferReduced) {
        var cr = stationEls[stationIndex].querySelector('.customer-row');
        if (cr) cr.classList.add('leaving');
      }

      // Show money popup
      showMoneyPopup('+$' + reward);

      setTimeout(function() {
        clearStation(stationIndex);
      }, preferReduced ? 0 : 400);

      playEarn();
      vibrate([30, 20, 30]);
    }

    function clearStation(index) {
      if (stations[index]) {
        if (!stations[index].served) {
          customersLost++;
        }
      }
      stations[index] = null;
      renderStation(index);
    }

    function earnMoney(amount) {
      money += amount;
      moneyDisplay.textContent = '$' + money;
      targetDisplay.textContent = '$' + revenueTarget;
      updateProgress();
    }

    function showMoneyPopup(text) {
      var popup = document.createElement('div');
      popup.className = 'money-popup';
      popup.textContent = text;
      popup.style.left = '50%';
      popup.style.top = '45%';
      popup.style.transform = 'translateX(-50%)';
      document.body.appendChild(popup);
      setTimeout(function() { popup.remove(); }, 900);
    }

    function updateProgress() {
      var pct = Math.min(100, Math.floor((money / revenueTarget) * 100));
      progressFill.style.width = pct + '%';
      ariaLive.textContent = 'Revenue: $' + money + ' / $' + revenueTarget;
      document.title = 'Punch Monkey Cafe — $' + money;
    }

    // ─── Build ingredient tray ───
    function buildIngredientTray() {
      ingredientTray.innerHTML = '';
      var ingredients = getDayIngredients();
      for (var i = 0; i < ingredients.length; i++) {
        var ing = ingredients[i];
        var btn = document.createElement('button');
        btn.className = 'ingredient-btn';
        btn.dataset.ingredient = ing.id;
        btn.setAttribute('aria-label', ing.label);
        btn.innerHTML = '<span class="ing-icon">' + ing.icon + '</span><span class="ing-label">' + ing.label + '</span>';
        ingredientTray.appendChild(btn);
      }
    }

    // ─── Timer ───
    function startTimer() {
      elapsedMs = 0;
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(function() {
        if (!gameActive || gamePhase !== 'PLAYING') return;
        elapsedMs += 1000;

        var sec = Math.floor(elapsedMs / 1000);
        var min = Math.floor(sec / 60);
        var remainSec = sec % 60;
        timerDisplay.textContent = min + ':' + (remainSec < 10 ? '0' : '') + remainSec;

        if (sec >= MAX_DAY_SEC) {
          endDay();
        }
      }, 1000);
    }

    // ─── End Day ───
    function endDay() {
      if (gamePhase !== 'PLAYING') return;
      gameActive = false;
      gamePhase = 'RESULT';
      if (timerInterval) clearInterval(timerInterval);
      if (spawnInterval) clearInterval(spawnInterval);

      // Clear unscheduled customers
      for (var i = 0; i < stations.length; i++) {
        if (stations[i] && !stations[i].served) customersLost++;
      }

      var won = money >= revenueTarget;
      var stars = 0;
      if (won) {
        var ratio = money / revenueTarget;
        stars = ratio >= 1.5 ? 3 : (ratio >= 1.15 ? 2 : 1);
        playComplete();
        vibrate([50, 30, 50, 30, 80]);
      } else {
        playTimeout();
        vibrate([100, 50, 100]);
      }

      var isNewBest = saveHighScore(money);
      if (isNewBest) {
        playNewBest();
        vibrate([30, 20, 30, 20, 50, 20, 80]);
      }

      if (won) {
        if (currentDay + 1 < DAYS.length) {
          saveProgress(currentDay + 1);
        }
      }

      // Build result UI
      if (won) {
        resultIcon.textContent = '🐒🍹';
        resultTitle.textContent = 'Day ' + (currentDay + 1) + ' Complete!';
        resultTitle.className = 'result-title win';
        spawnConfetti();
      } else {
        resultIcon.textContent = '😵';
        resultTitle.textContent = 'Time\'s Up!';
        resultTitle.className = 'result-title lose';
      }

      // Stars
      var starEls = resultStars.querySelectorAll('.result-star');
      for (var si = 0; si < starEls.length; si++) {
        starEls[si].classList.toggle('active', si < stars);
        if (!preferReduced) {
          starEls[si].style.animationDelay = (si * 0.25) + 's';
        }
      }

      resultMoney.textContent = '$' + money;
      resultTarget.textContent = '$' + revenueTarget;
      var detailText = 'Revenue: <span>$' + money + '</span> / <span>$' + revenueTarget + '</span>';
      if (won) {
        detailText += '<br/>Drinks served: <span>' + customersServed + '</span>';
      } else {
        detailText += '<br/>Shortfall: <span>$' + Math.max(0, revenueTarget - money) + '</span>';
      }
      resultDetails.innerHTML = detailText;
      resultBest.textContent = '$' + loadHighScore();
      resultNewBest.classList.toggle('hidden', !isNewBest);

      // Next / retry buttons
      if (won && currentDay + 1 >= DAYS.length) {
        resultNextBtn.textContent = '🏆 Monkey Millionaire!';
        resultNextBtn.onclick = function() {
          currentDay = 0;
          startDay();
        };
      } else if (won) {
        resultNextBtn.textContent = '➡️ Next Day';
        resultNextBtn.onclick = function() {
          currentDay++;
          startDay();
        };
      } else {
        resultNextBtn.textContent = '🔄 Try Again';
        resultNextBtn.onclick = function() {
          startDay();
        };
      }
      resultRetryBtn.onclick = function() {
        startDay();
      };

      showScreen(resultScreen);
      document.title = 'Punch Monkey Cafe — ' + (won ? 'Won! $' + money : 'Time\'s Up');
    }

    // ─── Confetti ───
    function spawnConfetti() {
      var colors = ['#6c5ce7', '#fd79a8', '#feca57', '#55efc4', '#ff6b6b', '#74b9ff', '#a29bfe'];
      for (var i = 0; i < 35; i++) {
        var el = document.createElement('div');
        el.className = 'confetti-piece';
        var x = 10 + Math.random() * 80;
        var delay = Math.random() * 0.6;
        var color = colors[Math.floor(Math.random() * colors.length)];
        el.style.cssText = 'left:' + x + '%;top:-10px;background:' + color + ';width:' + (4+Math.random()*8) + 'px;height:' + (4+Math.random()*8) + 'px;animation-delay:' + delay + 's;border-radius:' + (Math.random()>0.5?'50%':'2px');
        resultScreen.appendChild(el);
        setTimeout(function() { el.remove(); }, 3000 + delay * 1000);
      }
    }

    // ─── Day Init ───
    function startDay() {
      ensureAudio();

      var day = DAYS[currentDay];
      revenueTarget = day.revenueTarget;
      dayMaxCustomers = day.maxCustomers;
      money = 0;
      customersServed = 0;
      customersLost = 0;
      customersSpawned = 0;
      selectedIngredient = null;
      isDragging = false;

      if (spawnInterval) clearInterval(spawnInterval);

      gameActive = true;
      gamePhase = 'PLAYING';

      dayDisplay.textContent = '🌴 Day ' + (currentDay + 1) + ' · ' + day.name;
      moneyDisplay.textContent = '$0';
      targetDisplay.textContent = '$' + revenueTarget;
      timerDisplay.textContent = '0:00';
      updateProgress();

      buildStations(STATION_COUNT);
      buildIngredientTray();

      showScreen(playScreen);
      document.title = 'Punch Monkey Cafe — Day ' + (currentDay + 1);
      ariaLive.textContent = day.name + ' - Earn $' + revenueTarget;

      startTimer();
      recordPlayed();

      // Start spawning customers
      spawnCustomer();
      spawnInterval = setInterval(function() {
        if (!gameActive || gamePhase !== 'PLAYING') return;
        spawnCustomer();
      }, day.customerInterval);

      // Reset ingredient selection
      selectedIngredient = null;
      document.querySelectorAll('.ingredient-btn').forEach(function(b) { b.classList.remove('selected'); });
    }

    // ─── Drag & Drop (Pointer) ───
    function getStationFromPoint(x, y) {
      for (var i = 0; i < stationEls.length; i++) {
        var rect = stationEls[i].getBoundingClientRect();
        if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
          return i;
        }
      }
      return -1;
    }

    function createDragGhost(ingredientId) {
      if (dragGhost) dragGhost.remove();
      dragGhost = document.createElement('div');
      dragGhost.className = 'drag-ghost';
      var ing = findIngredient(ingredientId);
      dragGhost.textContent = ing ? ing.icon : '🍊';
      document.body.appendChild(dragGhost);
    }

    function updateDragGhost(clientX, clientY) {
      if (!dragGhost) return;
      dragGhost.style.left = clientX + 'px';
      dragGhost.style.top = clientY + 'px';

      var stIdx = getStationFromPoint(clientX, clientY);
      stationEls.forEach(function(el, i) {
        el.classList.toggle('highlight', i === stIdx);
      });
    }

    function removeDragGhost() {
      if (dragGhost) { dragGhost.remove(); dragGhost = null; }
      stationEls.forEach(function(el) { el.classList.remove('highlight'); });
    }

    // ─── Ingredient tray events ───
    ingredientTray.addEventListener('pointerdown', function(e) {
      var btn = e.target.closest('.ingredient-btn');
      if (!btn) return;
      if (!gameActive || gamePhase !== 'PLAYING') return;

      var ingId = btn.dataset.ingredient;
      selectedIngredient = ingId;

      document.querySelectorAll('.ingredient-btn').forEach(function(b) { b.classList.remove('selected'); });
      btn.classList.add('selected');

      isDragging = true;
      btn.setPointerCapture(e.pointerId);
      createDragGhost(ingId);
      updateDragGhost(e.clientX, e.clientY);
    });

    ingredientTray.addEventListener('pointermove', function(e) {
      if (!isDragging || !dragGhost) return;
      updateDragGhost(e.clientX, e.clientY);
    });

    ingredientTray.addEventListener('pointerup', function(e) {
      if (!isDragging) return;
      isDragging = false;

      var stIdx = getStationFromPoint(e.clientX, e.clientY);
      if (stIdx >= 0 && selectedIngredient) {
        applyIngredientToStation(selectedIngredient, stIdx);
      }

      removeDragGhost();
      var btn = document.querySelector('.ingredient-btn.selected');
      if (btn) btn.classList.remove('selected');
      selectedIngredient = null;
    });

    ingredientTray.addEventListener('pointercancel', function() {
      isDragging = false;
      removeDragGhost();
      var btn = document.querySelector('.ingredient-btn.selected');
      if (btn) btn.classList.remove('selected');
      selectedIngredient = null;
    });

    // ─── Click on station (non-drag fallback) ───
    customerArea.addEventListener('click', function(e) {
      if (!gameActive || gamePhase !== 'PLAYING') return;
      if (isDragging) return;
      if (!selectedIngredient) return;

      var stIdx = getStationFromPoint(e.clientX, e.clientY);
      if (stIdx >= 0) {
        applyIngredientToStation(selectedIngredient, stIdx);
        var btn = document.querySelector('.ingredient-btn.selected');
        if (btn) btn.classList.remove('selected');
        selectedIngredient = null;
      }
    });

    customerArea.addEventListener('touchstart', function(e) {
      if (!gameActive || gamePhase !== 'PLAYING') return;
      if (isDragging) return;
      if (!selectedIngredient) return;

      var touch = e.touches[0];
      var stIdx = getStationFromPoint(touch.clientX, touch.clientY);
      if (stIdx >= 0) {
        e.preventDefault();
        applyIngredientToStation(selectedIngredient, stIdx);
        var btn = document.querySelector('.ingredient-btn.selected');
        if (btn) btn.classList.remove('selected');
        selectedIngredient = null;
      }
    }, { passive: false });

    // ─── Keyboard ───
    document.addEventListener('keydown', function(e) {
      var tag = (e.target && e.target.tagName || '').toLowerCase();
      if (tag === 'input' || tag === 'textarea' || tag === 'select') return;

      if (gamePhase === 'TITLE' && (e.key === 'Enter' || e.key === ' ')) {
        e.preventDefault();
        startBtn.click();
        return;
      }
      if (gamePhase === 'RESULT' && (e.key === 'Enter' || e.key === ' ')) {
        e.preventDefault();
        resultNextBtn.click();
        return;
      }

      if (gamePhase !== 'PLAYING') return;

      // Number keys for ingredient selection (1-9, 0)
      var num = parseInt(e.key, 10);
      if (num >= 1 && num <= 9) {
        selectIngredientByIndex(num - 1);
        return;
      }
      if (e.key === '0') {
        selectIngredientByIndex(9);
        return;
      }

      // Apply to first eligible station with Enter/Space
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        if (!selectedIngredient) return;
        for (var i = 0; i < stations.length; i++) {
          var c = stations[i];
          if (!c) continue;
          var si = getCurrentStepIndex(c);
          if (si >= 0 && c.steps[si].ingredientId === selectedIngredient) {
            applyIngredientToStation(selectedIngredient, i);
            return;
          }
        }
        return;
      }

      // s key = serve at first ready station
      if (e.key === 's' || e.key === 'S') {
        e.preventDefault();
        for (var j = 0; j < stations.length; j++) {
          var cust = stations[j];
          if (!cust || cust.served || cust.left) continue;
          var allDone = cust.steps.every(function(s) { return s.done; });
          if (allDone) {
            serveDrink(j);
            return;
          }
        }
      }
    });

    function selectIngredientByIndex(index) {
      var btns = document.querySelectorAll('.ingredient-btn');
      if (btns[index]) {
        btns[index].click();
        var ingId = btns[index].dataset.ingredient;
        selectedIngredient = ingId;
      }
    }

    // ─── Ingredient click (for touch/keyboard selection) ───
    ingredientTray.addEventListener('click', function(e) {
      var btn = e.target.closest('.ingredient-btn');
      if (!btn) return;
      if (!gameActive || gamePhase !== 'PLAYING') return;

      var ingId = btn.dataset.ingredient;
      if (selectedIngredient === ingId) {
        btn.classList.remove('selected');
        selectedIngredient = null;
      } else {
        document.querySelectorAll('.ingredient-btn').forEach(function(b) { b.classList.remove('selected'); });
        btn.classList.add('selected');
        selectedIngredient = ingId;
      }
    });

    // ─── Buttons ───
    startBtn.addEventListener('click', function() {
      ensureAudio();
      highScore = loadHighScore();
      currentDay = loadProgress();
      startDay();
    });

    // ─── Init ───
    function init() {
      highScore = loadHighScore();
      titleBest.textContent = '$' + highScore;
      showScreen(titleScreen);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }

  })();
  </script>
</body>
</html>
