<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect width="100" height="100" rx="12" fill="#0F172A"/>
  <!-- 3x3 pixel grid preview -->
  <rect x="10" y="10" width="24" height="24" rx="2" fill="#7BA859"/>
  <rect x="38" y="10" width="24" height="24" rx="2" fill="#8B6914"/>
  <rect x="66" y="10" width="24" height="24" rx="2" fill="#5B8731"/>
  <rect x="10" y="38" width="24" height="24" rx="2" fill="#8B6914"/>
  <rect x="38" y="38" width="24" height="24" rx="2" fill="#B06D3C"/>
  <rect x="66" y="38" width="24" height="24" rx="2" fill="#8B6914"/>
  <rect x="10" y="66" width="24" height="24" rx="2" fill="#5B8731"/>
  <rect x="38" y="66" width="24" height="24" rx="2" fill="#8B6914"/>
  <rect x="66" y="66" width="24" height="24" rx="2" fill="#B06D3C"/>
  <!-- Grid lines -->
  <rect x="10" y="10" width="24" height="24" rx="2" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <rect x="38" y="10" width="24" height="24" rx="2" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <rect x="66" y="10" width="24" height="24" rx="2" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <rect x="10" y="38" width="24" height="24" rx="2" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <rect x="38" y="38" width="24" height="24" rx="2" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <rect x="66" y="38" width="24" height="24" rx="2" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <rect x="10" y="66" width="24" height="24" rx="2" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <rect x="38" y="66" width="24" height="24" rx="2" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <rect x="66" y="66" width="24" height="24" rx="2" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Drag piece indicator -->
  <rect x="72" y="54" width="16" height="16" rx="2" fill="#B06D3C" opacity="0.6" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
  <text x="50" y="96" text-anchor="middle" font-size="7" fill="rgba(255,255,255,0.4)" font-family="sans-serif">MC 拼图</text>
</svg>
