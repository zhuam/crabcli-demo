<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#1a0a1a" />
  <title>Barbie Wedding Nails</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800;900&family=Inter:wght@400;500;600;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../games/shared/game-frame.css" />
  <style>
    /* ═══════════════════════════════════════════════════════
       Barbie Wedding Nails — Glam up Barbie's bridal nails!
       ═══════════════════════════════════════════════════════ */

    :root {
      --bg-deep: #1a0a1a;
      --bg-pink: #2a0f2a;
      --surface: rgba(255,255,255,0.08);
      --surface-hover: rgba(255,255,255,0.13);
      --surface-active: rgba(255,255,255,0.18);
      --border: rgba(255,255,255,0.10);
      --border-strong: rgba(255,255,255,0.20);
      --text: #f5e6f0;
      --text-dim: rgba(245,230,240,0.6);
      --text-muted: rgba(245,230,240,0.35);
      --pink-soft: #f8b4c8;
      --pink: #ff69b4;
      --pink-deep: #e8437a;
      --gold: #ffd700;
      --gold-dim: #c8a84e;
      --rose: #ffb6c1;
      --lavender: #d8b4f8;
      --pearl: #fce4ec;
      --font-display: 'Outfit', 'Dancing Script', system-ui, sans-serif;
      --font-body: 'Inter', system-ui, sans-serif;
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 22px;
      --radius-xl: 30px;
      --hand-size: min(300px, 60vw);
      --nail-size: min(48px, 10vw);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg-deep);
      color: var(--text);
      font-family: var(--font-body);
      overflow: hidden;
      height: 100%; width: 100%;
      user-select: none; -webkit-user-select: none;
      touch-action: none; -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }
    #app { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }

    /* ═══ Screens ═══ */
    .screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center;
      transition: opacity 0.45s ease, transform 0.45s ease;
      will-change: opacity, transform;
    }
    .screen.hidden {
      opacity: 0; pointer-events: none; transform: scale(0.96);
    }

    /* ═══════════════════════════
       TITLE SCREEN
       ═══════════════════════════ */
    .title-screen {
      justify-content: center; gap: 10px;
      background: linear-gradient(180deg, #1a0a1a 0%, #2a0f2a 30%, #3a1545 60%, #1a0a1a 100%);
      padding: 24px;
    }
    .title-screen::before {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 200px 100px at 30% 20%, rgba(255,105,180,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 150px 120px at 70% 25%, rgba(216,180,248,0.10) 0%, transparent 60%),
        radial-gradient(ellipse 120px 80px at 50% 75%, rgba(255,215,0,0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    .title-sparkle {
      position: absolute; border-radius: 50%;
      background: rgba(255,255,255,0.05);
      pointer-events: none;
    }
    .title-sparkle:nth-child(1) { width: 80px; height: 80px; top: 5%; left: 8%; }
    .title-sparkle:nth-child(2) { width: 40px; height: 40px; top: 12%; right: 12%; }
    .title-sparkle:nth-child(3) { width: 55px; height: 55px; bottom: 18%; left: 15%; }
    .title-sparkle:nth-child(4) { width: 30px; height: 30px; bottom: 25%; right: 10%; }
    .title-sparkle:nth-child(5) { width: 60px; height: 60px; top: 45%; left: 3%; }
    .title-sparkle:nth-child(6) { width: 40px; height: 40px; top: 38%; right: 5%; }

    .title-icon {
      font-size: 72px; line-height: 1;
      filter: drop-shadow(0 0 40px rgba(255,105,180,0.5));
      animation: titleFloat 3s ease-in-out infinite;
      position: relative; z-index: 1;
    }
    @keyframes titleFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-10px) scale(1.05); }
    }

    .title-text {
      font-family: var(--font-display); font-size: 40px; font-weight: 900;
      background: linear-gradient(135deg, #ff69b4, #ffd700, #d8b4f8, #ff69b4);
      background-size: 300% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientSweep 4s ease infinite;
      line-height: 1.1; text-align: center;
      position: relative; z-index: 1;
    }
    @keyframes gradientSweep {
      0%, 100% { background-position: 0% center; }
      50% { background-position: 100% center; }
    }
    .title-sub {
      font-family: 'Dancing Script', cursive;
      font-size: 20px; color: var(--pink-soft); text-align: center;
      position: relative; z-index: 1;
      opacity: 0.8;
    }
    .title-level {
      font-family: var(--font-display); font-size: 15px; font-weight: 700;
      color: var(--pink); text-align: center; position: relative; z-index: 1;
      margin-top: 6px;
    }
    .title-high {
      font-family: var(--font-body); font-size: 13px; color: var(--text-muted);
      margin-top: 4px; position: relative; z-index: 1;
    }
    .title-high span { color: var(--gold); }

    /* ─── Buttons ─── */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 36px; border: none; border-radius: 50px;
      font-family: var(--font-display); font-size: 18px; font-weight: 700;
      cursor: pointer; transition: all 0.2s ease;
      position: relative; z-index: 1;
    }
    .btn:active { transform: scale(0.95); }
    .btn-primary {
      background: linear-gradient(135deg, #ff69b4, #d8b4f8);
      color: #fff; box-shadow: 0 4px 24px rgba(255,105,180,0.4);
    }
    .btn-primary:hover { box-shadow: 0 6px 32px rgba(255,105,180,0.55); transform: translateY(-2px); }
    .btn-primary:active { transform: scale(0.95) translateY(0); }
    .btn-secondary {
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border-strong);
    }
    .btn-secondary:hover { background: var(--surface-hover); }

    .btn-sm {
      padding: 10px 22px; font-size: 14px;
    }

    .btn-gold {
      background: linear-gradient(135deg, #ffd700, #f0a830);
      color: #2a0f2a; box-shadow: 0 4px 20px rgba(255,215,0,0.35);
    }
    .btn-gold:hover { box-shadow: 0 6px 28px rgba(255,215,0,0.5); transform: translateY(-2px); }
    .btn-gold:active { transform: scale(0.95) translateY(0); }

    /* ═══════════════════════════
       GAME SCREEN
       ═══════════════════════════ */
    .game-screen {
      background: linear-gradient(180deg, #1a0a1a 0%, #2a0f2a 100%);
      padding: 10px;
      justify-content: flex-start;
      gap: 4px;
    }

    /* ─── Top Bar ─── */
    .game-top {
      width: 100%; max-width: 460px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 4px;
      position: relative; z-index: 2;
    }
    .game-level {
      font-family: var(--font-display); font-size: 15px; font-weight: 700;
      background: linear-gradient(135deg, var(--pink), var(--gold));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .game-score {
      font-family: var(--font-display); font-size: 14px; font-weight: 700;
      color: var(--gold);
    }
    .game-score span { color: var(--text-dim); font-weight: 400; }

    /* ─── Progress dots ─── */
    .progress-row {
      display: flex; gap: 8px; align-items: center;
      width: 100%; max-width: 460px; padding: 2px 4px;
      position: relative; z-index: 2;
    }
    .progress-dot {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid var(--border-strong);
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; transition: all 0.3s ease;
    }
    .progress-dot.painted {
      border-color: var(--pink);
      background: linear-gradient(135deg, var(--pink), var(--pink-deep));
      box-shadow: 0 0 14px rgba(255,105,180,0.35);
    }
    .progress-dot.decorated {
      border-color: var(--gold);
      background: linear-gradient(135deg, var(--gold), var(--gold-dim));
      box-shadow: 0 0 14px rgba(255,215,0,0.3);
    }
    .progress-label {
      margin-left: auto; font-size: 12px; color: var(--text-dim);
    }

    /* ─── Barbie Hand Area ─── */
    .hand-area {
      position: relative;
      width: var(--hand-size);
      height: calc(var(--hand-size) * 1.2);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      margin: 2px 0;
      z-index: 1;
    }

    .hand-svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 4px 24px rgba(255,105,180,0.15));
      overflow: visible;
    }

    .nail-area {
      cursor: pointer;
      transition: filter 0.15s ease;
    }
    .nail-area:hover {
      filter: brightness(1.15);
    }
    .nail-area .nail-fill {
      transition: fill 0.25s ease;
    }
    .nail-area .nail-shimmer {
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }
    .nail-area .nail-shimmer.show {
      opacity: 0.7;
    }
    .nail-area .nail-deco {
      opacity: 0;
      transition: opacity 0.35s ease;
      pointer-events: none;
    }
    .nail-area .nail-deco.show {
      opacity: 1;
    }
    .nail-glow {
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .nail-glow.active {
      opacity: 0.5;
      animation: pulseGlow 1.5s ease-in-out infinite;
    }
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.25; }
      50% { opacity: 0.6; }
    }

    .hand-blush {
      animation: blushPulse 4s ease-in-out infinite;
    }
    @keyframes blushPulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.5; }
    }

    .hand-eye {
      animation: blinkEye 3.5s ease-in-out infinite;
    }
    @keyframes blinkEye {
      0%, 92%, 100% { transform: scaleY(1); }
      96% { transform: scaleY(0.1); }
    }

    /* ─── Drag preview ghost ─── */
    .drag-ghost {
      position: fixed;
      pointer-events: none;
      z-index: 1000;
      transition: none;
      transform: translate(-50%, -50%);
      filter: drop-shadow(0 4px 16px rgba(255,105,180,0.5));
    }
    .drag-ghost.deco {
      font-size: 28px;
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
    }
    .drag-ghost.color {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 3px solid white;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    /* ─── Color Palette ─── */
    .palette-section {
      width: 100%; max-width: 460px;
      display: flex; flex-direction: column; gap: 4px;
      flex-shrink: 0;
      position: relative; z-index: 2;
    }
    .section-label {
      font-size: 11px; font-weight: 600; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 1px;
    }
    .palette-row {
      display: flex; gap: 8px; flex-wrap: wrap;
      justify-content: center;
    }
    .color-swatch {
      width: 38px; height: 38px; border-radius: 50%;
      border: 2.5px solid transparent;
      cursor: grab; transition: all 0.18s ease;
      position: relative;
      flex-shrink: 0;
      touch-action: none;
    }
    .color-swatch:active { cursor: grabbing; }
    .color-swatch.selected {
      border-color: #fff;
      box-shadow: 0 0 16px rgba(255,255,255,0.3);
      transform: scale(1.12);
    }
    .color-swatch:hover { transform: scale(1.08); }
    .color-swatch.selected::after {
      content: '✓'; position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.9); font-size: 16px; font-weight: 700;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }

    /* ─── Decorations ─── */
    .deco-section {
      width: 100%; max-width: 460px;
      display: flex; flex-direction: column; gap: 4px;
      flex-shrink: 0;
      position: relative; z-index: 2;
    }
    .deco-row {
      display: flex; gap: 8px; justify-content: center;
    }
    .deco-btn {
      width: 40px; height: 40px; border-radius: var(--radius-sm);
      border: 2px solid var(--border);
      background: var(--surface); cursor: grab;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; transition: all 0.18s ease;
      touch-action: none;
    }
    .deco-btn:active { cursor: grabbing; }
    .deco-btn.selected {
      border-color: var(--gold);
      background: rgba(255,215,0,0.15);
      box-shadow: 0 0 12px rgba(255,215,0,0.3);
    }
    .deco-btn:hover { background: var(--surface-hover); }

    .tool-row {
      display: flex; gap: 6px; align-items: center;
      justify-content: center; margin-top: 2px;
    }
    .tool-btn {
      padding: 6px 14px; border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--surface); color: var(--text-dim);
      font-size: 12px; font-weight: 600; cursor: pointer;
      transition: all 0.15s ease;
      font-family: var(--font-body);
    }
    .tool-btn:hover { background: var(--surface-hover); color: var(--text); }
    .tool-btn.active {
      border-color: var(--rose); color: var(--rose);
      background: rgba(255,182,193,0.12);
    }

    /* ─── Hint text ─── */
    .hint-text {
      font-size: 12px; color: var(--text-muted);
      text-align: center; margin-top: 2px;
      transition: color 0.3s ease;
      max-width: 340px;
    }

    /* ═══════════════════════════
       RESULT SCREEN
       ═══════════════════════════ */
    .result-screen {
      justify-content: center; gap: 14px; text-align: center;
      background: linear-gradient(180deg, #1a0a1a 0%, #2a0f2a 40%, #3a1545 70%, #1a0a1a 100%);
      padding: 24px;
    }
    .result-screen::before {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 180px 100px at 25% 30%, rgba(255,105,180,0.10) 0%, transparent 60%),
        radial-gradient(ellipse 140px 100px at 75% 50%, rgba(255,215,0,0.07) 0%, transparent 60%);
      pointer-events: none;
    }

    .result-icon {
      font-size: 76px; line-height: 1;
      position: relative; z-index: 1;
      animation: resultPop 0.6s ease-out;
    }
    @keyframes resultPop {
      0% { transform: scale(0); opacity: 0; }
      60% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }

    .result-title {
      font-family: var(--font-display); font-size: 30px; font-weight: 900;
      position: relative; z-index: 1;
    }
    .result-title.win {
      background: linear-gradient(135deg, #ff69b4, #ffd700);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .result-title.lose {
      color: var(--text-dim);
    }

    /* ─── Stars ─── */
    .stars-row {
      display: flex; gap: 10px; justify-content: center;
      position: relative; z-index: 1;
      margin: 4px 0;
    }
    .star {
      font-size: 40px;
      opacity: 0.2;
      transition: all 0.3s ease;
    }
    .star.earned {
      opacity: 1;
      animation: starPop 0.4s ease-out;
    }
    @keyframes starPop {
      0% { transform: scale(0); opacity: 0; }
      60% { transform: scale(1.3); }
      100% { transform: scale(1); opacity: 1; }
    }

    .result-details {
      font-size: 14px; color: var(--text-dim);
      position: relative; z-index: 1; line-height: 1.6;
    }
    .result-details span { color: var(--gold); font-weight: 700; }
    .result-best {
      font-size: 13px; color: var(--text-muted);
      position: relative; z-index: 1;
    }
    .result-best span { color: var(--gold); }
    .result-new-best {
      color: var(--pink); font-weight: 700; font-size: 14px;
      animation: newBestPulse 0.8s ease-in-out infinite alternate;
      position: relative; z-index: 1;
    }
    @keyframes newBestPulse {
      0% { opacity: 0.6; transform: scale(1); }
      100% { opacity: 1; transform: scale(1.08); }
    }

    .result-btns {
      display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
      position: relative; z-index: 1;
    }

    /* ─── Confetti burst ─── */
    .confetti-container {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 100;
      overflow: hidden;
    }
    .confetti-piece {
      position: absolute;
      width: 8px; height: 8px;
      border-radius: 2px;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    /* ═══ Responsive ═══ */
    @media (max-width: 480px) {
      .title-text { font-size: 30px; }
      .title-icon { font-size: 56px; }
      .title-sub { font-size: 16px; }
      .hand-svg { width: 90%; height: auto; }
      .color-swatch { width: 34px; height: 34px; }
      .deco-btn { width: 36px; height: 36px; font-size: 19px; }
      .game-top { padding: 4px; }
      .result-title { font-size: 24px; }
      .result-icon { font-size: 60px; }
      .star { font-size: 32px; }
    }

    @media (max-height: 640px) {
      .hand-area { width: min(200px, 42vw); }
      .color-swatch { width: 30px; height: 30px; }
      .deco-btn { width: 32px; height: 32px; font-size: 17px; }
      .title-icon { font-size: 44px; }
      .title-text { font-size: 24px; }
      .game-top { padding: 2px; }
      .game-level { font-size: 13px; }
      .game-score { font-size: 12px; }
      .progress-dot { width: 22px; height: 22px; font-size: 10px; }
      .result-title { font-size: 20px; }
      .star { font-size: 28px; }
    }
  </style>
</head>
<body>
  <div id="app">

    <!-- ═══ TITLE SCREEN ═══ -->
    <div id="title-screen" class="screen title-screen">
      <div class="title-sparkle"></div><div class="title-sparkle"></div>
      <div class="title-sparkle"></div><div class="title-sparkle"></div>
      <div class="title-sparkle"></div><div class="title-sparkle"></div>
      <div class="title-icon">💍</div>
      <div class="title-text">Barbie<br/>Wedding Nails</div>
      <div class="title-sub">✨ Glam up Barbie's bridal nails! ✨</div>
      <div id="title-level" class="title-level">💗 Level 1 · White Wedding</div>
      <div class="title-high">🏆 Best Score: <span id="title-high-score">0</span></div>
      <div style="height:6px"></div>
      <button id="play-btn" class="btn btn-primary">💅 Start Glamming!</button>
    </div>

    <!-- ═══ GAME SCREEN ═══ -->
    <div id="game-screen" class="screen game-screen hidden">
      <div class="game-top">
        <span class="game-level" id="level-label">💗 White Wedding</span>
        <span class="game-score">⭐ <span id="score-display">0</span></span>
      </div>

      <div class="progress-row">
        <div id="progress-dots"></div>
        <span class="progress-label"><span id="nails-done">0</span>/5 done</span>
      </div>

      <!-- Barbie Hand (SVG) -->
      <div class="hand-area">
        <svg class="hand-svg" viewBox="0 0 300 370" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="handGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#fce4d6"/>
              <stop offset="50%" stop-color="#f5d5c0"/>
              <stop offset="100%" stop-color="#ecc8b0"/>
            </linearGradient>
            <linearGradient id="handShadow" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#e8b8a0"/>
              <stop offset="100%" stop-color="#d4a088"/>
            </linearGradient>
            <radialGradient id="ringGrad" cx="50%" cy="40%" r="60%">
              <stop offset="0%" stop-color="#ffd700"/>
              <stop offset="100%" stop-color="#b8860b"/>
            </radialGradient>
            <radialGradient id="bgGrad" cx="50%" cy="50%" r="60%">
              <stop offset="0%" stop-color="#2a0f2a" stop-opacity="0"/>
              <stop offset="100%" stop-color="#1a0a1a" stop-opacity="0.5"/>
            </radialGradient>
            <filter id="shadow1"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.25"/></filter>
            <filter id="glowGold"><feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#ffd700" flood-opacity="0.4"/></filter>
          </defs>

          <!-- Background glow -->
          <ellipse cx="150" cy="200" rx="140" ry="160" fill="url(#bgGrad)"/>

          <!-- Wrist / arm -->
          <path d="M100 350 C90 330 80 300 85 280 L215 280 C220 300 210 330 200 350 Z" fill="url(#handShadow)" opacity="0.4"/>

          <!-- Main hand palm -->
          <path d="M70 280 C60 260 55 240 60 220 C65 200 75 190 85 185 L215 185 C225 190 235 200 240 220 C245 240 240 260 230 280 Z" fill="url(#handGrad)" filter="url(#shadow1)"/>

          <!-- Wrist / lower arm -->
          <path d="M90 280 L80 350 L220 350 L210 280 Z" fill="url(#handGrad)" opacity="0.9"/>

          <!-- Palm highlight -->
          <ellipse cx="150" cy="240" rx="60" ry="40" fill="#fce4d6" opacity="0.3"/>

          <!-- Knuckle details -->

  <!-- Drag ghost element -->
  <div class="drag-ghost hidden" id="drag-ghost"></div>

  <script>
  (function(){
    'use strict';

    /* ═══════════════════════════════════════════════════
       BARBIE WEDDING NAILS — Game Logic
       ═══════════════════════════════════════════════════ */

    // ─── DOM References ───
    const $ = id => document.getElementById(id);
    const titleScreen    = $('title-screen');
    const gameScreen     = $('game-screen');
    const resultScreen   = $('result-screen');
    const levelLabel     = $('level-label');
    const scoreDisplay   = $('score-display');
    const progressDots   = $('progress-dots');
    const nailsDone      = $('nails-done');
    const paletteRow     = $('palette-row');
    const decoRow        = $('deco-row');
    const hintText       = $('hint-text');
    const eraserBtn      = $('eraser-btn');
    const clearBtn       = $('clear-btn');
    const playBtn        = $('play-btn');
    const titleHigh      = $('title-high-score');
    const titleLevel     = $('title-level');
    const resultIcon     = $('result-icon');
    const resultTitle    = $('result-title');
    const resultDet      = $('result-details');
    const resultBest     = $('result-best');
    const resultNewBest  = $('new-best');
    const resultNext     = $('result-next');
    const resultRetry    = $('result-retry');
    const starsRow       = $('stars-row');
    const dragGhost      = $('drag-ghost');
    const confettiContainer = $('confetti-container');
    const nailAreas      = document.querySelectorAll('.nail-area');
    const nailFills      = document.querySelectorAll('.nail-fill');
    const nailDecos      = document.querySelectorAll('.nail-deco');
    const nailShimmers   = document.querySelectorAll('.nail-shimmer');
    const nailGlows      = document.querySelectorAll('.nail-glow');

    // ─── Storage ───
    const STORAGE_KEY = 'barbieWeddingNails_highScore';

    // ─── Wedding Themes (Levels) ───
    const LEVELS = [
      { name: '💗 White Wedding',    desc: 'Classic white elegance', theme: 'classic' },
      { name: '🌹 Rose Romance',     desc: 'Deep romantic reds',     theme: 'romance' },
      { name: '💜 Royal Lavender',   desc: 'Regal purple & gold',    theme: 'royal' },
      { name: '🌊 Beach Bliss',      desc: 'Tropical beach vibes',   theme: 'beach' },
      { name: '✨ Diamond Dream',    desc: 'Crystal & sparkle',      theme: 'diamond' },
      { name: '🌸 Cherry Blossom',   desc: 'Sakura spring wedding',  theme: 'cherry' },
      { name: '💎 Midnight Jewels',  desc: 'Deep gemstone tones',    theme: 'midnight' },
      { name: '🌅 Golden Sunset',    desc: 'Warm sunset hues',       theme: 'sunset' },
      { name: '❄️ Winter Frost',    desc: 'Icy white & silver',      theme: 'winter' },
      { name: '💖 Grand Finale',     desc: 'Ultimate bridal glam',   theme: 'finale' },
    ];

    // ─── Palettes per theme ───
    const PALETTES = {
      classic:  ['#fce4ec','#ffb6c1','#ff69b4','#ffd700','#f8bbd0','#ffffff','#f0e6ff','#e8d5f5'],
      romance:  ['#880e4f','#b71c1c','#e53935','#ff5252','#ff8a80','#d50000','#c62828','#ad1457'],
      royal:    ['#6a1b9a','#8e24aa','#ce93d8','#ffd700','#e1bee7','#4a148c','#f3e5f5','#f0e6ff'],
      beach:    ['#00bcd4','#26c6da','#80deea','#ffd700','#ffe082','#fff176','#b2dfdb','#e0f7fa'],
      diamond:  ['#ffffff','#e0e0e0','#b0bec5','#ffd700','#b388ff','#90caf9','#f5f5f5','#eceff1'],
      cherry:   ['#f8bbd0','#f48fb1','#f06292','#ec407a','#ffd54f','#a5d6a7','#fff9c4','#e8eaf6'],
      midnight: ['#1a237e','#283593','#3949ab','#5c6bc0','#7986cb','#ffd700','#e8eaf6','#c5cae9'],
      sunset:   ['#ff6f00','#ff8f00','#ffab00','#ff6d00','#dd2c00','#ffd740','#ffe57f','#fff8e1'],
      winter:   ['#ffffff','#e3f2fd','#bbdefb','#b3e5fc','#ffd700','#e0e0e0','#f5f5f5','#cfd8dc'],
      finale:   ['#ff69b4','#ffd700','#d8b4f8','#ff4081','#e040fb','#ffab40','#00e5ff','#76ff03'],
    };

    const DECORATIONS = ['💍','🌸','💎','💗','🕊️','✨','🌹','💖','🦋','⭐'];

    // ─── State ───
    let highScore = parseInt(localStorage.getItem(STORAGE_KEY) || '0', 10);
    let level = 0;
    let nails = [];          // { color: null|string, deco: null|string }
    let score = 0;
    let selectedColor = null;
    let selectedDeco = null;
    let eraserMode = false;
    let gameActive = false;
    let isDragging = false;
    let dragSource = null;    // { type: 'color'|'deco', value: string, el: HTMLElement }
    let lastSoundTime = 0;

    // ═══ Audio (Web Audio API — no external files) ═══
    let audioCtx = null;
    function getAudio() {
      if (!audioCtx) {
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (_) {}
      }
      return audioCtx;
    }
    function playTone(freq, duration, type, vol) {
      try {
        const ctx = getAudio();
        if (!ctx) return;
        const now = ctx.currentTime;
        if (now - lastSoundTime < 0.05) return;
        lastSoundTime = now;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = type || 'sine';
        osc.frequency.setValueAtTime(freq, now);
        gain.gain.setValueAtTime(Math.min(vol || 0.12, 0.15), now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + (duration || 0.15));
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(now);
        osc.stop(now + (duration || 0.15));
      } catch (_) {}
    }
    function playPaint() { playTone(600, 0.12, 'sine', 0.12); setTimeout(() => playTone(800, 0.10, 'sine', 0.08), 60); }
    function playSelect() { playTone(500, 0.08, 'sine', 0.06); }
    function playDrop() { playTone(700, 0.1, 'sine', 0.1); }
    function playSticker() { playTone(900, 0.1, 'sine', 0.08); }
    function playEraser() { playTone(300, 0.08, 'square', 0.06); }
    function playComplete() {
      [523, 659, 784, 1047, 1319].forEach((f, i) => setTimeout(() => playTone(f, 0.15, 'sine', 0.10), i * 80));
    }
    function playStar() { playTone(880, 0.12, 'sine', 0.10); }
    function playWin() {
      [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playTone(f, 0.2, 'sine', 0.12), i * 100));
    }

    // ═══ Vibrate ═══
    function vibe(ms) { try { navigator.vibrate && navigator.vibrate(ms); } catch (_) {} }

    // ═══ Screen helpers ═══
    function showScreen(screen) {
      [titleScreen, gameScreen, resultScreen].forEach(s => s.classList.add('hidden'));
      screen.classList.remove('hidden');
    }

    // ═══ Rendering ═══
    function buildPalette() {
      const theme = LEVELS[level % LEVELS.length].theme;
      const colors = PALETTES[theme];
      paletteRow.innerHTML = '';
      colors.forEach((c, idx) => {
        const swatch = document.createElement('div');
        swatch.className = 'color-swatch';
        swatch.dataset.color = c;
        swatch.dataset.index = idx;
        swatch.style.background = c;
        paletteRow.appendChild(swatch);
      });
    }

    function buildDecorations() {
      decoRow.innerHTML = '';
      DECORATIONS.forEach((d, idx) => {
        const btn = document.createElement('button');
        btn.className = 'deco-btn';
        btn.dataset.deco = d;
        btn.dataset.index = idx;
        btn.textContent = d;
        decoRow.appendChild(btn);
      });
    }

    function renderNails() {
      nails.forEach((nail, i) => {
        const fill = nailFills[i];
        const deco = nailDecos[i];
        const shimmer = nailShimmers[i];
        const glow = nailGlows[i];
        if (nail.color) {
          fill.setAttribute('fill', nail.color);
          glow.classList.add('active');
        } else {
          fill.setAttribute('fill', '#fce4ec');
          glow.classList.remove('active');
        }
        if (nail.deco) {
          deco.textContent = nail.deco;
          deco.classList.add('show');
        } else {
          deco.classList.remove('show');
        }
        if (nail.color) {
          shimmer.classList.add('show');
          shimmer.setAttribute('fill', nail.color);
          // Tint shimmer by making it slightly lighter
          const shimmerEl = shimmer;
          shimmerEl.setAttribute('opacity', '0.5');
        } else {
          shimmer.classList.remove('show');
        }
      });
      updateProgress();
    }

    function updateProgress() {
      const painted = nails.filter(n => n.color).length;
      const decorated = nails.filter(n => n.deco).length;
      nailsDone.textContent = painted;
      const dots = progressDots.querySelectorAll('.progress-dot');
      dots.forEach((dot, i) => {
        const nail = nails[i];
        dot.classList.remove('painted', 'decorated');
        if (nail.color && nail.deco) {
          dot.classList.add('decorated');
        } else if (nail.color) {
          dot.classList.add('painted');
        }
      });
      updateScoreDisplay();
    }

    function updateScoreDisplay() {
      scoreDisplay.textContent = score;
    }

    function buildProgressDots() {
      progressDots.innerHTML = '';
      nails.forEach((_, i) => {
        const dot = document.createElement('div');
        dot.className = 'progress-dot';
        dot.textContent = '💅';
        dot.style.fontSize = '12px';
        progressDots.appendChild(dot);
      });
    }

    // ═══ Selection (non-drag — tap mode) ═══
    function clearSelection() {
      selectedColor = null;
      selectedDeco = null;
      document.querySelectorAll('.color-swatch.selected').forEach(el => el.classList.remove('selected'));
      document.querySelectorAll('.deco-btn.selected').forEach(el => el.classList.remove('selected'));
    }

    // ═══ Nail interaction (drop target) ═══
    function onNailDrop(index, color, deco) {
      if (!gameActive) return;
      const nail = nails[index];

      if (color) {
        // Color drop
        if (nail.color === color) {
          hintText.textContent = '✨ This nail already has that color!';
          return;
        }
        nail.color = color;
        score += 10;
        renderNails();
        playDrop();
        vibe(15);
        hintText.textContent = '💅 Gorgeous! Now add a decoration!';

        checkComplete();
        return;
      }

      if (deco) {
        // Decoration drop
        if (!nail.color) {
          hintText.textContent = '🎨 Paint the nail first before adding decorations!';
          return;
        }
        if (nail.deco === deco) {
          hintText.textContent = '✨ That decoration is already on!';
          return;
        }
        nail.deco = deco;
        score += 5;
        renderNails();
        playSticker();
        vibe(12);
        hintText.textContent = '💎 Stunning! Keep going!';

        checkComplete();
        return;
      }
    }

    function checkComplete() {
      if (nails.every(n => n.color && n.deco)) {
        onLevelComplete();
      }
    }

    function onNailTap(index) {
      if (!gameActive) return;

      const nail = nails[index];

      // Eraser mode
      if (eraserMode) {
        if (nail.color || nail.deco) {
          nail.color = null;
          nail.deco = null;
          score = Math.max(0, score - 5);
          renderNails();
          playEraser();
          vibe(15);
          hintText.textContent = '🧽 Nail cleared!';
        }
        return;
      }

      // Color painting (tap mode: select color first, then tap nail)
      if (selectedColor) {
        if (nail.color === selectedColor) {
          hintText.textContent = '✨ Already that color!';
          return;
        }
        nail.color = selectedColor;
        score += 10;
        renderNails();
        playPaint();
        vibe(20);
        hintText.textContent = '💅 Lovely! Drag or tap a decoration next!';

        if (nails.every(n => n.color)) {
          // Check if all decorated too
          if (nails.every(n => n.deco)) {
            onLevelComplete();
          } else {
            hintText.textContent = '✨ All painted! Now add decorations! ✨';
          }
        }
        return;
      }

      // Decoration (tap mode)
      if (selectedDeco) {
        if (!nail.color) {
          hintText.textContent = '🎨 Paint first!';
          return;
        }
        if (nail.deco === selectedDeco) {
          hintText.textContent = '✨ Already there!';
          return;
        }
        nail.deco = selectedDeco;
        score += 5;
        renderNails();
        playSticker();
        vibe(12);
        hintText.textContent = '💎 Beautiful!';

        if (nails.every(n => n.color && n.deco)) {
          onLevelComplete();
        }
        return;
      }

      hintText.textContent = '💡 Drag a color onto a nail, or tap a color then tap a nail!';
    }

    // ═══ Drag & Drop System ═══
    function getNailIndexFromPoint(x, y) {
      // Find the closest nail area to the drop point
      let minDist = Infinity;
      let closestIdx = -1;
      nailAreas.forEach((area, i) => {
        const rect = area.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const dist = Math.hypot(x - cx, y - cy);
        if (dist < minDist) {
          minDist = dist;
          closestIdx = i;
        }
      });
      // Only snap if within reasonable distance
      if (minDist < 80) return closestIdx;
      return -1;
    }

    function startDrag(e, type, value, el) {
      if (!gameActive) return;
      isDragging = true;
      dragSource = { type, value, el };

      const pos = getEventPos(e);
      dragGhost.classList.remove('hidden');

      if (type === 'color') {
        dragGhost.className = 'drag-ghost color';
        dragGhost.style.background = value;
      } else {
        dragGhost.className = 'drag-ghost deco';
        dragGhost.textContent = value;
      }
      dragGhost.style.left = pos.x + 'px';
      dragGhost.style.top = pos.y + 'px';

      // Visual feedback on source
      el.style.opacity = '0.4';
      el.style.transform = 'scale(0.9)';

      hintText.textContent = type === 'color'
        ? '🎯 Drop the color onto a nail!'
        : '🎯 Drop the decoration onto a nail!';
    }

    function moveDrag(e) {
      if (!isDragging) return;
      const pos = getEventPos(e);
      dragGhost.style.left = pos.x + 'px';
      dragGhost.style.top = pos.y + 'px';

      // Highlight nearest nail
      const idx = getNailIndexFromPoint(pos.x, pos.y);
      nailAreas.forEach((area, i) => {
        area.style.filter = (i === idx && i >= 0) ? 'brightness(1.25)' : '';
      });
    }

    function endDrag(e) {
      if (!isDragging) return;
      isDragging = false;
      dragGhost.classList.add('hidden');

      // Reset source element
      if (dragSource && dragSource.el) {
        dragSource.el.style.opacity = '';
        dragSource.el.style.transform = '';
      }

      // Reset nail highlights
      nailAreas.forEach(area => { area.style.filter = ''; });

      const pos = getEventPos(e);
      const idx = getNailIndexFromPoint(pos.x, pos.y);

      if (idx >= 0 && dragSource) {
        onNailDrop(idx,
          dragSource.type === 'color' ? dragSource.value : null,
          dragSource.type === 'deco' ? dragSource.value : null
        );
      } else {
        hintText.textContent = '💡 Drop onto a nail! Try again!';
      }

      dragSource = null;
    }

    function getEventPos(e) {
      if (e.touches && e.touches.length > 0) {
        return { x: e.touches[0].clientX, y: e.touches[0].clientY };
      }
      if (e.changedTouches && e.changedTouches.length > 0) {
        return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
      }
      return { x: e.clientX, y: e.clientY };
    }

    // ═══ Level Flow ═══
    function initLevel() {
      nails = Array.from({ length: 5 }, () => ({ color: null, deco: null }));
      score = 0;
      selectedColor = null;
      selectedDeco = null;
      eraserMode = false;
      eraserBtn.classList.remove('active');
      gameActive = true;
      isDragging = false;
      dragSource = null;
      dragGhost.classList.add('hidden');
      nailAreas.forEach(area => { area.style.filter = ''; });

      const levelData = LEVELS[level % LEVELS.length];
      levelLabel.textContent = levelData.name;

      buildPalette();
      buildDecorations();
      buildProgressDots();
      renderNails();

      hintText.textContent = '💡 Drag colors onto nails or tap a color then tap a nail!';
      updateScoreDisplay();

      showScreen(gameScreen);
    }

    function onLevelComplete() {
      gameActive = false;
      playComplete();
      vibe([50, 30, 50]);

      // Calculate stars
      const painted = nails.filter(n => n.color).length;
      const decorated = nails.filter(n => n.deco).length;
      const totalNails = nails.length;
      const paintRatio = painted / totalNails;
      const decoRatio = decorated / totalNails;
      const perfectionBonus = (painted === totalNails && decorated === totalNails) ? 20 : 0;
      const finalScore = score + perfectionBonus;

      // Stars: 1 for painting all, 1 for decorating all, 1 for perfection bonus
      const stars = (paintRatio >= 1 ? 1 : 0) + (decoRatio >= 1 ? 1 : 0) + (perfectionBonus > 0 ? 1 : 0);

      const isNewBest = finalScore > highScore && finalScore > 0;
      if (isNewBest) {
        highScore = finalScore;
        localStorage.setItem(STORAGE_KEY, highScore);
      }

      // Build result screen
      const isLastLevel = level >= LEVELS.length - 1;

      // Result icon based on stars
      const iconMap = ['😅', '💅', '💗', '👰'];
      const titleMap = ['Keep Trying!', 'Nice Start!', 'Almost Perfect!', '👰 Bridal Perfect! 👰'];
      resultIcon.textContent = iconMap[stars] || iconMap[0];
      resultTitle.textContent = titleMap[stars] || titleMap[0];
      resultTitle.className = 'result-title' + (stars >= 2 ? ' win' : ' lose');
      resultDet.innerHTML = `Nails painted: <span>${painted}/${totalNails}</span> · Decorated: <span>${decorated}/${totalNails}</span><br/>⭐ Score: <span>${finalScore}</span>`;
      resultBest.textContent = highScore;
      resultNewBest.classList.toggle('hidden', !isNewBest);

      // Show stars with delay animation
      const starEls = starsRow.querySelectorAll('.star');
      starEls.forEach((s, i) => {
        s.classList.remove('earned');
        if (i < stars) {
          setTimeout(() => {
            s.classList.add('earned');
            playStar();
            vibe(10);
          }, 300 + i * 400);
        }
      });

      // Confetti for 3 stars
      if (stars >= 3) {
        setTimeout(() => spawnConfetti(), 1200);
        setTimeout(() => playWin(), 600);
      } else if (stars === 2) {
        setTimeout(() => spawnConfetti(20), 1200);
      }

      if (isLastLevel) {
        resultNext.textContent = '👰 Bridal Collection Complete!';
        resultNext.className = 'btn btn-gold';
        resultNext.onclick = () => { level = 0; initLevel(); };
        resultRetry.textContent = '🔄 Replay';
      } else {
        resultNext.textContent = '➡️ Next Theme';
        resultNext.className = 'btn btn-primary';
        resultNext.onclick = () => { level++; initLevel(); };
        resultRetry.textContent = '🔄 Retry';
      }
      resultRetry.onclick = () => initLevel();

      showScreen(resultScreen);
    }

    // ═══ Confetti ═══
    function spawnConfetti(count) {
      count = count || 50;
      const container = confettiContainer;
      container.innerHTML = '';
      const colors = ['#ff69b4','#ffd700','#d8b4f8','#ffb6c1','#ff6b6b','#48dbfb','#ff9ff3','#feca57'];
      for (let i = 0; i < count; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + '%';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.width = (4 + Math.random() * 8) + 'px';
        piece.style.height = (4 + Math.random() * 8) + 'px';
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        piece.style.animationDuration = (2 + Math.random() * 2) + 's';
        piece.style.animationDelay = Math.random() * 1.5 + 's';
        container.appendChild(piece);
      }
    }

    // ═══ Event Binding ═══
    function bindEvents() {
      // ─── Drag support (pointer events) ───
      // Colors — drag start
      paletteRow.addEventListener('pointerdown', e => {
        const swatch = e.target.closest('.color-swatch');
        if (!swatch || !gameActive) return;
        const color = swatch.dataset.color;
        if (!color) return;
        e.preventDefault();
        eraserMode = false;
        eraserBtn.classList.remove('active');
        clearSelection();

        // If it's a short tap (not drag), treat as select
        const startX = e.clientX;
        const startY = e.clientY;

        const onMove = me => {
          const dx = me.clientX - startX;
          const dy = me.clientY - startY;
          if (Math.hypot(dx, dy) > 5 && !isDragging) {
            // Converted to drag
            document.removeEventListener('pointermove', onMove);
            document.removeEventListener('pointerup', onUp);
            startDrag(me, 'color', color, swatch);
          }
        };
        const onUp = ue => {
          document.removeEventListener('pointermove', onMove);
          document.removeEventListener('pointerup', onUp);
          if (!isDragging) {
            // It was a tap — select color
            playSelect();
            vibe(8);
            selectedColor = color;
            selectedDeco = null;
            document.querySelectorAll('.color-swatch.selected').forEach(el => el.classList.remove('selected'));
            swatch.classList.add('selected');
            hintText.textContent = '💡 Now tap a nail to paint it, or drag onto a nail!';
          }
        };
        document.addEventListener('pointermove', onMove);
        document.addEventListener('pointerup', onUp);
      });

      // Decorations — drag start (same pattern)
      decoRow.addEventListener('pointerdown', e => {
        const btn = e.target.closest('.deco-btn');
        if (!btn || !gameActive) return;
        const deco = btn.dataset.deco;
        if (!deco) return;
        e.preventDefault();
        eraserMode = false;
        eraserBtn.classList.remove('active');
        clearSelection();

        const startX = e.clientX;
        const startY = e.clientY;

        const onMove = me => {
          const dx = me.clientX - startX;
          const dy = me.clientY - startY;
          if (Math.hypot(dx, dy) > 5 && !isDragging) {
            document.removeEventListener('pointermove', onMove);
            document.removeEventListener('pointerup', onUp);
            startDrag(me, 'deco', deco, btn);
          }
        };
        const onUp = ue => {
          document.removeEventListener('pointermove', onMove);
          document.removeEventListener('pointerup', onUp);
          if (!isDragging) {
            playSelect();
            vibe(8);
            selectedDeco = deco;
            selectedColor = null;
            document.querySelectorAll('.deco-btn.selected').forEach(el => el.classList.remove('selected'));
            btn.classList.add('selected');
            hintText.textContent = '💡 Tap a painted nail to add decoration, or drag it!';
          }
        };
        document.addEventListener('pointermove', onMove);
        document.addEventListener('pointerup', onUp);
      });

      // Global drag move & end
      document.addEventListener('pointermove', e => {
        moveDrag(e);
      });

      document.addEventListener('pointerup', e => {
        if (isDragging) {
          endDrag(e);
        }
      });

      // ─── Touch drag support (additional for mobile) ───
      paletteRow.addEventListener('touchstart', e => {
        const swatch = e.target.closest('.color-swatch');
        if (!swatch || !gameActive) return;
        const color = swatch.dataset.color;
        if (!color) return;
        eraserMode = false;
        eraserBtn.classList.remove('active');
        clearSelection();

        const touch = e.touches[0];
        const startX = touch.clientX;
        const startY = touch.clientY;
        let didDrag = false;

        const onTouchMove = te => {
          const t = te.touches[0];
          const dx = t.clientX - startX;
          const dy = t.clientY - startY;
          if (Math.hypot(dx, dy) > 8 && !isDragging) {
            didDrag = true;
            document.removeEventListener('touchmove', onTouchMove);
            document.removeEventListener('touchend', onTouchEnd);
            // Cancel the original touch event by starting drag fresh
            const fakeEvent = { touches: [{ clientX: t.clientX, clientY: t.clientY }] };
            startDrag(fakeEvent, 'color', color, swatch);
          }
        };
        const onTouchEnd = te => {
          document.removeEventListener('touchmove', onTouchMove);
          document.removeEventListener('touchend', onTouchEnd);
          if (!didDrag && !isDragging) {
            playSelect();
            vibe(8);
            selectedColor = color;
            selectedDeco = null;
            document.querySelectorAll('.color-swatch.selected').forEach(el => el.classList.remove('selected'));
            swatch.classList.add('selected');
            hintText.textContent = '💡 Now tap a nail!';
          }
        };
        document.addEventListener('touchmove', onTouchMove, { passive: true });
        document.addEventListener('touchend', onTouchEnd);
      }, { passive: true });

      decoRow.addEventListener('touchstart', e => {
        const btn = e.target.closest('.deco-btn');
        if (!btn || !gameActive) return;
        const deco = btn.dataset.deco;
        if (!deco) return;
        eraserMode = false;
        eraserBtn.classList.remove('active');
        clearSelection();

        const touch = e.touches[0];
        const startX = touch.clientX;
        const startY = touch.clientY;
        let didDrag = false;

        const onTouchMove = te => {
          const t = te.touches[0];
          const dx = t.clientX - startX;
          const dy = t.clientY - startY;
          if (Math.hypot(dx, dy) > 8 && !isDragging) {
            didDrag = true;
            document.removeEventListener('touchmove', onTouchMove);
            document.removeEventListener('touchend', onTouchEnd);
            const fakeEvent = { touches: [{ clientX: t.clientX, clientY: t.clientY }] };
            startDrag(fakeEvent, 'deco', deco, btn);
          }
        };
        const onTouchEnd = te => {
          document.removeEventListener('touchmove', onTouchMove);
          document.removeEventListener('touchend', onTouchEnd);
          if (!didDrag && !isDragging) {
            playSelect();
            vibe(8);
            selectedDeco = deco;
            selectedColor = null;
            document.querySelectorAll('.deco-btn.selected').forEach(el => el.classList.remove('selected'));
            btn.classList.add('selected');
            hintText.textContent = '💡 Tap a painted nail!';
          }
        };
        document.addEventListener('touchmove', onTouchMove, { passive: true });
        document.addEventListener('touchend', onTouchEnd);
      }, { passive: true });

      // Touch global drag events
      document.addEventListener('touchmove', e => {
        if (isDragging) {
          moveDrag(e);
        }
      }, { passive: true });

      document.addEventListener('touchend', e => {
        if (isDragging) {
          endDrag(e);
        }
      });

      // ─── Nail tap (for tap-mode & eraser) ───
      nailAreas.forEach(area => {
        area.addEventListener('pointerdown', e => {
          if (isDragging) return; // Already handled by drag
          e.preventDefault();
          const idx = parseInt(area.dataset.nail, 10);
          onNailTap(idx);
        });
      });

      // ─── Keyboard ───
      window.addEventListener('keydown', e => {
        if (!gameActive) {
          if (e.key === 'Enter' || e.key === ' ') {
            if (!titleScreen.classList.contains('hidden')) {
              playBtn.click();
            } else if (!resultScreen.classList.contains('hidden')) {
              resultNext.click();
            }
          }
          return;
        }

        // Number keys 1-5 for selecting nail (direct)
        if (e.key >= '1' && e.key <= '5') {
          const idx = parseInt(e.key, 10) - 1;
          if (idx < nails.length) {
            onNailTap(idx);
          }
        }
        // 'E' for eraser
        if (e.key === 'e' || e.key === 'E') {
          eraserBtn.click();
        }
        // 'C' for clear all
        if (e.key === 'c' || e.key === 'C') {
          clearBtn.click();
        }
        // 'Esc' to clear selection
        if (e.key === 'Escape') {
          clearSelection();
          eraserMode = false;
          eraserBtn.classList.remove('active');
          hintText.textContent = '💡 Drag colors onto nails!';
        }
      });

      // ─── Buttons ───
      playBtn.addEventListener('click', () => {
        try { getAudio(); } catch (_) {}
        initLevel();
      });

      eraserBtn.addEventListener('click', () => {
        playSelect();
        vibe(10);
        eraserMode = !eraserMode;
        eraserBtn.classList.toggle('active', eraserMode);
        if (eraserMode) {
          clearSelection();
          hintText.textContent = '🧽 Tap a nail to erase its color & decoration!';
        } else {
          hintText.textContent = '💡 Drag colors onto nails!';
        }
      });

      clearBtn.addEventListener('click', () => {
        playEraser();
        vibe(20);
        nails.forEach(n => { n.color = null; n.deco = null; });
        score = 0;
        renderNails();
        hintText.textContent = '🗑️ All nails cleared! Start fresh!';
      });
    }

    // ═══ Init ═══
    function init() {
      titleHigh.textContent = highScore;
      titleLevel.textContent = `${LEVELS[0].name}`;

      bindEvents();
      showScreen(titleScreen);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }

  })();
  </script>
</body>
</html>
