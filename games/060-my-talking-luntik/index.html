<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#f8f5f0">
<title>My Talking Luntik</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/games/shared/game-frame.css">
<style>
/* My Talking Luntik — feed, bathe, tell stories! */
:root {
  --bg: #f8f5f0;
  --bg-screen: #fdfcf9;
  --surface: rgba(255,255,255,0.85);
  --text: #3d352c;
  --text-dim: #8a7e72;
  --text-muted: #b5aaa0;
  --primary: #e8925a;
  --primary-dark: #d47a42;
  --primary-glow: rgba(232,146,90,0.3);
  --accent-warm: #e8b06a;
  --accent-feed: #7cb87a;
  --accent-bathe: #6a9fcf;
  --accent-story: #e8a06a;
  --gold: #d4a84b;
  --danger: #d9756a;
  --success: #7cb87a;
  --font-display: 'Outfit', system-ui, sans-serif;
  --font-body: 'Inter', system-ui, sans-serif;
  --font-serif: 'Source Serif 4', Georgia, serif;
  --radius-sm: 10px;
  --radius-md: 16px;
  --radius-lg: 24px;
  --radius-xl: 32px;
  --safe-t: env(safe-area-inset-top, 0px);
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-l: env(safe-area-inset-left, 0px);
  --safe-r: env(safe-area-inset-right, 0px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  touch-action: manipulation;
  user-select: none; -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}
#app { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }

/* Screen System */
.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: opacity 0.45s ease, transform 0.45s ease;
  will-change: opacity, transform;
  z-index: 1;
  padding: var(--safe-t) 0 var(--safe-b);
}
.screen.hidden {
  opacity: 0; pointer-events: none; transform: scale(0.96);
  z-index: 0;
}

/* TITLE SCREEN */
.title-screen {
  background: linear-gradient(180deg, #fdf6ef 0%, #f8edd9 50%, #f3e0cc 100%);
  gap: 8px; padding: 40px 24px 32px;
}
.title-screen::before {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 180px 120px at 50% 20%, rgba(232,146,90,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 120px 80px at 20% 75%, rgba(232,176,106,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 100px 70px at 80% 70%, rgba(212,168,75,0.05) 0%, transparent 60%);
  pointer-events: none;
}
.title-eyebrow {
  font-family: 'Outfit', sans-serif;
  font-size: 11px; font-weight: 600; letter-spacing: 0.12em;
  color: var(--text-muted); text-transform: uppercase;
  position: relative; z-index: 1; margin-bottom: 4px;
}
.title-text {
  font-family: var(--font-serif);
  font-size: 40px; font-weight: 700; line-height: 1.15;
  color: var(--text); text-align: center;
  position: relative; z-index: 1;
}
.title-text .accent { color: var(--primary); }
.title-sub {
  font-size: 15px; color: var(--text-dim);
  text-align: center; max-width: 280px; line-height: 1.5;
  position: relative; z-index: 1; margin-bottom: 4px;
}
.title-best {
  font-family: var(--font-body);
  font-size: 13px; color: var(--text-muted);
  margin-bottom: 12px; position: relative; z-index: 1;
}
.title-best span { color: var(--gold); font-weight: 600; }

/* Luntik Pet (CSS-only) */
.luntik {
  position: relative; width: 140px; height: 150px;
  margin-bottom: 16px; flex-shrink: 0;
  animation: breathe 3s ease-in-out infinite;
}
@keyframes breathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}
@media (prefers-reduced-motion: reduce) {
  .luntik { animation: none; }
}
.luntik .ear {
  position: absolute; width: 36px; height: 36px;
  background: radial-gradient(circle at 45% 40%, #f0c9a8, #e8b89a);
  border-radius: 50%; top: -4px; z-index: 0;
}
.luntik .ear-l { left: 10px; }
.luntik .ear-r { right: 10px; }
.luntik .head {
  position: absolute; inset: 8px 0 0; border-radius: 50%;
  background: radial-gradient(circle at 40% 35%, #f5d4b8, #eac4a0);
  z-index: 1; box-shadow: inset -6px -4px rgba(210,170,130,0.3);
}
.luntik .eye {
  position: absolute; width: 16px; height: 18px;
  background: #3d352c; border-radius: 50%;
  top: 48px; z-index: 2;
}
.luntik .eye::after {
  content: ''; position: absolute;
  width: 5px; height: 5px;
  background: white; border-radius: 50%;
  top: 3px; left: 3px;
}
.luntik .eye-l { left: 34px; }
.luntik .eye-r { right: 34px; }
.luntik .mouth {
  position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
  width: 22px; height: 11px;
  border-bottom: 3px solid #c49570;
  border-radius: 0 0 14px 14px; z-index: 2;
  transition: border-radius 0.3s;
}
.luntik .blush {
  position: absolute; width: 20px; height: 13px;
  background: rgba(232,146,90,0.25);
  border-radius: 50%; top: 62px; z-index: 1;
}
.luntik .blush-l { left: 14px; }
.luntik .blush-r { right: 14px; }

/* Mood states */
.luntik.sad .mouth { border-radius: 14px 14px 0 0; border-bottom: none; border-top: 3px solid #c49570; }
.luntik.sad .eye { width: 14px; height: 14px; top: 50px; }
.luntik.happy .mouth { width: 26px; height: 13px; border-bottom-width: 4px; }
.luntik.love .eye { width: 18px; height: 18px; }
.luntik.love .eye::after { width: 6px; height: 6px; }
.luntik .sparkle {
  display: none; position: absolute; width: 8px; height: 8px;
  background: var(--gold); border-radius: 50%;
  animation: sparkle 1.2s ease-in-out infinite;
}
@keyframes sparkle {
  0%, 100% { opacity: 0; transform: scale(0.5); }
  50% { opacity: 0.8; transform: scale(1.2); }
}
.luntik.love .sparkle { display: block; }
.luntik.love .sparkle:nth-child(1) { top: 0; left: -10px; animation-delay: 0s; }
.luntik.love .sparkle:nth-child(2) { top: -8px; right: -5px; animation-delay: 0.4s; }
.luntik.love .sparkle:nth-child(3) { bottom: 10px; left: -8px; animation-delay: 0.8s; }

/* Action Feedback */
.luntik.feed-reaction { animation: feedBounce 0.5s ease; }
@keyframes feedBounce {
  0% { transform: scale(1); }
  30% { transform: scale(1.12) rotate(-3deg); }
  60% { transform: scale(1.06) rotate(2deg); }
  100% { transform: scale(1) rotate(0); }
}
.luntik.bathe-reaction { animation: batheShake 0.5s ease; }
@keyframes batheShake {
  0%, 100% { transform: scale(1); }
  20% { transform: scale(1.05) translateX(-4px); }
  40% { transform: scale(1.05) translateX(4px); }
  60% { transform: scale(1.05) translateX(-2px); }
  80% { transform: scale(1.05) translateX(2px); }
}
.luntik.story-reaction { animation: storyFloat 0.6s ease; }
@keyframes storyFloat {
  0% { transform: scale(1) translateY(0); }
  50% { transform: scale(1.08) translateY(-6px); }
  100% { transform: scale(1) translateY(0); }
}

.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 14px 36px; border: none; border-radius: 50px;
  font-family: var(--font-display); font-size: 17px; font-weight: 700;
  cursor: pointer; transition: all 0.15s ease;
  position: relative; z-index: 1;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.94); }
.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff; box-shadow: 0 4px 20px var(--primary-glow);
}
.btn-primary:hover { box-shadow: 0 6px 28px var(--primary-glow); }
.btn-secondary {
  background: var(--surface); color: var(--text);
  border: 1px solid rgba(61,53,44,0.15);
}
.btn-secondary:active { background: rgba(255,255,255,0.7); }

/* GAME SCREEN */
.game-screen {
  background: var(--bg-screen);
  padding: 0 16px;
  justify-content: flex-start;
}
.game-hud {
  width: 100%; max-width: 420px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 4px 4px;
  flex-shrink: 0;
}
.game-timer {
  font-family: 'Outfit', sans-serif;
  font-size: 18px; font-weight: 700; color: var(--text-dim);
}
.game-timer.warning { color: var(--danger); animation: pulse 0.5s ease-in-out infinite alternate; }
@keyframes pulse {
  from { opacity: 1; } to { opacity: 0.5; }
}
.game-score-label {
  font-size: 14px; font-weight: 600; color: var(--text-dim);
}

.friend-bar-wrap {
  width: 100%; max-width: 420px; flex-shrink: 0;
  padding: 6px 0 2px;
}
.friend-labels {
  display: flex; justify-content: space-between;
  font-size: 10px; font-weight: 500; color: var(--text-muted);
  padding: 0 2px; margin-bottom: 4px;
}
.friend-track {
  width: 100%; height: 12px;
  background: rgba(61,53,44,0.08);
  border-radius: 10px; overflow: hidden;
  position: relative;
}
.friend-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, #b5dab3, var(--accent-feed), var(--accent-warm), var(--primary));
  border-radius: 10px; transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.mood-text {
  font-family: var(--font-serif);
  font-size: 15px; font-style: italic;
  color: var(--text-dim);
  text-align: center;
  padding: 4px 0 2px; min-height: 28px;
  flex-shrink: 0;
  transition: opacity 0.3s;
}

/* Game Pet Area */
.game-pet-area {
  flex: 1; display: flex; align-items: center; justify-content: center;
  position: relative; width: 100%; max-width: 420px;
  min-height: 200px;
}
.game-pet-area .luntik {
  width: 180px; height: 190px;
}

/* Floating labels */
.float-label {
  position: absolute; left: 50%; transform: translateX(-50%);
  font-family: var(--font-serif);
  font-size: 30px; font-weight: 700;
  color: var(--success);
  opacity: 0; pointer-events: none;
  top: 15px;
}
.float-label.show {
  animation: floatUp 0.8s ease-out forwards;
}
@keyframes floatUp {
  0% { opacity: 1; transform: translateX(-50%) translateY(0) scale(0.8); }
  50% { opacity: 1; transform: translateX(-50%) translateY(-15px) scale(1.1); }
  100% { opacity: 0; transform: translateX(-50%) translateY(-40px) scale(1); }
}

/* Emoji particles */
.particle-container {
  position: absolute; inset: 0; pointer-events: none;
  overflow: hidden;
}
.particle {
  position: absolute; font-size: 20px;
  pointer-events: none;
  animation: particleFly 0.9s ease-out forwards;
}
@keyframes particleFly {
  0% { opacity: 1; transform: translate(0, 0) scale(1) rotate(0deg); }
  100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.3) rotate(360deg); }
}

/* Action Buttons */
.action-row {
  width: 100%; max-width: 420px;
  display: flex; gap: 10px;
  padding: 8px 0 16px;
  flex-shrink: 0;
}
.action-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 14px 8px 12px;
  border: none; border-radius: var(--radius-md);
  background: rgba(61,53,44,0.04);
  cursor: pointer; transition: transform 0.12s, background 0.2s, box-shadow 0.2s;
  font-family: var(--font-body);
  position: relative;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.action-btn:active { transform: scale(0.92); }
.action-btn:focus-visible { outline: 3px solid var(--primary); outline-offset: 2px; }
.action-btn .icon { font-size: 28px; line-height: 1; }
.action-btn .label { font-size: 13px; font-weight: 600; color: var(--text); }
.action-btn .pill {
  font-size: 9px; font-weight: 700; padding: 2px 8px;
  border-radius: 10px; color: #fff;
}
.action-btn.feed .pill { background: var(--accent-feed); }
.action-btn.feed:active { background: rgba(124,184,122,0.15); }
.action-btn.bathe .pill { background: var(--accent-bathe); }
.action-btn.bathe:active { background: rgba(106,159,207,0.15); }
.action-btn.story .pill { background: var(--accent-story); }
.action-btn.story:active { background: rgba(232,160,106,0.15); }

/* RESULT SCREEN */
.result-screen {
  background: linear-gradient(180deg, #fdf6ef 0%, #f8edd9 50%, #f3e0cc 100%);
  gap: 6px; padding: 40px 24px 32px;
}
.result-screen::before {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 200px 140px at 50% 30%, rgba(232,146,90,0.10) 0%, transparent 60%),
    radial-gradient(ellipse 120px 80px at 30% 70%, rgba(212,168,75,0.06) 0%, transparent 60%);
  pointer-events: none;
}
.result-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 16px; border-radius: 20px;
  font-size: 12px; font-weight: 700; position: relative; z-index: 1;
}
.result-badge.win { background: rgba(124,184,122,0.2); color: #4a7c48; }
.result-badge.lose { background: rgba(217,117,106,0.15); color: #b56055; }
.result-title {
  font-family: var(--font-serif);
  font-size: 34px; font-weight: 700;
  color: var(--text); text-align: center;
  position: relative; z-index: 1;
}
.result-score {
  font-family: var(--font-serif);
  font-size: 60px; font-weight: 700;
  color: var(--primary); position: relative; z-index: 1;
}
.result-score-label {
  font-size: 14px; color: var(--text-dim);
  position: relative; z-index: 1; margin-bottom: 4px;
}
.result-best {
  font-size: 13px; color: var(--text-muted);
  padding: 8px 16px; background: var(--surface);
  border-radius: var(--radius-sm);
  position: relative; z-index: 1;
}
.result-best span { color: var(--gold); font-weight: 600; }
.result-actions {
  display: flex; flex-direction: column; gap: 10px;
  width: 100%; max-width: 240px;
  position: relative; z-index: 1;
}
.result-tip {
  font-family: var(--font-body);
  font-size: 11px; color: var(--text-muted);
  text-align: center; position: relative; z-index: 1;
}
.result-tip.unlock { color: var(--gold); font-weight: 600; }

/* Confetti (CSS-only) */
.confetti-container {
  position: fixed; inset: 0; pointer-events: none; z-index: 10;
  overflow: hidden;
}
.confetti {
  position: absolute; width: 10px; height: 10px;
  opacity: 0; top: -10px;
  animation: confettiFall 2.5s ease-in forwards;
}
@keyframes confettiFall {
  0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
  100% { opacity: 0; transform: translateY(100vh) rotate(720deg) scale(0.5); }
}

/* Responsive */
@media (max-width: 420px) {
  .title-text { font-size: 32px; }
  .result-title { font-size: 28px; }
  .result-score { font-size: 48px; }
  .luntik { width: 120px; height: 130px; }
  .game-pet-area .luntik { width: 150px; height: 160px; }
  .game-pet-area { min-height: 170px; }
  .action-btn { padding: 10px 6px 10px; }
  .action-btn .icon { font-size: 24px; }
}
@media (min-width: 600px) {
  .screen { max-width: 480px; margin: 0 auto; border-radius: 0; }
}
</style>
</head>
<body>
<div id="app">

  <!-- TITLE SCREEN -->
  <div class="screen title-screen" id="screen-title" role="main" aria-label="游戏标题">
    <div class="title-eyebrow">Astrocade · Pet</div>
    <div class="luntik" id="luntik-title" aria-hidden="true">
      <div class="ear ear-l"></div>
      <div class="ear ear-r"></div>
      <div class="head"></div>
      <div class="eye eye-l"></div>
      <div class="eye eye-r"></div>
      <div class="mouth"></div>
      <div class="blush blush-l"></div>
      <div class="blush blush-r"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
    </div>
    <div class="title-text">My Talking <span class="accent">Luntik</span></div>
    <div class="title-sub">养一只小宠物，喂食洗澡讲故事</div>
    <div class="title-best" id="title-best">🏆 最高记录: <span id="best-display">0</span></div>
    <button class="btn btn-primary" id="btn-start" aria-label="开始游戏">开始游戏</button>
  </div>

  <!-- GAME SCREEN -->
  <div class="screen game-screen hidden" id="screen-game" role="main" aria-label="游戏主界面">
    <div class="game-hud">
      <span class="game-timer" id="game-timer">3:00</span>
      <span class="game-score-label" id="game-score-label">❤️ 0 / 100</span>
    </div>
    <div class="friend-bar-wrap">
      <div class="friend-labels">
        <span>Shy</span><span>Neutral</span><span>Happy</span><span>Love!</span>
      </div>
      <div class="friend-track">
        <div class="friend-fill" id="friend-fill" style="width:0%"></div>
      </div>
    </div>
    <div class="mood-text" id="mood-text">Luntik 在等你陪它玩~</div>
    <div class="game-pet-area">
      <div class="luntik" id="luntik-game" aria-hidden="true">
        <div class="ear ear-l"></div>
        <div class="ear ear-r"></div>
        <div class="head"></div>
        <div class="eye eye-l"></div>
        <div class="eye eye-r"></div>
        <div class="mouth"></div>
        <div class="blush blush-l"></div>
        <div class="blush blush-r"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
      </div>
      <div class="float-label" id="float-label"></div>
      <div class="particle-container" id="particle-container"></div>
    </div>
    <div class="action-row">
      <button class="action-btn feed" id="btn-feed" aria-label="喂食 Feed">
        <span class="icon">🍼</span>
        <span class="label">Feed</span>
        <span class="pill">+5-8</span>
      </button>
      <button class="action-btn bathe" id="btn-bathe" aria-label="洗澡 Bathe">
        <span class="icon">🛁</span>
        <span class="label">Bathe</span>
        <span class="pill">+3-6</span>
      </button>
      <button class="action-btn story" id="btn-story" aria-label="讲故事 Story">
        <span class="icon">📖</span>
        <span class="label">Story</span>
        <span class="pill">+4-7</span>
      </button>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div class="screen result-screen hidden" id="screen-result" role="main" aria-label="结算界面">
    <div class="result-badge" id="result-badge">🎉 通关成功</div>
    <div class="result-title" id="result-title">Luntik 满级啦！</div>
    <div class="result-score" id="result-score">100</div>
    <div class="result-score-label" id="result-score-label">友好度</div>
    <div class="result-best" id="result-best">🏆 最高记录 <span>100</span></div>
    <div class="result-actions">
      <button class="btn btn-primary" id="btn-replay">再来一局</button>
      <button class="btn btn-secondary" id="btn-home">返回首页</button>
    </div>
    <div class="result-tip" id="result-tip">新装扮已解锁 · 试试小游戏</div>
  </div>

</div>

<script>
(function(){
  'use strict';

  const GAME_DURATION = 180;
  const MAX_FRIENDLINESS = 100;
  const STORAGE_KEY = 'luntik_best';
  const $ = (id) => document.getElementById(id);
  const screens = {
    title: $('screen-title'),
    game: $('screen-game'),
    result: $('screen-result'),
  };
  const luntikGame = $('luntik-game');
  const friendFill = $('friend-fill');
  const moodText = $('mood-text');
  const timerEl = $('game-timer');
  const scoreLabel = $('game-score-label');
  const floatLabel = $('float-label');
  const particleContainer = $('particle-container');

  let friendliness = 0;
  let timeLeft = GAME_DURATION;
  let timerInterval = null;
  let isPlaying = false;
  let isResult = false;
  let bestRecord = 0;
  let gamesPlayed = 0;
  let wins = 0;
  let audioCtx = null;

  const MOODS = [
    { range: [0, 19],  cls: 'sad',   text: 'Luntik 有点饿了...',        emoji: '\u{1F342}' },
    { range: [20, 39], cls: 'sad',   text: 'Luntik 想要你陪陪它~',     emoji: '\u{1F97A}' },
    { range: [40, 59], cls: '',      text: 'Luntik 感觉不错~',          emoji: '\u{1F60A}' },
    { range: [60, 79], cls: 'happy', text: 'Luntik 好开心！',            emoji: '\u{1F604}' },
    { range: [80, 99], cls: 'love',  text: 'Luntik 超喜欢你 \u2764\uFE0F', emoji: '\u{1F970}' },
    { range: [100],    cls: 'love',  text: 'Luntik 满级啦！',           emoji: '\u{1F389}' },
  ];

  const ACTIONS = {
    feed:  { range: [5, 8],  cls: 'feed-reaction',  particles: ['\u{1F37C}','\u{1F36A}','\u{1F34E}'],  emoji: '\u{1F37C}' },
    bathe: { range: [3, 6],  cls: 'bathe-reaction', particles: ['\u{1F4A7}','\u{1FAEB}','\u2728'],  emoji: '\u{1F6C1}' },
    story: { range: [4, 7],  cls: 'story-reaction', particles: ['\u2B50','\u{1F31F}','\u{1F4AB}'], emoji: '\u{1F4D6}' },
  };

  function loadRecord() {
    try {
      const data = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if (data) {
        bestRecord = data.bestScore || 0;
        gamesPlayed = data.gamesPlayed || 0;
        wins = data.wins || 0;
      }
    } catch (e) { /* ignore */ }
  }
  function saveRecord() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        bestScore: bestRecord,
        gamesPlayed: gamesPlayed,
        wins: wins,
      }));
    } catch (e) { /* ignore */ }
  }

  function getAudioCtx() {
    if (!audioCtx) {
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      } catch (e) { return null; }
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function playTone(freq, duration, type) {
    var ctx = getAudioCtx();
    if (!ctx) return;
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + duration);
  }

  function playClick() { playTone(600, 0.08, 'sine'); }
  function playFeed() {
    var ctx = getAudioCtx();
    if (!ctx) return;
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(400, ctx.currentTime);
    osc.frequency.linearRampToValueAtTime(800, ctx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.12, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 0.2);
  }
  function playBathe() {
    var ctx = getAudioCtx();
    if (!ctx) return;
    var bufferSize = Math.floor(ctx.sampleRate * 0.15);
    var buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    var data = buffer.getChannelData(0);
    for (var i = 0; i < bufferSize; i++) data[i] = Math.random() * 0.08;
    var source = ctx.createBufferSource();
    source.buffer = buffer;
    var gain = ctx.createGain();
    gain.gain.setValueAtTime(0.08, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    source.connect(gain); gain.connect(ctx.destination);
    source.start();
  }
  function playStory() {
    var ctx = getAudioCtx();
    if (!ctx) return;
    [523, 659, 784].forEach(function(freq, i) {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.type = 'sine';
      var t = ctx.currentTime + i * 0.1;
      osc.frequency.setValueAtTime(freq, t);
      gain.gain.setValueAtTime(0.1, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t); osc.stop(t + 0.2);
    });
  }
  function playWin() {
    var ctx = getAudioCtx();
    if (!ctx) return;
    [523, 659, 784, 1047].forEach(function(freq, i) {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.type = 'sine';
      var t = ctx.currentTime + i * 0.15;
      osc.frequency.setValueAtTime(freq, t);
      gain.gain.setValueAtTime(0.15, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t); osc.stop(t + 0.3);
    });
  }

  function vibrate(duration) {
    try { if (navigator.vibrate) navigator.vibrate(duration || 20); } catch (e) { /* ignore */ }
  }

  function getMood(val) {
    for (var i = 0; i < MOODS.length; i++) {
      var m = MOODS[i];
      var lastIdx = m.range.length - 1;
      if (val >= (m.range[0] || 0) && val <= (m.range[lastIdx] || MAX_FRIENDLINESS)) return m;
    }
    return MOODS[0];
  }

  function updatePetMood(val, el) {
    if (!el) el = luntikGame;
    el.classList.remove('sad', 'happy', 'love');
    var mood = getMood(val);
    if (mood.cls) el.classList.add(mood.cls);
  }

  function updateUI(val) {
    var pct = Math.min(MAX_FRIENDLINESS, Math.max(0, val));
    friendFill.style.width = pct + '%';
    scoreLabel.textContent = '\u2764\uFE0F ' + Math.round(pct) + ' / 100';
    var mood = getMood(pct);
    moodText.textContent = mood.text;
    updatePetMood(pct, luntikGame);
  }

  function spawnParticles(emojis, count) {
    for (var i = 0; i < count; i++) {
      var el = document.createElement('div');
      el.className = 'particle';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = (30 + Math.random() * 40) + '%';
      el.style.top = (20 + Math.random() * 30) + '%';
      el.style.setProperty('--tx', (Math.random() * 80 - 40) + 'px');
      el.style.setProperty('--ty', (-50 - Math.random() * 40) + 'px');
      el.style.animationDuration = (0.6 + Math.random() * 0.4) + 's';
      particleContainer.appendChild(el);
      setTimeout(function() { el.remove(); }, 1200);
    }
  }

  function spawnConfetti() {
    var container = document.createElement('div');
    container.className = 'confetti-container';
    var colors = ['#e8925a','#d4a84b','#7cb87a','#6a9fcf','#e8b06a','#d9756a'];
    for (var i = 0; i < 40; i++) {
      var el = document.createElement('div');
      el.className = 'confetti';
      el.style.left = Math.random() * 100 + '%';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      el.style.width = (6 + Math.random() * 8) + 'px';
      el.style.height = (6 + Math.random() * 8) + 'px';
      el.style.animationDelay = Math.random() * 1.5 + 's';
      el.style.animationDuration = (2 + Math.random() * 1) + 's';
      container.appendChild(el);
    }
    document.body.appendChild(container);
    setTimeout(function() { container.remove(); }, 4000);
  }

  function showScreen(name) {
    for (var key in screens) {
      screens[key].classList.toggle('hidden', key !== name);
    }
  }

  function performAction(type) {
    if (!isPlaying || isResult) return;
    var action = ACTIONS[type];
    if (!action) return;

    var gain = action.range[0] + Math.floor(Math.random() * (action.range[1] - action.range[0] + 1));
    friendliness = Math.min(MAX_FRIENDLINESS, friendliness + gain);

    updateUI(friendliness);

    luntikGame.classList.remove('feed-reaction', 'bathe-reaction', 'story-reaction');
    void luntikGame.offsetWidth;
    luntikGame.classList.add(action.cls);

    floatLabel.textContent = '+' + gain;
    floatLabel.classList.remove('show');
    void floatLabel.offsetWidth;
    floatLabel.classList.add('show');

    spawnParticles(action.particles, 3);

    if (type === 'feed') playFeed();
    else if (type === 'bathe') playBathe();
    else if (type === 'story') playStory();
    vibrate(15);

    if (friendliness >= MAX_FRIENDLINESS) endGame(true);
  }

  function updateTimerDisplay() {
    var mins = Math.floor(timeLeft / 60);
    var secs = timeLeft % 60;
    timerEl.textContent = mins + ':' + (secs < 10 ? '0' : '') + secs;
    timerEl.classList.toggle('warning', timeLeft <= 30);
  }

  function startTimer() {
    timeLeft = GAME_DURATION;
    updateTimerDisplay();
    timerInterval = setInterval(function() {
      timeLeft--;
      updateTimerDisplay();
      if (timeLeft <= 0) endGame(false);
    }, 1000);
  }

  function stopTimer() {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  }

  function endGame(won) {
    if (isResult) return;
    isResult = true;
    isPlaying = false;
    stopTimer();

    gamesPlayed++;
    if (won) wins++;

    var finalScore = Math.round(friendliness);
    if (finalScore > bestRecord) bestRecord = finalScore;
    saveRecord();

    if (won) { playWin(); spawnConfetti(); }

    var badge = $('result-badge');
    var title = $('result-title');
    var score = $('result-score');
    var scoreLbl = $('result-score-label');
    var best = $('result-best');
    var tip = $('result-tip');

    if (won) {
      badge.className = 'result-badge win';
      badge.textContent = '\u{1F389} \u901A\u5173\u6210\u529F';
      title.textContent = 'Luntik \u6EE1\u7EA7\u5566\uFF01';
      scoreLbl.textContent = '\u53CB\u597D\u5EA6 \u00B7 \u6EE1\u7EA7';
      tip.textContent = '\u65B0\u88C5\u626E\u5DF2\u89E3\u9501 \u00B7 \u8BD5\u8BD5\u5C0F\u6E38\u620F';
      tip.className = 'result-tip unlock';
    } else {
      badge.className = 'result-badge lose';
      badge.textContent = '\u23F0 \u65F6\u95F4\u5230';
      title.textContent = '\u4E0B\u6B21\u518D\u52A0\u6CB9\uFF01';
      scoreLbl.textContent = '\u5F53\u524D\u53CB\u597D\u5EA6';
      tip.textContent = '\u591A\u5582\u98DF\u6D17\u6FA1\u8BB2\u6545\u4E8B\uFF0CLuntik \u4F1A\u66F4\u5F00\u5FC3~';
      tip.className = 'result-tip';
    }

    score.textContent = finalScore;
    best.innerHTML = '\u{1F3C6} \u6700\u9AD8\u8BB0\u5F55 <span>' + bestRecord + '</span> \u00B7 \u6E38\u73A9 <span>' + gamesPlayed + '</span> \u5C40';

    showScreen('result');
  }

  function startGame() {
    isResult = false;
    isPlaying = true;
    friendliness = 0;
    updateUI(0);
    updatePetMood(0, $('luntik-title'));
    timerEl.classList.remove('warning');
    particleContainer.innerHTML = '';
    getAudioCtx();
    showScreen('game');
    startTimer();
    playClick();
    vibrate(10);
  }

  function handleKeydown(e) {
    var key = e.key;
    if (key === '1') { e.preventDefault(); performAction('feed'); }
    else if (key === '2') { e.preventDefault(); performAction('bathe'); }
    else if (key === '3') { e.preventDefault(); performAction('story'); }
  }

  function init() {
    loadRecord();
    $('best-display').textContent = bestRecord;
    showScreen('title');
    $('btn-start').addEventListener('click', startGame);
    $('btn-feed').addEventListener('click', function() { performAction('feed'); });
    $('btn-bathe').addEventListener('click', function() { performAction('bathe'); });
    $('btn-story').addEventListener('click', function() { performAction('story'); });
    $('btn-replay').addEventListener('click', startGame);
    $('btn-home').addEventListener('click', function() {
      showScreen('title');
      isResult = false;
      isPlaying = false;
      updatePetMood(0, $('luntik-title'));
      $('best-display').textContent = bestRecord;
    });
    document.addEventListener('keydown', handleKeydown);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
