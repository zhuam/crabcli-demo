<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d7a34"/>
      <stop offset="100%" stop-color="#2d5a27"/>
    </linearGradient>
    <linearGradient id="slimeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#58d68d"/>
      <stop offset="100%" stop-color="#2ecc71"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="320" height="200" fill="url(#bg)"/>

  <!-- Path (zigzag) -->
  <rect x="0" y="80" width="60" height="20" fill="#c4a87a" rx="3"/>
  <rect x="60" y="40" width="20" height="60" fill="#c4a87a" rx="3"/>
  <rect x="60" y="40" width="80" height="20" fill="#c4a87a" rx="3"/>
  <rect x="140" y="40" width="20" height="90" fill="#c4a87a" rx="3"/>
  <rect x="140" y="110" width="80" height="20" fill="#c4a87a" rx="3"/>
  <rect x="220" y="60" width="20" height="70" fill="#c4a87a" rx="3"/>
  <rect x="220" y="60" width="70" height="20" fill="#c4a87a" rx="3"/>

  <!-- Castle -->
  <rect x="275" y="55" width="35" height="40" fill="#c0392b" rx="3"/>
  <polygon points="272,55 292,35 312,55" fill="#922b21"/>
  <rect x="285" y="75" width="14" height="18" fill="#5a1a1a" rx="2"/>
  <rect x="283" y="62" width="5" height="6" fill="#f1c40f" rx="1"/>
  <rect x="297" y="62" width="5" height="6" fill="#f1c40f" rx="1"/>
  <rect x="292" y="40" width="3" height="15" fill="#922b21"/>
  <polygon points="292,38 305,47 292,50" fill="#e74c3c"/>

  <!-- Tower 1: Arrow (bottom) -->
  <rect x="45" y="125" width="24" height="28" fill="#636e72" rx="4"/>
  <rect x="50" y="118" width="14" height="12" fill="#2ecc71" rx="3"/>
  <text x="57" y="141" font-size="14" text-anchor="middle">🏹</text>

  <!-- Tower 2: Cannon (top) -->
  <rect x="165" y="10" width="24" height="28" fill="#636e72" rx="4"/>
  <rect x="168" y="5" width="18" height="10" fill="#e67e22" rx="3"/>
  <text x="177" y="26" font-size="14" text-anchor="middle">💣</text>

  <!-- Tower 3: Ice (middle) -->
  <rect x="96" y="90" width="24" height="28" fill="#636e72" rx="4"/>
  <rect x="98" y="83" width="20" height="12" fill="#74b9ff" rx="3"/>
  <text x="108" y="106" font-size="14" text-anchor="middle">❄️</text>

  <!-- Slimes on path -->
  <!-- Green slime -->
  <ellipse cx="30" cy="90" rx="12" ry="10" fill="#2ecc71"/>
  <ellipse cx="24" cy="84" rx="6" ry="5" fill="rgba(255,255,255,0.2)"/>
  <circle cx="26" cy="89" r="3" fill="#fff"/>
  <circle cx="34" cy="89" r="3" fill="#fff"/>
  <circle cx="27" cy="89" r="1.5" fill="#1a1a2e"/>
  <circle cx="35" cy="89" r="1.5" fill="#1a1a2e"/>

  <!-- Blue slime (fast) -->
  <ellipse cx="95" cy="50" rx="10" ry="8" fill="#3498db"/>
  <circle cx="91" cy="49" r="2.5" fill="#fff"/>
  <circle cx="99" cy="49" r="2.5" fill="#fff"/>
  <circle cx="92" cy="49" r="1.2" fill="#1a1a2e"/>
  <circle cx="100" cy="49" r="1.2" fill="#1a1a2e"/>

  <!-- Purple slime (tough) -->
  <ellipse cx="185" cy="50" rx="14" ry="12" fill="#9b59b6"/>
  <circle cx="179" cy="49" r="3.5" fill="#fff"/>
  <circle cx="191" cy="49" r="3.5" fill="#fff"/>
  <circle cx="180" cy="49" r="1.8" fill="#fff"/>
  <circle cx="192" cy="49" r="1.8" fill="#fff"/>

  <!-- Boss slime -->
  <ellipse cx="245" cy="70" rx="16" ry="14" fill="#e74c3c"/>
  <text x="245" y="62" font-size="10" text-anchor="middle">👑</text>
  <circle cx="239" cy="69" r="4" fill="#fff"/>
  <circle cx="251" cy="69" r="4" fill="#fff"/>
  <circle cx="240" cy="69" r="2" fill="#f1c40f"/>
  <circle cx="252" cy="69" r="2" fill="#f1c40f"/>

  <!-- Title overlay -->
  <rect x="0" y="165" width="320" height="35" fill="rgba(0,0,0,0.5)"/>
  <text x="160" y="188" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">🛡️ Slime Siege · 塔防</text>

  <!-- Decorative stars -->
  <circle cx="20" cy="15" r="2" fill="#f1c40f" opacity="0.3"/>
  <circle cx="270" cy="20" r="1.5" fill="#f1c40f" opacity="0.4"/>
  <circle cx="150" cy="180" r="2" fill="#f1c40f" opacity="0.2"/>
</svg>