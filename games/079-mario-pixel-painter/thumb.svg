<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" rx="16" fill="#0f0c29"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a103c"/>
      <stop offset="100%" stop-color="#0f0c29"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e52521"/>
      <stop offset="100%" stop-color="#fbd000"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  <!-- Pixel grid background -->
  <g opacity="0.06">
    <line x1="0" y1="40" x2="200" y2="40" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="200" y2="80" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="200" y2="120" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="200" y2="160" stroke="#fff" stroke-width="0.5"/>
    <line x1="40" y1="0" x2="40" y2="200" stroke="#fff" stroke-width="0.5"/>
    <line x1="80" y1="0" x2="80" y2="200" stroke="#fff" stroke-width="0.5"/>
    <line x1="120" y1="0" x2="120" y2="200" stroke="#fff" stroke-width="0.5"/>
    <line x1="160" y1="0" x2="160" y2="200" stroke="#fff" stroke-width="0.5"/>
  </g>
  <!-- Mushroom pixel art (center) -->
  <rect x="72" y="56" width="16" height="16" rx="2" fill="#e52521"/>
  <rect x="88" y="56" width="16" height="16" rx="2" fill="#e52521"/>
  <rect x="104" y="56" width="16" height="16" rx="2" fill="#e52521"/>
  <rect x="56" y="72" width="16" height="16" rx="2" fill="#e52521"/>
  <rect x="72" y="72" width="16" height="16" rx="2" fill="#6b4400"/>
  <rect x="88" y="72" width="16" height="16" rx="2" fill="#6b4400"/>
  <rect x="104" y="72" width="16" height="16" rx="2" fill="#6b4400"/>
  <rect x="120" y="72" width="16" height="16" rx="2" fill="#e52521"/>
  <rect x="56" y="88" width="16" height="16" rx="2" fill="#e52521"/>
  <rect x="72" y="88" width="16" height="16" rx="2" fill="#ffffff"/>
  <rect x="88" y="88" width="16" height="16" rx="2" fill="#ffffff"/>
  <rect x="104" y="88" width="16" height="16" rx="2" fill="#ffffff"/>
  <rect x="120" y="88" width="16" height="16" rx="2" fill="#e52521"/>
  <rect x="56" y="104" width="16" height="16" rx="2" fill="#e52521"/>
  <rect x="72" y="104" width="16" height="16" rx="2" fill="#ffffff"/>
  <rect x="88" y="104" width="16" height="16" rx="2" fill="#ffffff"/>
  <rect x="104" y="104" width="16" height="16" rx="2" fill="#ffffff"/>
  <rect x="120" y="104" width="16" height="16" rx="2" fill="#e52521"/>
  <rect x="72" y="120" width="16" height="16" rx="2" fill="#e52521"/>
  <rect x="88" y="120" width="16" height="16" rx="2" fill="#e52521"/>
  <rect x="104" y="120" width="16" height="16" rx="2" fill="#e52521"/>
  <!-- Palette dots -->
  <circle cx="28" cy="168" r="6" fill="#e52521"/>
  <circle cx="48" cy="168" r="6" fill="#049d10"/>
  <circle cx="68" cy="168" r="6" fill="#fbd000"/>
  <circle cx="88" cy="168" r="6" fill="#0051a8"/>
  <circle cx="108" cy="168" r="6" fill="#6b4400"/>
  <circle cx="128" cy="168" r="6" fill="#ffffff" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <circle cx="148" cy="168" r="6" fill="#000000" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <circle cx="168" cy="168" r="6" fill="#fbb040"/>
  <!-- Selected color ring -->
  <circle cx="68" cy="168" r="9" stroke="#fbd000" stroke-width="2" fill="none"/>
  <!-- Title -->
  <text x="100" y="34" text-anchor="middle" font-family="'Outfit',Helvetica,sans-serif" font-size="13" font-weight="800" fill="#fbd000">MARIO PIXEL</text>
  <text x="100" y="194" text-anchor="middle" font-family="'Inter',sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">PAINTER</text>
  <!-- 1UP label -->
  <rect x="84" y="140" width="32" height="14" rx="4" fill="rgba(255,255,255,0.06)"/>
  <text x="100" y="151" text-anchor="middle" font-family="'Inter',sans-serif" font-size="7" fill="rgba(255,255,255,0.25)">1UP</text>
  <!-- Stars -->
  <text x="160" y="28" font-size="10" fill="#fbd000" opacity="0.3">⭐</text>
  <text x="26" y="22" font-size="8" fill="#fbd000" opacity="0.2">⭐</text>
</svg>
