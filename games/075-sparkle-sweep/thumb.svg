<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1025"/>
      <stop offset="50%" stop-color="#2d1b4e"/>
      <stop offset="100%" stop-color="#1a1a4e"/>
    </linearGradient>
    <linearGradient id="dirt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B7D6B"/>
      <stop offset="100%" stop-color="#6B5D4B"/>
    </linearGradient>
    <linearGradient id="clean" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="50%" stop-color="#7EC850"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="320" height="180" fill="url(#bg)" rx="12"/>

  <!-- Dirt square -->
  <rect x="60" y="30" width="200" height="120" fill="url(#dirt)" rx="8"/>

  <!-- Clean reveal area (diagonal wipe) -->
  <clipPath id="wipe">
    <polygon points="60,150 260,150 260,80 180,30 60,30"/>
  </clipPath>
  <g clip-path="url(#wipe)">
    <rect x="60" y="30" width="200" height="120" fill="url(#clean)" rx="8"/>
    <!-- Scene emojis -->
    <text x="100" y="70" font-size="18">🌻</text>
    <text x="200" y="65" font-size="16">🌸</text>
    <text x="140" y="95" font-size="14">🦋</text>
    <text x="220" y="110" font-size="16">🌺</text>
    <text x="90" y="120" font-size="15">🌷</text>
    <text x="170" y="130" font-size="13">🐝</text>
  </g>

  <!-- Sparkles on cleaned area -->
  <text x="130" y="60" font-size="14" fill="#fff" filter="url(#glow)" opacity="0.9">✨</text>
  <text x="210" y="90" font-size="10" fill="#fff" filter="url(#glow)" opacity="0.7">⭐</text>
  <text x="95" y="100" font-size="11" fill="#fff" filter="url(#glow)" opacity="0.8">✨</text>

  <!-- Broom emoji -->
  <text x="270" y="160" font-size="28" filter="url(#glow)">🧹</text>

  <!-- Title text -->
  <text x="160" y="175" font-family="system-ui, sans-serif" font-size="16" font-weight="800" fill="#f0edf5" text-anchor="middle" letter-spacing="1">Sparkle Sweep</text>

  <!-- Stars -->
  <text x="72" y="18" font-size="8" fill="#ffd700" opacity="0.6">✦</text>
  <text x="290" y="22" font-size="10" fill="#fd79a8" opacity="0.5">✦</text>
  <text x="35" y="42" font-size="7" fill="#fff" opacity="0.4">✦</text>
  <text x="310" y="60" font-size="6" fill="#fff" opacity="0.3">✦</text>
</svg>
