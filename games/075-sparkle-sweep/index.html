<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#1a1a2e" />
  <title>Sparkle Sweep</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../games/shared/game-frame.css" />
  <style>
    /* ═══════════════════════════════════════════════════════
       Sparkle Sweep — Swipe to clean, reveal the beauty!
       ═══════════════════════════════════════════════════════ */

    :root {
      --bg-deep: #1a1a2e;
      --bg-mid: #16213e;
      --surface: rgba(255,255,255,0.07);
      --surface-hover: rgba(255,255,255,0.12);
      --border: rgba(255,255,255,0.10);
      --border-strong: rgba(255,255,255,0.20);
      --text: #f0f0f0;
      --text-dim: rgba(255,255,255,0.55);
      --text-muted: rgba(255,255,255,0.30);
      --gold: #FFD700;
      --cyan: #4dd0e1;
      --coral: #ff6b9d;
      --purple: #a29bfe;
      --green: #00e676;
      --font-display: 'Outfit', system-ui, sans-serif;
      --font-body: 'Inter', system-ui, sans-serif;
      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 24px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg-deep);
      color: var(--text);
      font-family: var(--font-body);
      overflow: hidden;
      height: 100%; width: 100%;
      user-select: none; -webkit-user-select: none;
      touch-action: none; -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }

    #app { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }

    /* ═══ Screens ═══ */
    .screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center;
      transition: opacity 0.4s ease, transform 0.4s ease;
      will-change: opacity, transform;
    }
    .screen.hidden {
      opacity: 0; pointer-events: none; transform: scale(0.96);
    }

    /* ═══════════════════════════════
       TITLE SCREEN
       ═══════════════════════════════ */
    .title-screen {
      justify-content: center; gap: 12px;
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      padding: 24px;
    }
    .title-screen::before {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 140px 70px at 25% 30%, rgba(77,208,225,0.10) 0%, transparent 70%),
        radial-gradient(ellipse 120px 90px at 75% 25%, rgba(255,215,0,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 90px 60px at 50% 80%, rgba(255,107,157,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .title-icon {
      font-size: 72px; line-height: 1;
      filter: drop-shadow(0 0 30px rgba(77,208,225,0.35));
      animation: titleFloat 3s ease-in-out infinite;
      position: relative; z-index: 1;
    }
    @keyframes titleFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-10px) scale(1.03); }
    }

    .title-text {
      font-family: var(--font-display); font-size: 40px; font-weight: 900;
      background: linear-gradient(135deg, #4dd0e1, #FFD700, #a29bfe);
      background-size: 300% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradSweep 4s ease infinite;
      line-height: 1.1; text-align: center;
      position: relative; z-index: 1;
    }
    @keyframes gradSweep {
      0%, 100% { background-position: 0% center; }
      50% { background-position: 100% center; }
    }

    .title-sub {
      font-size: 14px; color: var(--text-dim);
      text-align: center; max-width: 300px; line-height: 1.6;
      position: relative; z-index: 1;
    }
    .title-high {
      font-family: var(--font-body); font-size: 14px; color: var(--text-muted);
      position: relative; z-index: 1;
    }
    .title-high span { color: var(--gold); }

    /* ─── Buttons ─── */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 36px; border: none; border-radius: 50px;
      font-family: var(--font-display); font-size: 18px; font-weight: 700;
      cursor: pointer; transition: all 0.2s ease;
      position: relative; z-index: 1;
    }
    .btn:active { transform: scale(0.95); }
    .btn-primary {
      background: linear-gradient(135deg, #4dd0e1, #a29bfe);
      color: #fff; box-shadow: 0 4px 20px rgba(77,208,225,0.35);
    }
    .btn-primary:hover { box-shadow: 0 6px 28px rgba(77,208,225,0.5); transform: translateY(-2px); }
    .btn-primary:active { transform: scale(0.95) translateY(0); }
    .btn-secondary {
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border-strong);
    }
    .btn-secondary:hover { background: var(--surface-hover); }
    .btn-sm { padding: 10px 24px; font-size: 14px; }

    /* ═══════════════════════════════
       PLAY SCREEN
       ═══════════════════════════════ */
    .play-screen {
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
      padding: 8px;
      justify-content: flex-start;
    }

    .play-top {
      width: 100%; max-width: 420px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 4px; position: relative; z-index: 5;
    }
    .play-level {
      font-family: var(--font-display); font-size: 15px; font-weight: 700;
      color: var(--cyan);
    }
    .play-stat {
      display: flex; align-items: center; gap: 12px;
    }
    .play-stat-item {
      font-family: var(--font-body); font-size: 13px; font-weight: 600;
      color: var(--text-dim);
    }
    .play-stat-item span { color: var(--gold); }

    .play-progress-bar {
      width: 100%; max-width: 420px; height: 6px;
      background: var(--surface); border-radius: 3px;
      overflow: hidden; margin: 4px 0; position: relative; z-index: 5;
    }
    .play-progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--cyan), var(--green));
      border-radius: 3px; transition: width 0.15s ease;
    }

    /* ─── Canvas Area ─── */
    .canvas-wrap {
      position: relative;
      width: min(400px, 92vw);
      aspect-ratio: 1;
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: 0 0 40px rgba(77,208,225,0.06), 0 8px 32px rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      z-index: 3;
    }
    .canvas-wrap canvas {
      display: block; width: 100%; height: 100%;
      touch-action: none;
      cursor: crosshair;
    }

    #dirtCanvas,
    #revealCanvas { position: absolute; top: 0; left: 0; }

    /* ─── Brush Size Toggle ─── */
    .brush-section {
      display: flex; align-items: center; gap: 8px;
      width: 100%; max-width: 420px;
      justify-content: center; margin-top: 8px;
      position: relative; z-index: 5;
    }
    .brush-label {
      font-size: 11px; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .brush-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: 2px solid var(--border); background: var(--surface);
      cursor: pointer; transition: all 0.15s ease;
      display: flex; align-items: center; justify-content: center;
    }
    .brush-btn:hover { background: var(--surface-hover); }
    .brush-btn.selected {
      border-color: var(--cyan);
      background: rgba(77,208,225,0.12);
      box-shadow: 0 0 10px rgba(77,208,225,0.25);
    }
    .brush-sml { width: 18px; height: 18px; border-radius: 50%; background: var(--text-dim); }
    .brush-med { width: 28px; height: 28px; border-radius: 50%; background: var(--text-dim); }
    .brush-lrg { width: 38px; height: 38px; border-radius: 50%; background: var(--text-dim); }

    /* ─── Hint ─── */
    .hint-text {
      font-size: 12px; color: var(--text-muted);
      text-align: center; margin-top: 4px;
      position: relative; z-index: 5;
    }

    /* ═══════════════════════════════
       RESULT SCREEN
       ═══════════════════════════════ */
    .result-screen {
      justify-content: center; gap: 14px; text-align: center;
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      padding: 24px;
    }
    .result-screen::before {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 160px 80px at 30% 30%, rgba(77,208,225,0.10) 0%, transparent 70%),
        radial-gradient(ellipse 130px 100px at 70% 60%, rgba(255,215,0,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .result-icon {
      font-size: 72px; line-height: 1;
      position: relative; z-index: 1;
      animation: resultPop 0.6s ease-out;
    }
    @keyframes resultPop {
      0% { transform: scale(0) rotate(-20deg); opacity: 0; }
      60% { transform: scale(1.2) rotate(5deg); }
      100% { transform: scale(1) rotate(0); opacity: 1; }
    }

    .result-title {
      font-family: var(--font-display); font-size: 32px; font-weight: 900;
      position: relative; z-index: 1;
    }
    .result-title.win {
      background: linear-gradient(135deg, #4dd0e1, #FFD700);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .result-title.lose {
      color: var(--text-dim);
    }

    .result-details {
      font-size: 14px; color: var(--text-dim); line-height: 1.7;
      position: relative; z-index: 1;
    }
    .result-details span { color: var(--gold); font-weight: 700; }

    .result-best {
      font-size: 13px; color: var(--text-muted);
      position: relative; z-index: 1;
    }
    .result-best span { color: var(--gold); }

    .result-new-best {
      color: var(--cyan); font-weight: 700; font-size: 14px;
      animation: pulseBest 0.8s ease-in-out infinite alternate;
      position: relative; z-index: 1;
    }
    @keyframes pulseBest {
      0% { opacity: 0.5; transform: scale(1); }
      100% { opacity: 1; transform: scale(1.1); }
    }

    .result-btns {
      display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
      position: relative; z-index: 1;
    }

    /* ═══ Misc ═══ */
    .mute-btn {
      width: 40px; height: 40px; border: none; border-radius: 50%;
      background: var(--surface); font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      position: fixed; top: 12px; right: 12px; z-index: 10001;
      transition: background 0.15s ease; color: var(--text);
    }
    .mute-btn:hover { background: var(--surface-hover); }
    .mute-btn:focus-visible { outline: 2px solid var(--cyan); outline-offset: 2px; }

    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }

    /* ═══ Responsive ═══ */
    @media (max-width: 480px) {
      .title-text { font-size: 30px; }
      .title-icon { font-size: 56px; }
      .result-title { font-size: 26px; }
      .result-icon { font-size: 56px; }
      .play-stat-item { font-size: 11px; }
    }
    @media (max-height: 640px) {
      .canvas-wrap { width: min(320px, 80vw); }
      .title-text { font-size: 26px; }
      .title-icon { font-size: 44px; }
    }
  </style>
</head>
<body>
  <div id="app">

    <!-- ═══ MUTE BUTTON ═══ -->
    <button class="mute-btn" id="muteBtn" aria-label="Toggle sound" aria-pressed="false">🔊</button>

    <!-- ═══ BACK TO HUB ═══ -->
    <a href="/" class="back-to-hub" onclick="window.recordPlayed&&window.recordPlayed('sparkle-sweep')" aria-label="Back to hub">&larr; Hub</a>

    <!-- ═══ TITLE SCREEN ═══ -->
    <div id="titleScreen" class="screen title-screen">
      <div class="title-icon">✨🧹</div>
      <h1 class="title-text">Sparkle<br/>Sweep</h1>
      <p class="title-sub">Swipe to clean the grime away<br/>and reveal the sparkling scene!</p>
      <div style="height:4px"></div>
      <button id="startBtn" class="btn btn-primary">🧹 Start Sweeping!</button>
      <div class="title-high">🏆 Best Score: <span id="titleBest">0</span></div>
    </div>

    <!-- ═══ PLAY SCREEN ═══ -->
    <div id="playScreen" class="screen play-screen hidden">
      <div class="play-top">
        <span class="play-level" id="levelDisplay">🌸 Garden</span>
        <div class="play-stat">
          <span class="play-stat-item">⏱ <span id="timerDisplay">0:00</span></span>
          <span class="play-stat-item">⭐ <span id="scoreDisplay">0</span></span>
        </div>
      </div>

      <div class="play-progress-bar">
        <div class="play-progress-fill" id="progressFill"></div>
      </div>

      <div class="canvas-wrap" id="canvasWrap">
        <canvas id="revealCanvas" width="400" height="400"></canvas>
        <canvas id="dirtCanvas" width="400" height="400"></canvas>
      </div>

      <div class="brush-section">
        <span class="brush-label">Brush:</span>
        <button class="brush-btn selected" data-size="18" aria-label="Small brush"><div class="brush-sml"></div></button>
        <button class="brush-btn" data-size="32" aria-label="Medium brush"><div class="brush-med"></div></button>
        <button class="brush-btn" data-size="50" aria-label="Large brush"><div class="brush-lrg"></div></button>
      </div>

      <div class="hint-text" id="hintText">💡 Swipe across the screen to clean!</div>
    </div>

    <!-- ═══ RESULT SCREEN ═══ -->
    <div id="resultScreen" class="screen result-screen hidden">
      <div class="result-icon" id="resultIcon">✨</div>
      <h2 class="result-title" id="resultTitle">All Clean!</h2>
      <div class="result-details" id="resultDetails">
        You cleaned <span>100%</span> of the grime!<br/>
        ⭐ Score: <span id="resultScore">0</span>
      </div>
      <div class="result-new-best hidden" id="resultNewBest">🌟 New Best Score! 🌟</div>
      <div class="result-best">🏆 Best: <span id="resultBest">0</span></div>
      <div class="result-btns">
        <button id="resultNextBtn" class="btn btn-primary">➡️ Next Scene</button>
        <button id="resultRetryBtn" class="btn btn-secondary">🔄 Retry</button>
      </div>
    </div>

    <!-- ═══ ARIA LIVE ═══ -->
    <div class="sr-only" role="status" aria-live="polite" id="ariaLive">Sparkle Sweep</div>

  </div>

  <script>
  (function(){
    'use strict';

    /* ═══════════════════════════════════════════════════════
       SPARKLE SWEEP — Swipe to clean, reveal the beauty!
       ═══════════════════════════════════════════════════════ */

    // ─── DOM refs ───
    var $ = function(id) { return document.getElementById(id); };
    var titleScreen = $('titleScreen');
    var playScreen  = $('playScreen');
    var resultScreen = $('resultScreen');
    var startBtn    = $('startBtn');
    var levelDisplay = $('levelDisplay');
    var timerDisplay = $('timerDisplay');
    var scoreDisplay = $('scoreDisplay');
    var progressFill = $('progressFill');
    var hintText    = $('hintText');
    var revealCanvas = $('revealCanvas');
    var dirtCanvas  = $('dirtCanvas');
    var canvasWrap  = $('canvasWrap');
    var resultIcon  = $('resultIcon');
    var resultTitle = $('resultTitle');
    var resultDetails = $('resultDetails');
    var resultScore = $('resultScore');
    var resultBest  = $('resultBest');
    var resultNewBest = $('resultNewBest');
    var resultNextBtn = $('resultNextBtn');
    var resultRetryBtn = $('resultRetryBtn');
    var titleBest   = $('titleBest');
    var muteBtn     = $('muteBtn');
    var ariaLive    = $('ariaLive');

    var revealCtx = revealCanvas.getContext('2d');
    var dirtCtx = dirtCanvas.getContext('2d');

    var brushBtns = document.querySelectorAll('.brush-btn');

    // ─── Constants ───
    var CANVAS_SIZE = 400;
    var MAX_GAME_SEC = 180; // 3 minutes
    var STORAGE_KEY = 'sparkleSweep_best';
    var PROGRESS_KEY = 'sparkleSweep_progress';

    // ─── Scenes ───
    var SCENES = [
      {
        name: '🌸 Garden',
        desc: 'A peaceful garden',
        sceneKey: 'garden',
        // We draw the scenes procedurally
      },
      {
        name: '🌊 Beach',
        desc: 'Sandy beach at sunset',
        sceneKey: 'beach',
      },
      {
        name: '🏔 Mountains',
        desc: 'Snowy mountain peaks',
        sceneKey: 'mountains',
      },
      {
        name: '🌃 City Night',
        desc: 'City skyline at night',
        sceneKey: 'city',
      },
      {
        name: '🌌 Starry Sky',
        desc: 'Galaxy and stars',
        sceneKey: 'starry',
      },
    ];

    // ─── State ───
    var muted = localStorage.getItem('sparkleSweep_muted') === 'true';
    var highScore = 0;
    var currentLevel = 0;
    var score = 0;
    var cleanPixels = 0;
    var totalDirtPixels = 0;
    var brushSize = 18;
    var gameActive = false;
    var gamePhase = 'TITLE'; // TITLE | PLAYING | RESULT
    var elapsedMs = 0;
    var timerInterval = null;
    var animFrameId = null;
    var isDrawing = false;
    var lastPointerX = -1;
    var lastPointerY = -1;
    var sparkles = [];
    var preferReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    // Audio
    var audioCtx = null;
    var lastSoundTime = 0;

    // ─── Load / Save ───
    function loadHighScore() {
      try {
        return parseInt(localStorage.getItem(STORAGE_KEY)) || 0;
      } catch(_) { return 0; }
    }
    function saveHighScore(val) {
      try {
        var cur = loadHighScore();
        if (val > cur) {
          localStorage.setItem(STORAGE_KEY, String(val));
          return true;
        }
        return false;
      } catch(_) { return false; }
    }

    function loadProgress() {
      try {
        var p = parseInt(localStorage.getItem(PROGRESS_KEY)) || 0;
        return Math.min(p, SCENES.length - 1);
      } catch(_) { return 0; }
    }
    function saveProgress(level) {
      try {
        var cur = loadProgress();
        if (level > cur) {
          localStorage.setItem(PROGRESS_KEY, String(level));
        }
      } catch(_) {}
    }

    function recordPlayed() {
      try {
        var recent = JSON.parse(localStorage.getItem('recentlyPlayed') || '[]');
        var filtered = recent.filter(function(p) { return p.id !== 'sparkle-sweep'; });
        filtered.unshift({ id: 'sparkle-sweep', playedAt: Date.now() });
        localStorage.setItem('recentlyPlayed', JSON.stringify(filtered.slice(0, 10)));
      } catch(_) {}
    }

    // ─── Audio ───
    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playTone(freq, dur, type, vol) {
      if (muted || !audioCtx) return;
      try {
        var now = audioCtx.currentTime;
        if (now - lastSoundTime < 0.04) return;
        lastSoundTime = now;
        var osc = audioCtx.createOscillator();
        var gain = audioCtx.createGain();
        osc.type = type || 'sine';
        osc.frequency.setValueAtTime(freq, now);
        gain.gain.setValueAtTime(Math.min(vol || 0.1, 0.15), now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + (dur || 0.1));
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + (dur || 0.1));
      } catch(_) {}
    }

    function playClean() {
      playTone(700 + Math.random() * 400, 0.06, 'sine', 0.06);
    }
    function playComplete() {
      [523, 659, 784, 1047, 1319].forEach(function(f, i) {
        setTimeout(function() { playTone(f, 0.18, 'sine', 0.10); }, i * 100);
      });
    }
    function playNewBest() {
      [659, 784, 1047, 1319, 1568].forEach(function(f, i) {
        setTimeout(function() { playTone(f, 0.2, 'triangle', 0.10); }, i * 80);
      });
    }
    function playTimeout() {
      playTone(300, 0.3, 'sawtooth', 0.08);
      setTimeout(function() { playTone(200, 0.4, 'sawtooth', 0.08); }, 200);
    }

    function vibrate(ms) {
      try { if (navigator.vibrate) navigator.vibrate(ms); } catch(_) {}
    }

    // ─── Mute ───
    muteBtn.addEventListener('click', function() {
      muted = !muted;
      localStorage.setItem('sparkleSweep_muted', String(muted));
      muteBtn.textContent = muted ? '🔇' : '🔊';
      muteBtn.setAttribute('aria-pressed', String(muted));
      if (!muted) ensureAudio();
    });
    function updateMuteBtn() {
      muteBtn.textContent = muted ? '🔇' : '🔊';
      muteBtn.setAttribute('aria-pressed', String(muted));
    }
    updateMuteBtn();

    // ─── Screens ───
    function showScreen(screen) {
      [titleScreen, playScreen, resultScreen].forEach(function(s) {
        s.classList.add('hidden');
      });
      screen.classList.remove('hidden');
    }

    // ─── Procedural Scene Drawing ───
    function drawScene(ctx, sceneKey) {
      ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

      switch (sceneKey) {
        // ── Garden ──
        case 'garden': {
          // Sky gradient
          var skyGrad = ctx.createLinearGradient(0, 0, 0, 250);
          skyGrad.addColorStop(0, '#87CEEB');
          skyGrad.addColorStop(1, '#E0F7FA');
          ctx.fillStyle = skyGrad;
          ctx.fillRect(0, 0, CANVAS_SIZE, 250);

          // Grass
          var grassGrad = ctx.createLinearGradient(0, 220, 0, CANVAS_SIZE);
          grassGrad.addColorStop(0, '#66BB6A');
          grassGrad.addColorStop(0.5, '#4CAF50');
          grassGrad.addColorStop(1, '#388E3C');
          ctx.fillStyle = grassGrad;
          ctx.fillRect(0, 220, CANVAS_SIZE, 180);

          // Sun
          ctx.fillStyle = '#FFF176';
          ctx.beginPath();
          ctx.arc(340, 60, 40, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#FFF9C4';
          ctx.beginPath();
          ctx.arc(340, 60, 30, 0, Math.PI * 2);
          ctx.fill();

          // Clouds
          drawCloud(ctx, 60, 50, 1);
          drawCloud(ctx, 200, 35, 0.8);

          // Flowers
          var flowerColors = ['#E91E63', '#FF5722', '#FF9800', '#9C27B0', '#FF4081'];
          for (var i = 0; i < 14; i++) {
            var fx = 20 + i * 28 + (i % 3) * 6;
            var fy = 300 + (i % 5) * 15 + Math.sin(i * 1.5) * 10;
            drawFlower(ctx, fx, fy, flowerColors[i % flowerColors.length], 6 + (i % 3));
          }

          // Butterfly
          ctx.fillStyle = '#FF80AB';
          ctx.beginPath();
          ctx.ellipse(180, 140, 8, 5, -0.3, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#FF4081';
          ctx.beginPath();
          ctx.ellipse(188, 140, 8, 5, 0.3, 0, Math.PI * 2);
          ctx.fill();

          break;
        }

        // ── Beach ──
        case 'beach': {
          // Sky
          var skyG = ctx.createLinearGradient(0, 0, 0, 200);
          skyG.addColorStop(0, '#FF9A9E');
          skyG.addColorStop(0.5, '#FECFEF');
          skyG.addColorStop(1, '#FFF8E1');
          ctx.fillStyle = skyG;
          ctx.fillRect(0, 0, CANVAS_SIZE, 220);

          // Sun
          ctx.fillStyle = '#FF6F00';
          ctx.beginPath();
          ctx.arc(310, 90, 45, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#FFB74D';
          ctx.beginPath();
          ctx.arc(310, 90, 36, 0, Math.PI * 2);
          ctx.fill();

          // Ocean
          var oceanG = ctx.createLinearGradient(0, 170, 0, 260);
          oceanG.addColorStop(0, '#4FC3F7');
          oceanG.addColorStop(0.5, '#29B6F6');
          oceanG.addColorStop(1, '#0288D1');
          ctx.fillStyle = oceanG;
          ctx.fillRect(0, 170, CANVAS_SIZE, 90);

          // Waves
          ctx.strokeStyle = 'rgba(255,255,255,0.3)';
          ctx.lineWidth = 2;
          for (var w = 0; w < 4; w++) {
            ctx.beginPath();
            var wy = 175 + w * 18;
            for (var wx = 0; wx <= CANVAS_SIZE; wx += 10) {
              var wy2 = wy + Math.sin((wx + w * 30) * 0.05) * 4;
              wx === 0 ? ctx.moveTo(wx, wy2) : ctx.lineTo(wx, wy2);
            }
            ctx.stroke();
          }

          // Sand
          var sandG = ctx.createLinearGradient(0, 240, 0, CANVAS_SIZE);
          sandG.addColorStop(0, '#FFE082');
          sandG.addColorStop(0.5, '#FFD54F');
          sandG.addColorStop(1, '#FFCA28');
          ctx.fillStyle = sandG;
          ctx.fillRect(0, 240, CANVAS_SIZE, 160);

          // Shells
          var shellX = [50, 150, 250, 350, 100, 300];
          for (var s = 0; s < shellX.length; s++) {
            ctx.fillStyle = '#FFF8E1';
            ctx.beginPath();
            ctx.arc(shellX[s], 310 + (s % 3) * 20, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#FFCC80';
            ctx.beginPath();
            ctx.arc(shellX[s] - 2, 308 + (s % 3) * 20, 2, 0, Math.PI * 2);
            ctx.fill();
          }

          // Palm tree
          drawPalm(ctx, 60, 230);
          drawPalm(ctx, 340, 260);

          break;
        }

        // ── Mountains ──
        case 'mountains': {
          // Sky
          var skyM = ctx.createLinearGradient(0, 0, 0, CANVAS_SIZE);
          skyM.addColorStop(0, '#1A237E');
          skyM.addColorStop(0.3, '#3949AB');
          skyM.addColorStop(0.5, '#5C6BC0');
          skyM.addColorStop(0.7, '#7986CB');
          skyM.addColorStop(1, '#C5CAE9');
          ctx.fillStyle = skyM;
          ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

          // Stars
          for (var st = 0; st < 40; st++) {
            ctx.fillStyle = 'rgba(255,255,255,' + (0.4 + Math.random() * 0.6) + ')';
            ctx.beginPath();
            ctx.arc(Math.random() * CANVAS_SIZE, Math.random() * 120, 1 + Math.random() * 1.5, 0, Math.PI * 2);
            ctx.fill();
          }

          // Moon
          ctx.fillStyle = '#FFF9C4';
          ctx.beginPath();
          ctx.arc(300, 60, 30, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = skyM;
          ctx.beginPath();
          ctx.arc(312, 54, 26, 0, Math.PI * 2);
          ctx.fill();

          // Mountains (back)
          ctx.fillStyle = '#37474F';
          ctx.beginPath();
          ctx.moveTo(0, 300);
          for (var mx = 0; mx <= CANVAS_SIZE; mx += 20) {
            ctx.lineTo(mx, 180 + Math.sin(mx * 0.015) * 60 + Math.sin(mx * 0.03) * 30);
          }
          ctx.lineTo(CANVAS_SIZE, 300);
          ctx.closePath();
          ctx.fill();

          // Mountains (front)
          ctx.fillStyle = '#455A64';
          ctx.beginPath();
          ctx.moveTo(0, 350);
          for (var mx2 = 0; mx2 <= CANVAS_SIZE; mx2 += 20) {
            ctx.lineTo(mx2, 220 + Math.sin(mx2 * 0.02) * 50 + Math.sin(mx2 * 0.04) * 20);
          }
          ctx.lineTo(CANVAS_SIZE, 350);
          ctx.closePath();
          ctx.fill();

          // Snow caps
          ctx.fillStyle = '#ECEFF1';
          ctx.beginPath();
          ctx.moveTo(0, 300);
          for (var sx = 0; sx <= CANVAS_SIZE; sx += 20) {
            var sy = 180 + Math.sin(sx * 0.015) * 60 + Math.sin(sx * 0.03) * 30;
            if (sy < 210) {
              ctx.lineTo(sx, sy);
            }
            ctx.lineTo(sx, sy);
          }
          ctx.closePath();
          ctx.fill();

          // Lake
          var lakeG = ctx.createLinearGradient(0, 320, 0, 390);
          lakeG.addColorStop(0, '#42A5F5');
          lakeG.addColorStop(1, '#1565C0');
          ctx.fillStyle = lakeG;
          ctx.beginPath();
          ctx.ellipse(200, 360, 120, 30, 0, 0, Math.PI * 2);
          ctx.fill();

          // Trees
          drawTree(ctx, 30, 270);
          drawTree(ctx, 370, 280);

          break;
        }

        // ── City Night ──
        case 'city': {
          // Night sky
          var skyC = ctx.createLinearGradient(0, 0, 0, CANVAS_SIZE);
          skyC.addColorStop(0, '#0D0D2B');
          skyC.addColorStop(0.3, '#1A1A3E');
          skyC.addColorStop(0.6, '#2D2D5E');
          skyC.addColorStop(1, '#0D0D2B');
          ctx.fillStyle = skyC;
          ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

          // Stars
          for (var st2 = 0; st2 < 50; st2++) {
            ctx.fillStyle = 'rgba(255,255,255,' + (0.3 + Math.random() * 0.7) + ')';
            ctx.beginPath();
            ctx.arc(Math.random() * CANVAS_SIZE, Math.random() * 150, 1 + Math.random(), 0, Math.PI * 2);
            ctx.fill();
          }

          // Moon
          ctx.fillStyle = '#E0E0E0';
          ctx.beginPath();
          ctx.arc(320, 40, 25, 0, Math.PI * 2);
          ctx.fill();

          // Buildings
          var buildingColors = ['#1B5E20', '#2E7D32', '#0D47A1', '#1565C0', '#4A148C', '#311B92', '#B71C1C', '#E65100'];
          var buildingHeights = [180, 220, 150, 260, 200, 140, 280, 190, 170, 230, 160, 250, 210, 180];
          var bw = 28;
          for (var b = 0; b < buildingHeights.length; b++) {
            var bx = b * bw;
            var bh = buildingHeights[b];
            var by = CANVAS_SIZE - bh;
            ctx.fillStyle = buildingColors[b % buildingColors.length];
            ctx.fillRect(bx, by, bw - 2, bh);

            // Windows
            for (var wy = by + 10; wy < CANVAS_SIZE - 10; wy += 20) {
              for (var wx = bx + 4; wx < bx + bw - 6; wx += 8) {
                if (Math.random() > 0.3) {
                  ctx.fillStyle = '#FFD54F';
                } else {
                  ctx.fillStyle = 'rgba(255,213,79,0.2)';
                }
                ctx.fillRect(wx, wy, 5, 7);
              }
            }
          }

          // Ground
          ctx.fillStyle = '#212121';
          ctx.fillRect(0, CANVAS_SIZE - 30, CANVAS_SIZE, 30);

          // Road markings
          ctx.strokeStyle = '#FFD54F';
          ctx.lineWidth = 2;
          ctx.setLineDash([10, 10]);
          ctx.beginPath();
          ctx.moveTo(0, CANVAS_SIZE - 15);
          ctx.lineTo(CANVAS_SIZE, CANVAS_SIZE - 15);
          ctx.stroke();
          ctx.setLineDash([]);

          break;
        }

        // ── Starry Sky / Galaxy ──
        case 'starry': {
          // Deep space gradient
          var galG = ctx.createRadialGradient(200, 200, 20, 200, 200, 250);
          galG.addColorStop(0, '#4A148C');
          galG.addColorStop(0.2, '#1A237E');
          galG.addColorStop(0.5, '#0D0D2B');
          galG.addColorStop(1, '#000011');
          ctx.fillStyle = galG;
          ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

          // Galaxy spiral
          for (var g = 0; g < 200; g++) {
            var t = g / 200;
            var angle = t * 8;
            var dist = t * 180;
            var gx = 200 + Math.cos(angle) * dist;
            var gy = 200 + Math.sin(angle) * dist;
            var alpha = 0.1 + Math.random() * 0.3;
            var size = 1 + Math.random() * 3;
            var hue = 200 + Math.random() * 160;
            ctx.fillStyle = 'hsla(' + hue + ', 80%, 70%, ' + alpha + ')';
            ctx.beginPath();
            ctx.arc(gx, gy, size, 0, Math.PI * 2);
            ctx.fill();
          }

          // Bright stars
          var starPositions = [
            [40, 30, 3], [360, 50, 4], [80, 120, 2], [320, 180, 3], [50, 300, 2],
            [180, 40, 2], [280, 100, 3], [120, 250, 2], [350, 280, 2], [200, 310, 3],
            [60, 350, 2], [300, 340, 2], [150, 150, 3], [250, 220, 2]
          ];
          for (var sp = 0; sp < starPositions.length; sp++) {
            var spd = starPositions[sp];
            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.arc(spd[0], spd[1], spd[2], 0, Math.PI * 2);
            ctx.fill();
            // Glow
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.beginPath();
            ctx.arc(spd[0], spd[1], spd[2] * 2.5, 0, Math.PI * 2);
            ctx.fill();
          }

          // Planet
          ctx.fillStyle = '#FF8A65';
          ctx.beginPath();
          ctx.arc(300, 300, 18, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#FFAB91';
          ctx.beginPath();
          ctx.arc(290, 294, 8, 0, Math.PI * 2);
          ctx.fill();
          // Ring
          ctx.strokeStyle = 'rgba(255,138,101,0.4)';
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.ellipse(300, 300, 30, 6, 0.2, 0, Math.PI * 2);
          ctx.stroke();

          break;
        }
      }
    }

    // ─── Drawing Helpers ───
    function drawCloud(ctx, cx, cy, scale) {
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.beginPath();
      ctx.arc(cx, cy, 20 * scale, 0, Math.PI * 2);
      ctx.arc(cx + 25 * scale, cy - 8 * scale, 18 * scale, 0, Math.PI * 2);
      ctx.arc(cx + 45 * scale, cy, 15 * scale, 0, Math.PI * 2);
      ctx.arc(cx + 22 * scale, cy + 5 * scale, 14 * scale, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawFlower(ctx, x, y, color, size) {
      // Stem
      ctx.strokeStyle = '#388E3C';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x, y + 25);
      ctx.stroke();

      // Petals
      var pcount = 5;
      for (var i = 0; i < pcount; i++) {
        var angle = (i / pcount) * Math.PI * 2 - Math.PI / 2;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.ellipse(x + Math.cos(angle) * size, y + Math.sin(angle) * size, size, size * 0.6, angle, 0, Math.PI * 2);
        ctx.fill();
      }
      // Center
      ctx.fillStyle = '#FFEB3B';
      ctx.beginPath();
      ctx.arc(x, y, size * 0.4, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawPalm(ctx, x, y) {
      // Trunk
      ctx.strokeStyle = '#795548';
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.quadraticCurveTo(x - 10, y - 40, x + 5, y - 80);
      ctx.stroke();

      // Leaves
      ctx.fillStyle = '#4CAF50';
      for (var i = 0; i < 6; i++) {
        var a = (i / 6) * Math.PI * 2 + Math.PI / 2;
        ctx.beginPath();
        ctx.ellipse(x + 5 + Math.cos(a) * 35, y - 80 + Math.sin(a) * 20, 30, 6, a, 0, Math.PI * 2);
        ctx.fill();
      }
      // Coconuts
      ctx.fillStyle = '#5D4037';
      ctx.beginPath();
      ctx.arc(x + 2, y - 75, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x + 8, y - 73, 4, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawTree(ctx, x, y) {
      // Trunk
      ctx.fillStyle = '#5D4037';
      ctx.fillRect(x - 3, y, 6, 40);
      // Foliage
      ctx.fillStyle = '#2E7D32';
      ctx.beginPath();
      ctx.arc(x, y - 5, 20, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#388E3C';
      ctx.beginPath();
      ctx.arc(x - 8, y + 2, 14, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#43A047';
      ctx.beginPath();
      ctx.arc(x + 8, y + 2, 14, 0, Math.PI * 2);
      ctx.fill();
    }

    // ─── Dirt Generation ───
    function generateDirt() {
      var imgData = dirtCtx.createImageData(CANVAS_SIZE, CANVAS_SIZE);
      var data = imgData.data;

      for (var y = 0; y < CANVAS_SIZE; y++) {
        for (var x = 0; x < CANVAS_SIZE; x++) {
          var idx = (y * CANVAS_SIZE + x) * 4;

          // Complex dirt pattern using multiple sine waves + noise
          var n1 = Math.sin(x * 0.04) * Math.sin(y * 0.06) * 0.5 + 0.5;
          var n2 = Math.sin((x + y) * 0.05) * 0.5 + 0.5;
          var n3 = Math.sin(x * 0.1 + y * 0.08) * Math.cos(y * 0.07) * 0.5 + 0.5;
          // Perlin-like layered noise
          var noise = (Math.sin(x * 0.02 + 1.3) + Math.sin(y * 0.025 + 2.7) +
                       Math.sin((x + y) * 0.015 + 0.5)) / 3 * 0.5 + 0.5;
          var n4 = (Math.sin(x * 0.3 + y * 0.25) * 0.5 + 0.5) * 0.3;
          var n5 = (Math.sin(x * 0.5) * Math.cos(y * 0.4) * 0.5 + 0.5) * 0.2;

          var val = Math.min(1, n1 * 0.3 + n2 * 0.2 + n3 * 0.25 + noise * 0.35 + n4 + n5);

          // More dirt at edges (vignette)
          var vx = (x / CANVAS_SIZE - 0.5) * 2;
          var vy = (y / CANVAS_SIZE - 0.5) * 2;
          var vignette = Math.min(1, Math.sqrt(vx * vx + vy * vy) * 0.6);
          val = Math.min(1, val + vignette * 0.3);

          // Clamp to visible threshold
          var alpha = val > 0.1 ? Math.min(255, val * 255) : 0;

          // Brown/gray dirt colors
          var dirtR = 80 + Math.floor(val * 60);
          var dirtG = 60 + Math.floor(val * 50);
          var dirtB = 40 + Math.floor(val * 30);

          data[idx]     = dirtR;   // R
          data[idx + 1] = dirtG;   // G
          data[idx + 2] = dirtB;   // B
          data[idx + 3] = alpha;   // A
        }
      }

      dirtCtx.putImageData(imgData, 0, 0);
      countDirtPixels();
    }

    function countDirtPixels() {
      var imgData = dirtCtx.getImageData(0, 0, CANVAS_SIZE, CANVAS_SIZE);
      var data = imgData.data;
      var count = 0;
      for (var i = 3; i < data.length; i += 4) {
        if (data[i] > 10) count++;
      }
      totalDirtPixels = count;
    }

    // ─── Clean Mechanics ───
    function cleanAt(cx, cy) {
      if (!gameActive || gamePhase !== 'PLAYING') return;

      var radius = brushSize / 2;
      var imgData = dirtCtx.getImageData(0, 0, CANVAS_SIZE, CANVAS_SIZE);
      var data = imgData.data;
      var radSq = radius * radius;
      var cleaned = 0;

      var minX = Math.max(0, Math.floor(cx - radius));
      var maxX = Math.min(CANVAS_SIZE - 1, Math.ceil(cx + radius));
      var minY = Math.max(0, Math.floor(cy - radius));
      var maxY = Math.min(CANVAS_SIZE - 1, Math.ceil(cy + radius));

      for (var y = minY; y <= maxY; y++) {
        for (var x = minX; x <= maxX; x++) {
          var dx = x - cx;
          var dy = y - cy;
          if (dx * dx + dy * dy <= radSq) {
            var idx = (y * CANVAS_SIZE + x) * 4 + 3;
            if (data[idx] > 0) {
              data[idx] = 0;
              cleaned++;
            }
          }
        }
      }

      if (cleaned > 0) {
        dirtCtx.putImageData(imgData, 0, 0);
        cleanPixels += cleaned;

        // Score based on pixels cleaned
        score += Math.round(cleaned / 5);
        scoreDisplay.textContent = score;
        updateProgress();

        // Sound (throttled)
        if (Math.random() < 0.15) playClean();
        vibrate(5);

        // Sparkle particles in cleaned area
        if (!preferReduced) {
          spawnSparkles(cx, cy, Math.min(cleaned / 3, 6));
        }

        // Check win
        var pct = getCleanPercent();
        if (pct >= 100) {
          winGame();
        }
      }
    }

    function getCleanPercent() {
      if (totalDirtPixels === 0) return 100;
      return Math.min(100, Math.floor((cleanPixels / totalDirtPixels) * 100));
    }

    function updateProgress() {
      var pct = getCleanPercent();
      progressFill.style.width = pct + '%';
      ariaLive.textContent = 'Cleaned: ' + pct + '%';
      // Update document title
      document.title = 'Sparkle Sweep — ' + pct + '%';
    }

    // ─── Drawing helper (smooth strokes) ───
    function drawStroke(fromX, fromY, toX, toY) {
      if (!gameActive || gamePhase !== 'PLAYING') return;

      // Interpolate between points for smooth cleaning
      var dist = Math.sqrt((toX - fromX) * (toX - fromX) + (toY - fromY) * (toY - fromY));
      var steps = Math.max(1, Math.ceil(dist / 3));

      for (var i = 0; i <= steps; i++) {
        var t = i / steps;
        var cx = fromX + (toX - fromX) * t;
        var cy = fromY + (toY - fromY) * t;
        cleanAt(cx, cy);
      }
    }

    // ─── Sparkle Particle System ───
    function spawnSparkles(cx, cy, count) {
      for (var i = 0; i < count; i++) {
        var angle = Math.random() * Math.PI * 2;
        var speed = 1 + Math.random() * 2.5;
        sparkles.push({
          x: cx,
          y: cy,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 1,
          life: 1,
          decay: 0.02 + Math.random() * 0.025,
          size: 2 + Math.random() * 3,
          color: ['#FFD700','#4dd0e1','#a29bfe','#00e676','#ff6b9d'][Math.floor(Math.random() * 5)]
        });
      }
    }

    function updateSparkles() {
      if (preferReduced) return;
      // Draw sparkles on the reveal canvas
      for (var i = sparkles.length - 1; i >= 0; i--) {
        var p = sparkles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.03; // gravity
        p.life -= p.decay;
        if (p.life <= 0) { sparkles.splice(i, 1); continue; }

        revealCtx.save();
        revealCtx.globalAlpha = p.life;
        revealCtx.fillStyle = p.color;
        // Draw sparkle as a star shape
        var s = p.size * p.life;
        drawStarShape(revealCtx, p.x, p.y, s * 0.4, s, 4);
        revealCtx.fill();
        revealCtx.restore();
      }
    }

    function drawStarShape(ctx, cx, cy, innerR, outerR, points) {
      ctx.beginPath();
      for (var i = 0; i < points * 2; i++) {
        var r = i % 2 === 0 ? outerR : innerR;
        var angle = (i * Math.PI) / points - Math.PI / 2;
        var x = cx + Math.cos(angle) * r;
        var y = cy + Math.sin(angle) * r;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.closePath();
    }

    // ─── Sparkle animation loop ───
    function sparkleLoop() {
      if (gamePhase !== 'PLAYING' && gamePhase !== 'RESULT') return;
      // We draw sparkles over the reveal canvas (they're additive)
      // Don't clear here — sparkles fade out naturally
      updateSparkles();
      animFrameId = requestAnimationFrame(sparkleLoop);
    }

    // ─── Timer ───
    function startTimer() {
      elapsedMs = 0;
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(function() {
        if (!gameActive || gamePhase !== 'PLAYING') return;
        elapsedMs += 1000;

        var sec = Math.floor(elapsedMs / 1000);
        var min = Math.floor(sec / 60);
        var remainSec = sec % 60;
        timerDisplay.textContent = min + ':' + (remainSec < 10 ? '0' : '') + remainSec;

        // Timeout
        if (sec >= MAX_GAME_SEC) {
          timeoutGame();
        }
      }, 1000);
    }

    function getElapsedSec() {
      return Math.floor(elapsedMs / 1000);
    }

    function fmtTime(sec) {
      var m = Math.floor(sec / 60);
      var s = sec % 60;
      return m + ':' + (s < 10 ? '0' : '') + s;
    }

    // ─── Win / Lose ───
    function winGame() {
      if (gamePhase !== 'PLAYING') return;
      gameActive = false;
      gamePhase = 'RESULT';
      if (timerInterval) clearInterval(timerInterval);

      playComplete();
      vibrate([50, 30, 50, 30, 80]);

      var timeBonus = Math.max(0, MAX_GAME_SEC - getElapsedSec()) * 10;
      var cleanBonus = score;
      var finalScore = cleanBonus + timeBonus * 2;

      var isNewBest = saveHighScore(finalScore);
      if (isNewBest) {
        playNewBest();
        vibrate([30, 20, 30, 20, 50, 20, 80]);
      }

      // Unlock next level
      saveProgress(currentLevel + 1);

      var sceneName = getScene().name;
      resultIcon.textContent = '✨';
      resultTitle.textContent = '✨ All Clean! ✨';
      resultTitle.className = 'result-title win';
      resultDetails.innerHTML = 'You cleaned the <span>' + sceneName + '</span>!<br/>⭐ Score: <span>' + finalScore + '</span>';
      resultScore.textContent = finalScore;
      resultBest.textContent = loadHighScore();
      resultNewBest.classList.toggle('hidden', !isNewBest);

      var isLastLevel = currentLevel >= SCENES.length - 1;
      if (isLastLevel) {
        resultNextBtn.textContent = '🏆 You\'re a Master Sweeper!';
        resultNextBtn.onclick = function() {
          currentLevel = 0;
          startGame();
        };
      } else {
        resultNextBtn.textContent = '➡️ Next Scene';
        resultNextBtn.onclick = function() {
          currentLevel++;
          startGame();
        };
      }
      resultRetryBtn.onclick = function() {
        startGame();
      };

      showScreen(resultScreen);
      document.title = 'Sparkle Sweep — Won!';
    }

    function timeoutGame() {
      if (gamePhase !== 'PLAYING') return;
      gameActive = false;
      gamePhase = 'RESULT';
      if (timerInterval) clearInterval(timerInterval);

      playTimeout();
      vibrate([100, 50, 100]);

      var finalScore = Math.max(0, score);

      var isNewBest = saveHighScore(finalScore);
      if (isNewBest) {
        playNewBest();
      }

      resultIcon.textContent = '⏰';
      resultTitle.textContent = 'Time\'s Up!';
      resultTitle.className = 'result-title lose';
      resultDetails.innerHTML = 'You cleaned <span>' + getCleanPercent() + '%</span> of the scene.<br/>' +
        'Try to clean faster next time!<br/>⭐ Score: <span>' + finalScore + '</span>';
      resultScore.textContent = finalScore;
      resultBest.textContent = loadHighScore();
      resultNewBest.classList.toggle('hidden', !isNewBest);

      resultNextBtn.textContent = '🔄 Try Again';
      resultNextBtn.onclick = function() {
        startGame();
      };
      resultRetryBtn.onclick = function() {
        startGame();
      };

      showScreen(resultScreen);
      document.title = 'Sparkle Sweep — Time\'s Up';
    }

    // ─── Game Init ───
    function getScene() {
      return SCENES[currentLevel % SCENES.length];
    }

    function startGame() {
      ensureAudio();
      gameActive = true;
      gamePhase = 'PLAYING';
      score = 0;
      cleanPixels = 0;

      var scene = getScene();
      levelDisplay.textContent = scene.name;

      // Draw the reveal scene
      drawScene(revealCtx, scene.sceneKey);

      // Reset dirt
      generateDirt();

      // Reset UI
      scoreDisplay.textContent = '0';
      timerDisplay.textContent = '0:00';
      updateProgress();
      hintText.textContent = '💡 Swipe across the screen to clean!';

      // Clear sparkles
      sparkles = [];

      showScreen(playScreen);
      document.title = 'Sparkle Sweep — ' + scene.name;

      startTimer();
      recordPlayed();

      // Start sparkle animation loop
      if (animFrameId) cancelAnimationFrame(animFrameId);
      animFrameId = requestAnimationFrame(sparkleLoop);
    }

    // ─── Input ───
    // Coordinate mapping
    function getCanvasCoords(clientX, clientY) {
      var rect = canvasWrap.getBoundingClientRect();
      var scaleX = CANVAS_SIZE / rect.width;
      var scaleY = CANVAS_SIZE / rect.height;
      return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY
      };
    }

    function clampToCanvas(p) {
      return {
        x: Math.max(0, Math.min(CANVAS_SIZE - 1, p.x)),
        y: Math.max(0, Math.min(CANVAS_SIZE - 1, p.y))
      };
    }

    // ── Pointer / Touch ──
    canvasWrap.addEventListener('pointerdown', function(e) {
      e.preventDefault();
      if (gamePhase !== 'PLAYING') return;
      isDrawing = true;
      var pos = clampToCanvas(getCanvasCoords(e.clientX, e.clientY));
      lastPointerX = pos.x;
      lastPointerY = pos.y;
      cleanAt(pos.x, pos.y);
    });

    window.addEventListener('pointermove', function(e) {
      if (!isDrawing || gamePhase !== 'PLAYING') return;
      e.preventDefault();
      var pos = clampToCanvas(getCanvasCoords(e.clientX, e.clientY));
      if (lastPointerX >= 0) {
        drawStroke(lastPointerX, lastPointerY, pos.x, pos.y);
      }
      lastPointerX = pos.x;
      lastPointerY = pos.y;
    });

    window.addEventListener('pointerup', function() {
      isDrawing = false;
      lastPointerX = -1;
      lastPointerY = -1;
    });

    window.addEventListener('pointercancel', function() {
      isDrawing = false;
      lastPointerX = -1;
      lastPointerY = -1;
    });

    // Canvas-specific touch prevent
    canvasWrap.addEventListener('touchstart', function(e) {
      if (e.target.closest('.canvas-wrap')) {
        e.preventDefault();
      }
    }, { passive: false });

    // ── Keyboard ──
    document.addEventListener('keydown', function(e) {
      var tag = (e.target && e.target.tagName || '').toLowerCase();
      if (tag === 'input' || tag === 'textarea' || tag === 'select') return;

      // Title / Result → Enter / Space to advance
      if (gamePhase === 'TITLE' && (e.key === 'Enter' || e.key === ' ')) {
        e.preventDefault();
        startBtn.click();
        return;
      }
      if (gamePhase === 'RESULT' && (e.key === 'Enter' || e.key === ' ')) {
        e.preventDefault();
        resultNextBtn.click();
        return;
      }

      if (gamePhase !== 'PLAYING') return;

      // WASD / Arrow keys to move a cleaning cursor
      var STEP = brushSize * 0.6;
      var cx = lastPointerX >= 0 ? lastPointerX : 200;
      var cy = lastPointerY >= 0 ? lastPointerY : 200;

      switch (e.key) {
        case 'ArrowUp':
        case 'w':
        case 'W':
          e.preventDefault();
          cy = Math.max(0, cy - STEP);
          break;
        case 'ArrowDown':
        case 's':
        case 'S':
          e.preventDefault();
          cy = Math.min(CANVAS_SIZE - 1, cy + STEP);
          break;
        case 'ArrowLeft':
        case 'a':
        case 'A':
          e.preventDefault();
          cx = Math.max(0, cx - STEP);
          break;
        case 'ArrowRight':
        case 'd':
        case 'D':
          e.preventDefault();
          cx = Math.min(CANVAS_SIZE - 1, cx + STEP);
          break;
        case '1': brushSize = 18; updateBrushUI(); return;
        case '2': brushSize = 32; updateBrushUI(); return;
        case '3': brushSize = 50; updateBrushUI(); return;
        default: return;
      }

      if (e.key.startsWith('Arrow') || 'wasdWASD'.indexOf(e.key) >= 0) {
        if (lastPointerX >= 0 && lastPointerY >= 0) {
          drawStroke(lastPointerX, lastPointerY, cx, cy);
        } else {
          cleanAt(cx, cy);
        }
        lastPointerX = cx;
        lastPointerY = cy;
      }
    });

    // ─── Brush UI ───
    function updateBrushUI() {
      brushBtns.forEach(function(btn) {
        btn.classList.toggle('selected', parseInt(btn.dataset.size) === brushSize);
      });
    }

    brushBtns.forEach(function(btn) {
      btn.addEventListener('click', function() {
        brushSize = parseInt(this.dataset.size);
        updateBrushUI();
        hintText.textContent = '🧽 Brush size: ' + brushSize + 'px';
      });
    });

    // ─── Buttons ───
    startBtn.addEventListener('click', function() {
      ensureAudio();
      highScore = loadHighScore();
      currentLevel = loadProgress();
      startGame();
    });

    // ─── Init ───
    function init() {
      highScore = loadHighScore();
      titleBest.textContent = highScore;

      // Draw a preview on the reveal canvas
      drawScene(revealCtx, 'garden');

      // Generate preview dirt over it
      generateDirt();

      showScreen(titleScreen);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }

  })();
  </script>
</body>
</html>
