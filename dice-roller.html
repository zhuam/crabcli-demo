<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>掷骰子</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
    }
    .container {
      text-align: center; padding: 2rem; border-radius: 1.5rem;
      background: rgba(255,255,255,0.08); backdrop-filter: blur(12px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 { color: #e0e0e0; font-weight: 300; letter-spacing: 2px; margin-bottom: 1.5rem; font-size: 1.4rem; }
    .die {
      width: 120px; height: 120px; margin: 0 auto 1.5rem;
      background: #fff; border-radius: 18px;
      display: grid; place-items: center;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.6);
      transition: transform 0.15s ease;
      user-select: none; cursor: default;
    }
    .die.rolling { animation: shake 0.5s ease-in-out; }
    @keyframes shake {
      0%, 100% { transform: rotate(0deg) scale(1); }
      20% { transform: rotate(-15deg) scale(1.1); }
      40% { transform: rotate(15deg) scale(1.05); }
      60% { transform: rotate(-10deg) scale(1.1); }
      80% { transform: rotate(10deg) scale(1.05); }
    }
    .pip-grid {
      width: 100%; height: 100%; padding: 22%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      place-items: center;
    }
    .pip {
      width: 14px; height: 14px; border-radius: 50%;
      background: #1a1a2e;
      opacity: 0;
      transition: opacity 0.15s ease;
    }
    .pip.show { opacity: 1; }
    .result-number {
      font-size: 2.8rem; font-weight: 700; color: #f0c040;
      margin-bottom: 0.5rem; letter-spacing: 1px;
    }
    .result-label { color: #888; font-size: 0.85rem; margin-bottom: 1.2rem; }
    button {
      padding: 0.75rem 2.5rem; font-size: 1.1rem; font-weight: 600;
      border: none; border-radius: 40px; cursor: pointer;
      color: #1a1a2e; background: linear-gradient(135deg, #f0c040, #e8a020);
      box-shadow: 0 4px 16px rgba(240,192,64,0.35);
      transition: transform 0.12s, box-shadow 0.12s;
      letter-spacing: 1px;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(240,192,64,0.45); }
    button:active { transform: translateY(0); }
    .pip-grid .p { grid-column: var(--c); grid-row: var(--r); }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎲 掷骰子</h1>
    <div class="die" id="die">
      <div class="pip-grid" id="pipGrid"></div>
    </div>
    <div class="result-number" id="resultNumber">1</div>
    <div class="result-label" id="resultLabel">点数为 1</div>
    <button id="rollBtn">掷骰子</button>
  </div>
  <script>
    // pip positions for each face (1-6) using CSS grid
    const PIPS = {
      1: [{ r: 2, c: 2 }],
      2: [{ r: 1, c: 3 }, { r: 3, c: 1 }],
      3: [{ r: 1, c: 3 }, { r: 2, c: 2 }, { r: 3, c: 1 }],
      4: [{ r: 1, c: 1 }, { r: 1, c: 3 }, { r: 3, c: 1 }, { r: 3, c: 3 }],
      5: [{ r: 1, c: 1 }, { r: 1, c: 3 }, { r: 2, c: 2 }, { r: 3, c: 1 }, { r: 3, c: 3 }],
      6: [{ r: 1, c: 1 }, { r: 1, c: 3 }, { r: 2, c: 1 }, { r: 2, c: 3 }, { r: 3, c: 1 }, { r: 3, c: 3 }],
    };

    const die = document.getElementById('die');
    const pipGrid = document.getElementById('pipGrid');
    const resultNumber = document.getElementById('resultNumber');
    const resultLabel = document.getElementById('resultLabel');
    const rollBtn = document.getElementById('rollBtn');

    let currentValue = 1;

    function buildPips(value) {
      pipGrid.innerHTML = '';
      for (let row = 1; row <= 3; row++) {
        for (let col = 1; col <= 3; col++) {
          const pip = document.createElement('div');
          pip.className = 'pip';
          const isActive = PIPS[value].some(p => p.r === row && p.c === col);
          if (isActive) pip.classList.add('show');
          pip.style.gridRow = row;
          pip.style.gridColumn = col;
          pipGrid.appendChild(pip);
        }
      }
    }

    function updateDisplay(value) {
      currentValue = value;
      buildPips(value);
      resultNumber.textContent = value;
      resultLabel.textContent = `点数为 ${value}`;
    }

    function roll() {
      die.classList.remove('rolling');
      // force reflow so the animation plays again
      void die.offsetWidth;
      die.classList.add('rolling');

      const value = Math.floor(Math.random() * 6) + 1;
      // update after shake settles
      setTimeout(() => updateDisplay(value), 400);
    }

    rollBtn.addEventListener('click', roll);
    updateDisplay(1);
  </script>
</body>
</html>
